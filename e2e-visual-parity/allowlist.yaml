# Intentional-diff allowlist (spec §9).
#
# Each entry suppresses a KNOWN-INTENTIONAL delta so only real regressions fail.
# Suppression is exact-match: it applies only when the observed delta equals the
# recorded `expect`, so drift on top of an intentional delta still fails.
#
# Required fields per entry: id, reason, owner, created, expires, review_pr, scope.
# `scripts/validate-allowlist.ts` (run before the suite) rejects entries missing
# a field or containing a TODO placeholder.
version: 1
entries: []
