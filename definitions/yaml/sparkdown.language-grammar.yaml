      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  # ----------------------------------------------------------------------------
  # Modifiers & Keywords
  # ----------------------------------------------------------------------------

  LuauAccessModifier:
    tag: modifier
    name: storage.modifier.access.luau
    match: ({{LUAU_ACCESS_MODIFIERS}})

  LuauScopeModifier:
    tag: modifier
    name: storage.modifier.scope.luau
    match: ({{LUAU_SCOPE_MODIFIERS}})

  LuauControlKeyword:
    tag: controlKeyword
    name: keyword.control.luau
    match: (.+)

  LuauKeyword:
    patterns:
      - { include: "#LuauBreakKeyword" }
      - { include: "#LuauContinueKeyword" }
      - { include: "#LuauReturnKeyword" }
      - { include: "#LuauInKeyword" }
      - { include: "#LuauLocalKeyword" }
      - { include: "#LuauConstKeyword" }
      - { include: "#LuauUnitKeywords" }
      - { include: "#LuauDoKeyword" }
      - { include: "#LuauThenKeyword" }
      - { include: "#LuauIfKeyword" }
      - { include: "#LuauElseifKeyword" }
      - { include: "#LuauElseKeyword" }
      - { include: "#LuauForKeyword" }
      - { include: "#LuauWhileKeyword" }
      - { include: "#LuauRepeatKeyword" }
      - { include: "#LuauUntilKeyword" }
      - { include: "#LuauLocalKeyword" }
      - { include: "#LuauConstKeyword" }
      - { include: "#LuauFunctionKeyword" }

  LuauEndKeyword:
    tag: controlKeyword
    name: keyword.control.end.luau
    match: (end)\b

  LuauDoKeyword:
    tag: controlKeyword
    name: keyword.control.do.luau
    match: (do)\b

  LuauThenKeyword:
    tag: controlKeyword
    name: keyword.control.then.luau
    match: (then)\b

  LuauIfKeyword:
    tag: controlKeyword
    name: keyword.control.if.luau
    match: (if)\b

  LuauElseifKeyword:
    tag: controlKeyword
    name: keyword.control.elseif.luau
    match: (elseif)\b

  LuauElseKeyword:
    tag: controlKeyword
    name: keyword.control.else.luau
    match: (else)\b

  LuauForKeyword:
    tag: controlKeyword
    name: keyword.control.for.luau
    match: (for)\b

  LuauWhileKeyword:
    tag: controlKeyword
    name: keyword.control.while.luau
    match: (while)\b

  LuauRepeatKeyword:
    tag: controlKeyword
    name: keyword.control.repeat.luau
    match: (repeat)\b

  LuauUntilKeyword:
    tag: controlKeyword
    name: keyword.control.until.luau
    match: (until)\b

  LuauBreakKeyword:
    tag: controlKeyword
    name: keyword.control.break.luau
    match: (break)\b

  LuauContinueKeyword:
    tag: controlKeyword
    name: keyword.control.continue.luau
    match: (continue)\b

  LuauReturnKeyword:
    tag: controlKeyword
    name: keyword.control.return.luau
    match: (return)\b

  LuauInKeyword:
    tag: controlKeyword
    name: keyword.control.end.luau
    match: (in)\b

  LuauLocalKeyword:
    tag: modifier
    name: storage.modifier.local.luau
    match: (local)\b

  LuauConstKeyword:
    tag: modifier
    name: storage.modifier.const.luau
    match: (const)\b

  LuauFunctionKeyword:
    tag: controlKeyword
    name: keyword.control.luau
    match: (function)\b

  LuauSelfKeyword:
    tag: self
    name: variable.language.self.luau
    match: (self)\b

  LuauUnitKeywords:
    tag: variableName
    name: variable.other.readwrite.unit.luau
    match: (?<!\.)[.][.][.](?!\.)

  # ----------------------------------------------------------------------------
  # Identifiers
  # ----------------------------------------------------------------------------

  LuauAccessPath:
    begin: (?=(?!{{LUAU_TERMINATOR_KEYWORDS}}){{LUAU_IDENTIFIER}})
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauAccessPart" }
    end: (?={{BEAT}})|(?=$|{{WS}}*(?:{{LUAU_BINARY_OPERATORS}}|{{LUAU_TERMINATOR_KEYWORDS}})|(?!{{WS}}*(?:{{LUAU_IDENTIFIER}}|{{LUAU_ACCESSOR_OPERATOR}}|\[))){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauAccessPart:
    emit: true
    patterns:
      - { include: "#LuauFunctionAccessor" }
      - { include: "#LuauPropertyAccessor" }
      - { include: "#LuauPropertyIndexer" }
      - { include: "#LuauFunctionDeclarationName" }
      - { include: "#LuauFunctionCall" }
      - { include: "#LuauVariable" }

  LuauFunctionAccessor:
    match: ({{WS}}*)({{LUAU_ACCESSOR_OPERATOR}})({{WS}}*)({{LUAU_IDENTIFIER}})({{WS}}*)(?={{LUAU_FUNCTION_CALL_START}})
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#LuauAccessorOperator" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#LuauStdLibMethods" }
          - { include: "#LuauFunctionName" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }

  LuauFunctionDeclarationName:
    match: (?<=function\b{{WS}}*)({{LUAU_IDENTIFIER}})\b({{WS}}*)(?!{{LUAU_ACCESSOR_OPERATOR}})
    captures:
      1:
        patterns:
          - { include: "#LuauFunctionName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }

  LuauFunctionCall:
    begin: ({{LUAU_IDENTIFIER}})({{WS}}*)(?={{LUAU_FUNCTION_CALL_START}})
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauStdLibFunctions" }
          - { include: "#LuauFunctionName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauFunctionCallParameters" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|.)

  LuauFunctionCallParameters:
    tag: meta
    name: meta.parameter.luau
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([)])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }

  LuauVariable:
    match: (?!end)\b({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#LuauSelfKeyword" }
          - { include: "#LuauStdLibConstants" }
          - { include: "#LuauVariableName" }

  LuauPropertyAccessor:
    match: ({{WS}}*)({{LUAU_ACCESSOR_OPERATOR}})({{WS}}*)({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#LuauAccessorOperator" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#LuauStdLibMethods" }
          - { include: "#LuauPropertyName" }

  LuauPropertyIndexer:
    brackets: true
    begin: ({{WS}}*)(\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#PunctuationBracketOpen" }
    patterns:
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (\])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketClose" }

  LuauParameterName:
    tag: function(variableName)
    name: variable.other.property.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauPropertyName:
    tag: propertyName
    name: variable.other.property.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauVariableName:
    tag: variableName
    name: variable.other.readwrite.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauAccessorOperator:
    tag: separator
    name: meta.template.expression.accessor.sd
    match: ({{LUAU_ACCESSOR_OPERATOR}})

  # ----------------------------------------------------------------------------
  # Standard Library
  # ----------------------------------------------------------------------------

  LuauStdLibGlobals:
    tag: atom
    name: constant.language.luau
    match: ({{LUAU_STANDARD_LIB_GLOBALS}})\b

  LuauStdLibFunctions:
    tag: standard(function(name))
    name: support.function.luau
    match: ({{LUAU_STANDARD_LIB_FUNCTIONS}})

  LuauStdLibConstants:
    tag: standard(variableName)
    name: support.type.standard.sd
    match: ({{LUAU_STANDARD_LIB_CONSTANTS}})

  LuauStdLibMethods:
    tag: standard(function(name))
    name: support.function.luau
    match: ({{LUAU_META_METHODS}})

  # ----------------------------------------------------------------------------
  # Shebang
  # ----------------------------------------------------------------------------

  LuauShebang:
    match: ([#][!])(.*)$
    captures:
      1:
        patterns:
          - { include: "#LuauShebangPunctuation" }
      2:
        patterns:
          - { include: "#LuauShebangContent" }

  LuauShebangPunctuation:
    tag: punctuation
    name: punctuation.definition.comment.luau
    match: (.+)

  LuauShebangContent:
    tag: lineComment
    name: comment.line.shebang.luau
    match: (.+)

  # ----------------------------------------------------------------------------
  # Comments
  # ----------------------------------------------------------------------------

  LuauComment:
    patterns:
      - { include: "#LuauBlockComment" }
      - { include: "#LuauDocLineComment" }
      - { include: "#LuauLineComment" }

  LuauBlockComment:
    tag: blockComment
    name: comment.block.luau
    begin: ({{WS}}*)(--\[)([=]*)(\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        patterns:
          - { include: "#LuauCommentMark" }
      3:
        patterns:
          - { include: "#LuauCommentMark" }
      4:
        patterns:
          - { include: "#LuauCommentMark" }
    patterns:
      - { include: "#LuauDocCommentTags" }
      - { include: "#LuauBlockCommentContent" }
      - { include: "#Newline" }
    end: (\])(\3)(\])({{WS}}*)
    endCaptures:
      1:
        patterns:
          - { include: "#LuauCommentMark" }
      2:
        patterns:
          - { include: "#LuauCommentMark" }
      3:
        patterns:
          - { include: "#LuauCommentMark" }
      4:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauBlockCommentContent:
    tag: definition(blockComment)
    name: punctuation.definition.comment.content.sd
    match: (.)

  LuauCommentMark:
    tag: comment
    name: comment.luau
    match: (.+)

  LuauCodeBlockTag:
    tag: comment
    name: comment.luau
    match: (.+)

  LuauDocLineComment:
    tag: docComment
    name: comment.line.double-dash.documentation.luau
    begin: ({{WS}}*)(---)
    beginCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        patterns:
          - { include: "#LuauCommentMark" }
    patterns:
      - { include: "#LuauDocCommentTags" }
      - { include: "#LuauLineCommentContent" }
    end: (?={{BEAT}})|$

  LuauLineComment:
    tag: lineComment
    name: comment.line.double-dash.luau
    begin: ({{WS}}*)(--)
    beginCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        patterns:
          - { include: "#LuauCommentMark" }
    patterns:
      - { include: "#LuauLineCommentContent" }
    end: (?={{BEAT}})|$

  LuauLineCommentContent:
    tag: definition(lineComment)
    name: punctuation.definition.comment.content.sd
    match: (.+?)(?=$)

  LuauDocCommentTags:
    patterns:
      - { include: "#LuauDocTagModifier" }
      - { include: "#LuauDocParamModifier" }

  LuauDocTagModifier:
    tag: annotation
    name: storage.type.class.luadoc.luau
    match: '@\w+'

  LuauDocParamModifier:
    match: ((?<=[\s*!/])[\\@]param)(\s+)(\b\w+\b)
    captures:
      1:
        patterns:
          - { include: "#LuauDocTagAnnotation" }
      2:
        patterns:
          - { include: "#Whitespace" }
      3:
        patterns:
          - { include: "#LuauDocParamName" }

  LuauDocTagAnnotation:
    tag: annotation
    name: storage.type.class.luadoc.luau
    match: (.+)

  LuauDocParamName:
    tag: variableName
    name: variable.parameter.luau
    match: (.+)

  # ----------------------------------------------------------------------------
  # Literal Values
  # ----------------------------------------------------------------------------

  LuauLiteral:
    patterns:
      - { include: "#LuauString" }
      - { include: "#LuauNumber" }
      - { include: "#LuauBoolean" }
      - { include: "#LuauNil" }

  # ----------------------------------------------------------------------------
  # Number Values
  # ----------------------------------------------------------------------------

  LuauNumber:
    patterns:
      - { include: "#LuauNumericHex" }
      - { include: "#LuauNumericBinary" }
      - { include: "#LuauNumericDecimal" }
      - { include: "#LuauNaN" }
      - { include: "#LuauInfinity" }

  LuauNumericHex:
    match: (0_*[xX]_*[\da-fA-F_]*(?:[eE][\+\-]?_*\d[\d_]*(?:\.[\d_]*)?)?){{LUAU_BINARY_OPERATOR_AHEAD}}
    captures:
      1:
        tag: number
        name: constant.numeric.hex.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauNumericBinary:
    match: (0_*[bB][01_]+(?:[eE][\+\-]?_*\d[\d_]*(?:\.[\d_]*)?)?){{LUAU_BINARY_OPERATOR_AHEAD}}
    captures:
      1:
        tag: number
        name: constant.numeric.binary.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauNumericDecimal:
    match: ((?:\d[\d_]*(?:\.[\d_]*)?|\.\d[\d_]*)(?:[eE][\+\-]?_*\d[\d_]*(?:\.[\d_]*)?)?){{LUAU_BINARY_OPERATOR_AHEAD}}
    captures:
      1:
        tag: number
        name: constant.numeric.decimal.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauNaN:
    tag: atom
    name: constant.language.nan.sd
    match: \b(nan)\b

  LuauInfinity:
    tag: atom
    name: constant.language.infinity.sd
    match: \b(inf)\b

  # ----------------------------------------------------------------------------
  # String Values
  # ----------------------------------------------------------------------------

  LuauString:
    patterns:
      - { include: "#LuauDoubleQuotedString" }
      - { include: "#LuauSingleQuotedString" }
      - { include: "#LuauMultilineString" }
      - { include: "#LuauInterpolatedString" }

  LuauDoubleQuotedString:
    tag: definition(string)
    name: string.quoted.double.luau
    begin: (["])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringDoubleQuoteOpen" }
    patterns:
      - { include: "#LuauStringEscape" }
      - { include: "#Color" }
      - { include: "#PlainText" }
    end: (["]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringDoubleQuoteClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauSingleQuotedString:
    tag: definition(string)
    name: string.quoted.single.luau
    begin: (['])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringSingleQuoteOpen" }
    patterns:
      - { include: "#LuauStringEscape" }
      - { include: "#Color" }
      - { include: "#PlainText" }
    end: ([']){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringSingleQuoteClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauMultilineString:
    tag: definition(string)
    name: string.other.multiline.luau
    begin: (\[)([=]*)(\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringBracketQuoteOpen" }
      2:
        patterns:
          - { include: "#PunctuationStringEqualQuoteOpen" }
      3:
        patterns:
          - { include: "#PunctuationStringBracketQuoteOpen" }
    patterns:
      - { include: "#LuauStringEscape" }
      - { include: "#Color" }
      - { include: "#PlainText" }
      - { include: "#Newline" }
    end: (\])(\2)(\]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringBracketQuoteClose" }
      2:
        patterns:
          - { include: "#PunctuationStringEqualQuoteClose" }
      3:
        patterns:
          - { include: "#PunctuationStringBracketQuoteClose" }
      4:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauInterpolatedString:
    tag: definition(string)
    name: string.interpolated.luau
    begin: ([`])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringBacktickQuoteOpen" }
    patterns:
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#LuauStringEscape" }
      - { include: "#Color" }
      - { include: "#PlainText" }
    end: ([`]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringBacktickQuoteClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauInterpolatedStringExpression:
    tag: meta
    name: meta.template.expression.luau
    contentName: meta.embedded.line.luau
    brackets: true
    begin: ([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([}])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }

  LuauStringEscape:
    patterns:
      - { include: "#LuauEscapeStandard" }
      - { include: "#LuauEscapeDecimal" }
      - { include: "#LuauEscapeHex" }
      - { include: "#LuauEscapeUnicode" }
      - { include: "#LuauEscapeLine" }
      - { include: "#LuauEscapeAny" }

  LuauEscapeStandard:
    tag: escape
    name: constant.character.escape.luau
    match: \\[abfnrtvz'"\{\\]

  LuauEscapeDecimal:
    tag: escape
    name: constant.character.escape.luau
    match: \\\d{1,3}

  LuauEscapeHex:
    tag: escape
    name: constant.character.escape.luau
    match: \\x[0-9a-fA-F]{2}

  LuauEscapeUnicode:
    tag: escape
    name: constant.character.escape.luau
    match: \\u\{[0-9a-fA-F]*\}

  LuauEscapeLine:
    tag: escape
    name: constant.character.escape.luau
    match: \\$

  LuauEscapeAny:
    tag: escape
    name: constant.character.escape.luau
    match: \\.

  # ----------------------------------------------------------------------------
  # Constant Values
  # ----------------------------------------------------------------------------

  LuauBoolean:
    match: (true|false)\b{{LUAU_BINARY_OPERATOR_AHEAD}}
    captures:
      1:
        tag: bool
        name: constant.language.boolean.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauNil:
    match: (nil(?!:))\b{{LUAU_BINARY_OPERATOR_AHEAD}}
    captures:
      1:
        tag: "null"
        name: constant.language.nil.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  # ----------------------------------------------------------------------------
  # Table Value
  # ----------------------------------------------------------------------------

  LuauTable:
    brackets: true
    begin: ([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauSemicolonSeparator" }
      - { include: "#LuauTableIndexDeclaration" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([}]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauTableIndexDeclaration:
    brackets: true
    begin: (\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketOpen" }
    patterns:
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (\])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketClose" }

  # ----------------------------------------------------------------------------
  # Parenthetical Value
  # ----------------------------------------------------------------------------

  LuauParenthetical:
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([)]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  # ----------------------------------------------------------------------------
  # Operations
  # ----------------------------------------------------------------------------

  LuauAssignmentOperation:
    begin: ({{WS}}*)(?={{LUAU_ASSIGNMENT_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauAssignmentOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauAssignmentOperator:
    begin: ({{WS}}*)({{LUAU_ASSIGNMENT_OPERATORS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: updateOperator
        name: keyword.operator.assignment.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauArithmeticOperation:
    begin: ({{WS}}*)(?={{LUAU_ARITHMETIC_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauArithmeticOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauArithmeticOperator:
    begin: ({{WS}}*)({{LUAU_ARITHMETIC_OPERATORS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: arithmeticOperator
        name: keyword.operator.arithmetic.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauCompareOperation:
    begin: ({{WS}}*)(?={{LUAU_COMPARE_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauCompareOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauCompareOperator:
    begin: ({{WS}}*)({{LUAU_COMPARE_OPERATORS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: compareOperator
        name: keyword.operator.comparison.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauConcatOperation:
    begin: ({{WS}}*)(?={{LUAU_CONCAT_OPERATOR}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauConcatOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauConcatOperator:
    begin: ({{WS}}*)({{LUAU_CONCAT_OPERATOR}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: special(operator)
        name: keyword.operator.concat.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauLengthOperation:
    begin: ({{WS}}*)(?={{LUAU_LENGTH_OPERATOR}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauLengthOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauLengthOperator:
    begin: ({{WS}}*)({{LUAU_LENGTH_OPERATOR}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: special(operator)
        name: keyword.operator.length.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauLogicalOperation:
    begin: ({{WS}}*)(?={{LUAU_LOGICAL_KEYWORDS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauLogicalOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauLogicalOperator:
    begin: ({{WS}}*)({{LUAU_LOGICAL_KEYWORDS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: special(logicOperator)
        name: keyword.operator.logical.luau keyword.operator.wordlike.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauTypeCastOperation:
    begin: ({{WS}}*)(?={{LUAU_TYPECAST_OPERATOR}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeCastOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauTypeCastOperator:
    begin: ({{WS}}*)({{LUAU_TYPECAST_OPERATOR}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: typeOperator
        name: keyword.operator.typecast.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  # ----------------------------------------------------------------------------
  # Syntax Punctuation
  # ----------------------------------------------------------------------------

  LuauCommaSeparator:
    match: ({{WS}}*)([,])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        tag: operator
        name: keyword.operator.comma.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauSemicolonSeparator:
    match: ({{WS}}*)([;])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        tag: operator
        name: keyword.operator.semicolon.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  # ----------------------------------------------------------------------------
  # Types and Generics
  # ----------------------------------------------------------------------------
  LuauGenericsDeclaration:
    begin: ([<])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationAngleOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauTypeAssignmentOperator" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([>])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationAngleClose" }

  LuauGenericsInstantiation:
    begin: ([<][<])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationDoubleAngleOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#Newline" }
      - { include: "#ExtraWhitespace" }
      - { include: "#LuauTypeLiteral" }
    end: ([>][>])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationDoubleAngleClose" }

  LuauFunctionTypeDeclaration:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)(?:(export)\b({{WS}}*))?(type)\b({{WS}}*)(function)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauExportModifier" }
      3:
        patterns:
          - { include: "#OptionalSeparator" }
      4:
        patterns:
          - { include: "#LuauTypeKeyword" }
      5:
        patterns:
          - { include: "#OptionalSeparator" }
      6:
        patterns:
          - { include: "#LuauFunctionKeyword" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauGenericsDeclaration" }
      - { include: "#LuauTypeFunctionParameters" }
      - { include: "#LuauTypeName" }
    end: (?={{BEAT}})|(?<=[\)\-{}\[\]"'])

  LuauDataTypeDeclaration:
    begin: ({{WS}}*)(?:(export)\b({{WS}}*))?(type)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauExportModifier" }
      3:
        patterns:
          - { include: "#OptionalSeparator" }
      4:
        patterns:
          - { include: "#LuauTypeKeyword" }
      5:
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauTypeAssignment" }
    end: (?={{BEAT}})|(?={{WS}}*(?:$|(?!{{LUAU_COMMENT_START}}|{{LUAU_IDENTIFIER}}|[=])))

  LuauTypeAssignment:
    begin: ([=])({{WS}}*)
    beginCaptures:
      1:
        tag: updateOperator
        name: keyword.operator.assignment.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#LuauTypeLiteral" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauTypeAssignmentOperator:
    match: ([=])({{WS}}*)
    captures:
      1:
        tag: updateOperator
        name: keyword.operator.assignment.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauExportModifier:
    tag: modifier
    name: storage.modifier.visibility.luau
    match: (.+)

  LuauTypeKeyword:
    tag: definitionKeyword
    name: storage.type.luau
    match: (.+)

  LuauTypeName:
    match: ({{LUAU_IDENTIFIER}}){{LUAU_BINARY_OPERATOR_AHEAD}}
    captures:
      1:
        tag: typeName
        name: entity.name.type.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauTypeLiteral:
    begin: (?={{LUAU_IDENTIFIER}}|[?]|[&]|[|]|[{]|[(]|[<]|["]|[']|[`])
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeBinaryOperation" }
      - { include: "#LuauTypeTableStruct" }
      - { include: "#LuauString" }
      - { include: "#LuauBoolean" }
      - { include: "#LuauPrimitiveType" }
      - { include: "#LuauTypeFunctionParameters" }
      - { include: "#LuauTypeGenerics" }
      - { include: "#LuauTypeofFunction" }
      - { include: "#LuauVariadicType" }
      - { include: "#LuauTypeName" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauTypeBinaryOperation:
    begin: ({{WS}}*)(?={{LUAU_TYPE_BINARY_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeBinaryOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauTypeBinaryOperator:
    begin: ({{WS}}*)({{LUAU_TYPE_BINARY_OPERATORS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: typeOperator
        name: keyword.operator.type.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauTypeAnnotationOperation:
    begin: ({{WS}}*)(?={{LUAU_TYPE_ANNOTATION_OPERATOR}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeAnnotationOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauTypeAnnotationOperator:
    begin: ({{WS}}*)({{LUAU_TYPE_ANNOTATION_OPERATOR}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        tag: typeOperator
        name: keyword.operator.type.luau
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#Indent" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauPrimitiveType:
    match: (nil|string|number|boolean|thread|vector|buffer|unknown|never|any)\b{{LUAU_BINARY_OPERATOR_AHEAD}}
    captures:
      1:
        tag: standard(typeName)
        name: support.type.primitive.luau
      2:
        patterns:
          - { include: "#OptionalSeparator" }

  LuauTypeofFunction:
    begin: (typeof|type)\b({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauTypeofFunctionName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeofFunctionParameters" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|.)

  LuauTypeofFunctionParameters:
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
    end: ([)]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }
      2:
        emit: true
        patterns:
          - { include: "OptionalSeparator" }

  LuauTypeofFunctionName:
    tag: function(typeName)
    name: support.function.luau
    match: (.+)

  LuauTypeGenerics:
    brackets: true
    begin: ([<])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationAngleOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauVariadicType" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauTypeAssignmentOperator" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([>]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationAngleClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauTypeTableStruct:
    brackets: true
    begin: ([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeTableIndexer" }
      - { include: "#LuauTypeTableProperty" }
      - { include: "#LuauTypeAnnotationOperation" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauSemicolonSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([}]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauTypeTableIndexer:
    brackets: true
    begin: (\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (\])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketClose" }

  LuauTypeTableProperty:
    match: (?:({{LUAU_ACCESS_MODIFIERS}})\b({{WS}}*))?({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#LuauAccessModifier" }
      2:
        patterns:
          - { include: "#Whitespace" }
      3:
        patterns:
          - { include: "#LuauTypePropertyName" }

  LuauTypePropertyName:
    tag: propertyName
    name: variable.property.luau
    match: (.+)

  LuauTypeFunctionParameters:
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeNamedFunctionParameter" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([)]){{LUAU_BINARY_OPERATOR_AHEAD}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauTypeNamedFunctionParameter:
    begin: ({{WS}}*)({{LUAU_IDENTIFIER}})({{WS}}*)(?=[:])
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#LuauParameterName" }
    patterns:
      - { include: "#LuauTypeAnnotationOperation" }
    applyEndPatternLast: true
    end: (?=$|.)

  LuauTypeOperator:
    tag: typeOperator
    name: keyword.operator.type.luau
    match: (.+)

  # ----------------------------------------------------------------------------
  # Labels
  # ----------------------------------------------------------------------------

  LuauLabel:
    match: ({{WS}}*)([:][:])({{LUAU_IDENTIFIER}})([:][:])
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauLabelOperator" }
      3:
        patterns:
          - { include: "#LuauLabelName" }
      4:
        patterns:
          - { include: "#LuauLabelOperator" }

  LuauLabelOperator:
    tag: operator
    name: keyword.operator.label.luau
    match: (.+)

  LuauLabelName:
    tag: labelName
    name: storage.type.attribute.luau
    match: ({{LUAU_IDENTIFIER}})

  # ----------------------------------------------------------------------------
  # Attributes
  # ----------------------------------------------------------------------------

  LuauAttribute:
    match: (@)({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#LuauAttributeOperator" }
      2:
        patterns:
          - { include: "#LuauAttributeName" }

  LuauAttributeOperator:
    tag: operator
    name: keyword.operator.attribute.luau
    match: (.+)

  LuauAttributeName:
    tag: attributeName
    name: storage.type.attribute.luau
    match: (.+)
