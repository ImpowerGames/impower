fileTypes: ["sd"]
keyEquivalent: ^~S
indentUnit: "  "
name: Sparkdown
scopeName: text.source.sparkdown
uuid: E26C862D-2A5E-4F10-B0C3-D6BCB838CB7F
flags: mu

variables:
  IMAGE_CONTROL_KEYWORDS: ["show", "hide", "animate"]
  IMAGE_CLAUSE_KEYWORDS: ["over", "after", "with", "wait", "ease"]
  AUDIO_CONTROL_KEYWORDS: ["play", "stop", "fade", "queue", "await"]
  AUDIO_CLAUSE_KEYWORDS:
    ["over", "after", "to", "loop", "once", "mute", "unmute", "now"]

  FLOW_BEAT_KEYWORDS: ["scene", "branch"]
  FLOW_MODULE_KEYWORDS: ["include", "load"]

  LUAU_SCOPE_MODIFIERS: ["store", "local", "const"]
  LUAU_ACCESS_MODIFIERS: ["read", "write"]
  LUAU_END_KEYWORDS: ["end"]
  LUAU_CONDITIONAL_ALTERNATOR_KEYWORDS: ["match", "plural"]
  LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS: ["queue", "cycle", "chain"]
  LUAU_SEQUENTIAL_MODIFIER_KEYWORDS: ["shuffle"]
  LUAU_FLOW_BLOCK_KEYWORDS: ["do", "if", "for", "while", "repeat"]
  LUAU_IF_BLOCK_KEYWORDS: ["then", "elseif", "else"]
  LUAU_LOOP_BLOCK_KEYWORDS: ["break", "continue"]
  LUAU_ITERATOR_KEYWORDS: ["in"]
  LUAU_REPEAT_BLOCK_KEYWORDS: ["until"]
  LUAU_JUMP_KEYWORDS: ["goto"]
  LUAU_RETURN_KEYWORDS: ["return"]
  LUAU_LOGICAL_KEYWORDS: ["and", "or", "not"]
  LUAU_MODULE_KEYWORDS: ["require", "export"]
  LUAU_GLOBAL_DECLARATION_KEYWORDS: ["define"]
  LUAU_LOCAL_DECLARATION_KEYWORDS: ["local", "const", "function", "type"]
  LUAU_STANDARD_LIB_GLOBALS: ["_G", "_VERSION"]
  LUAU_STANDARD_LIB_CONSTANTS:
    [
      "bit32",
      "coroutine",
      "debug",
      "math",
      "os",
      "string",
      "table",
      "task",
      "utf8",
      "buffer",
      "vector",
    ]
  LUAU_STANDARD_LIB_FUNCTIONS:
    [
      "assert",
      "collectgarbage",
      "error",
      "gcinfo",
      "getfenv",
      "getmetatable",
      "ipairs",
      "loadstring",
      "newproxy",
      "next",
      "pairs",
      "pcall",
      "print",
      "rawequal",
      "rawset",
      "require",
      "select",
      "setfenv",
      "setmetatable",
      "tonumber",
      "tostring",
      "type",
      "typeof",
      "unpack",
      "xpcall",
    ]
  LUAU_META_METHODS:
    [
      "__add",
      "__call",
      "__concat",
      "__div",
      "__eq",
      "__index",
      "__le",
      "__len",
      "__lt",
      "__metatable",
      "__mod",
      "__mode",
      "__mul",
      "__newindex",
      "__pow",
      "__sub",
      "__tostring",
      "__unm",
      "__iter",
      "__idiv",
    ]

  IDENTIFIER_START_CHAR: '_\p{L}'
  IDENTIFIER_END_CHAR: '0-9_\p{L}-'
  IDENTIFIER_START: "[{{IDENTIFIER_START_CHAR}}]"
  IDENTIFIER_END: "[{{IDENTIFIER_END_CHAR}}]*"
  IDENTIFIER: (?:{{IDENTIFIER_START}}{{IDENTIFIER_END}}\b)

  TAG_START: (?:[#]+(?=$|{{WS}}))
  COMMENT_START: (?:[-][-])
  BREAK: (?:{{WS}}+[>]{{WS}}*)
  CHAIN: (?:[\\])
  GLUE: (?<=^|{{WS}})(?:[.][.])(?=$|{{WS}})

  # Newline
  NL: (?:\r\n|\r|\n)
  # Whitespace
  WS: (?:[^\S\n\r])
  # Word
  WORD: (?:[\p{L}\p{N}\p{Mn}]+)
  # End Of Line
  EOL: "(?:$|{{WS}}*$|{{WS}}*{{TAG_START}}.*$)"
  # End Of Keyword
  EOK: "(?:$|{{WS}}+|(?=[:]|{{TAG_START}}|{{COMMENT_START}}))"

  BEAT: (?:{{WS}}*{{FLOW_BEAT_KEYWORDS}})
  END: (?:{{WS}}*(?:end)\b)

  LUAU_TERMINATOR_KEYWORDS: (?:{{LUAU_END_KEYWORDS}}|{{LUAU_FLOW_BLOCK_KEYWORDS}}|{{LUAU_IF_BLOCK_KEYWORDS}}|{{LUAU_LOOP_BLOCK_KEYWORDS}}|{{LUAU_ITERATOR_KEYWORDS}}|{{LUAU_REPEAT_BLOCK_KEYWORDS}}|{{LUAU_JUMP_KEYWORDS}}|{{LUAU_RETURN_KEYWORDS}}|{{LUAU_LOGICAL_KEYWORDS}}|{{LUAU_GLOBAL_DECLARATION_KEYWORDS}}|{{LUAU_LOCAL_DECLARATION_KEYWORDS}}|{{LUAU_MODULE_KEYWORDS}})
  LUAU_COMMENT_START: (?:[-][-])
  LUAU_IDENTIFIER: (?:[a-zA-Z_][a-zA-Z0-9_]*\b)
  LUAU_ASSIGNMENT_OPERATORS: (?:\+=|-=|\/=|\/\/=|\*=|%=|\^=|\.\.=|=(?!=))
  LUAU_COMPARE_OPERATORS: (?:==|~=|<=?|>=?)
  LUAU_ARITHMETIC_OPERATORS: (?:\+|-|%|\*|\/\/|\/|\^)
  LUAU_CONCAT_OPERATOR: (?<![.])(?:[.][.])(?![.])
  LUAU_TYPECAST_OPERATOR: (?:[:][:])
  LUAU_LENGTH_OPERATOR: (?:[#])
  LUAU_ALTERNATOR_OPERATOR: (?:[|])
  LUAU_TYPE_ANNOTATION_OPERATOR: (?<![:])(?:[:])(?![:])
  LUAU_ACCESSOR_OPERATOR: (?:[.]|[:])
  LUAU_TYPE_BINARY_OPERATORS: (?:[?]|[&]|[|]|[-][>])
  LUAU_VALUE_BINARY_OPERATORS: (?:{{LUAU_LOGICAL_KEYWORDS}}|{{LUAU_ASSIGNMENT_OPERATORS}}|{{LUAU_COMPARE_OPERATORS}}|{{LUAU_ARITHMETIC_OPERATORS}}|{{LUAU_CONCAT_OPERATOR}}|{{LUAU_TYPECAST_OPERATOR}})
  LUAU_BINARY_OPERATORS: (?:{{LUAU_TYPE_BINARY_OPERATORS}}|{{LUAU_VALUE_BINARY_OPERATORS}}|{{LUAU_ALTERNATOR_OPERATOR}})
  LUAU_BINARY_OPERATOR_AHEAD: (?:({{WS}}*)(?={{LUAU_BINARY_OPERATORS}})|(?=$|.))
  LUAU_FUNCTION_CALL_START: (?:<<|[({"']|\[\[)

patterns:
  - { include: "#EndOfLine" }
  - { include: "#Newline" }

  - { include: "#FrontMatter" }
  - { include: "#Annotation" }

  - { include: "#Include" }
  - { include: "#Load" }

  - { include: "#Scene" }
  - { include: "#Branch" }

  - { include: "#LuauExplicitStatement" }
  - { include: "#LuauImplicitStatement" }
  - { include: "#LuauSparkdownControlBlock" }
  - { include: "#LuauInterpolatedStringExpression" }
  - { include: "#LuauEndKeyword" }

  - { include: "#SparkdownStatement" }

  - { include: "#Whitespace" }

repository:
  ########## Sparkdown Statements ##########

  SparkdownStatement:
    patterns:
      - { include: "#Choice" }
      - { include: "#FlowStatements" }
      - { include: "#DisplayStatements" }

  FlowStatements:
    patterns:
      - { include: "#Divert" }
      - { include: "#Thread" }
      - { include: "#Gather" }

  DisplayStatements:
    patterns:
      - { include: "#Title" }
      - { include: "#Heading" }
      - { include: "#Transitional" }
      - { include: "#Write" }
      - { include: "#Dialogue" }
      - { include: "#AssetLine" }
      - { include: "#Action" }

  ########## Annotation ##########

  Annotation:
    patterns:
      - { include: "#LuauComment" }
      - { include: "#Tags" }

  ########## Tag ##########

  Tags:
    tag: docComment
    name: comment.line.sd entity.tag.sd
    begin: ({{WS}}*)(?={{TAG_START}})
    captures:
      1:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Tag" }
    end: (?=$)

  Tag:
    tag: docComment
    name: comment.line.sd entity.tag.sd
    match: ({{WS}}*)({{TAG_START}})(.*?)(?:(?={{TAG_START}})|$)
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: definition(docComment)
        name: punctuation.definition.comment.sd comment.line.sd entity.tag.begin.sd
      3:
        patterns:
          - { include: "#TagContent" }

  TagContent:
    tag: definition(docComment)
    name: punctuation.definition.comment.content.sd
    match: (.+?)(?=$|{{TAG_START}})

  ########## Include ##########

  Include:
    tag: meta
    name: meta.import.include.sd
    begin: ^({{WS}}*)(include)({{EOK}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#IncludeKeyword" }
      3:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#IncludeContent" }
    end: (?=$)

  IncludeKeyword:
    tag: controlKeyword
    name: keyword.control.definition.include.sd
    match: (.+)

  IncludeContent:
    tag: string
    name: string.include.sd
    match: (.+?)(?={{EOL}})

  ########## Load ##########

  Load:
    tag: meta
    name: meta.import.load.sd
    begin: ^({{WS}}*)(load)({{EOK}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LoadKeyword" }
      3:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#LoadName" }
      - { include: "#Whitespace" }
    end: (?=$)

  LoadKeyword:
    tag: controlKeyword
    name: keyword.control.definition.load.sd
    match: (.+)

  LoadName:
    tag: constant(variableName)
    name: variable.other.constant.load.name.sd
    match: (\S+)

  ########## Break ##########

  Break:
    tag: special(content)
    name: meta.break.sd
    match: ({{BREAK}})
    captures:
      1:
        tag: keyword
        name: keyword.other.break.sd

  ########## Chain ##########

  Chain:
    tag: special(meta)
    name: meta.chain.sd
    match: ({{WS}}*)({{CHAIN}})(?:({{WS}}+)$|({{WS}}*))
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: keyword
        name: keyword.other.chain.sd
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#Separator" }

  ########## Glue ##########

  Glue:
    tag: meta
    name: meta.glue.sd
    match: ({{WS}}*)({{GLUE}})
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: keyword
        name: keyword.other.glue.sd

  ########## Choice ##########

  Choice:
    name: entity.choice.sd
    begin: ({{WS}}*)((?:[*]{{EOK}})+|(?:[+]{{EOK}})+)([(][^()]*[)]{{WS}}*)?(?:((?:[{][^{}]*[}]{{WS}}*)+))?(\r\n|\r|\n)?
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#ChoiceMark" }
      3:
        patterns:
          - { include: "#Label" }
      4:
        patterns:
          - { include: "#LuauInterpolatedStringExpression" }
      5:
        patterns:
          - { include: "#Newline" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#ChoiceConditional" }
      - { include: "#ChoiceWithSuppressedText" }
      - { include: "#ChoiceWithNoSuppressedText" }
    end: (?=$)

  ChoiceConditional:
    name: entity.choice.sd
    match: ^({{WS}}*)((?:[{][^{}]*[}]{{WS}}*)+)(\r\n|\r|\n)
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauInterpolatedStringExpression" }
      3:
        patterns:
          - { include: "#Newline" }

  ChoiceMark:
    tag: keyword
    name: keyword.operator.expression.list.sd
    match: (.+)

  ChoiceWithSuppressedText:
    match: (.*?)(\[)(.*?)(\])(.*?)(?:({{WS}}*)$|({{WS}}*)([-][>].*$))
    captures:
      1:
        patterns:
          - { include: "#ChoiceTextContent" }
      2:
        tag: keyword
        name: punctuation.definition.template-expression.begin.choice.suppression.sd
      3:
        patterns:
          - { include: "#ChoiceTextContent" }
      4:
        tag: keyword
        name: punctuation.definition.template-expression.end.choice.suppression.sd
      5:
        patterns:
          - { include: "#DisplayText" }
      6:
        patterns:
          - { include: "#ExtraWhitespace" }
      7:
        patterns:
          - { include: "#Separator" }
      8:
        patterns:
          - { include: "#Divert" }

  ChoiceWithNoSuppressedText:
    match: (.+?)(?:({{WS}}*)$|({{WS}}*)([-][>].*$))
    captures:
      1:
        patterns:
          - { include: "#ChoiceTextContent" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#Separator" }
      4:
        patterns:
          - { include: "#Divert" }

  ChoiceTextContent:
    tag: string
    name: string.choice.sd
    match: (.+)

    captures:
      1:
        patterns:
          - { include: "#Annotation" }
          - { include: "#LuauInterpolatedStringExpression" }
          - { include: "#DisplayText" }

  ########## Gather ##########

  Gather:
    match: ^({{WS}}*)((?:[-]{{EOK}})+)({{WS}}*)([(][^()]*[)]{{WS}}*)?
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#GatherMark" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#Label" }

  GatherMark:
    tag: keyword
    name: keyword.other.gather.sd
    match: (.+)

  ########## Label ##########

  Label:
    match: ([(])({{WS}}*)({{IDENTIFIER}})({{WS}}*)([)])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#LabelBeginMark" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#LabelDeclarationName" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
      5:
        patterns:
          - { include: "#LabelEndMark" }
      6:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LabelBeginMark:
    tag: keyword
    name: keyword.flow.label.sd
    match: (.+)

  LabelEndMark:
    tag: keyword
    name: keyword.flow.label.sd
    match: (.+)

  LabelDeclarationName:
    tag: definition(heading)
    name: keyword.control.section.sd
    match: (.+)

  ########## Scene ##########

  Scene:
    begin: ^({{WS}}*)(scene)({{EOK}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#SceneKeyword" }
      3:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#SceneWithParametersDeclaration" }
      - { include: "#SceneWithoutParametersDeclaration" }
    end: $|([:])
    endCaptures:
      1:
        patterns:
          - { include: "#ColonOperator" }

  SceneWithParametersDeclaration:
    begin: ({{IDENTIFIER}})({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#SceneDeclarationName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauFunctionParameters" }
    end: (?=$|{{COMMENT_START}}|{{WS}}*(?![(]))

  SceneWithoutParametersDeclaration:
    match: ({{IDENTIFIER}})({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#SceneDeclarationName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }

  SceneKeyword:
    tag: controlKeyword
    name: keyword.control.scene.sd
    match: (.+)

  SceneDeclarationName:
    tag: definition(heading)
    name: keyword.control.section.sd
    match: (.+)

  ########## Branch ##########

  Branch:
    begin: ^({{WS}}*)(branch)({{EOK}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#BranchKeyword" }
      3:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#BranchWithParametersDeclaration" }
      - { include: "#BranchWithoutParametersDeclaration" }
    end: $|([:])
    endCaptures:
      1:
        patterns:
          - { include: "#ColonOperator" }

  BranchWithParametersDeclaration:
    begin: ({{IDENTIFIER}})({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#BranchDeclarationName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauFunctionParameters" }
    end: (?=$|{{COMMENT_START}}|{{WS}}*(?![(]))

  BranchWithoutParametersDeclaration:
    match: ({{IDENTIFIER}})({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#BranchDeclarationName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }

  BranchKeyword:
    tag: controlKeyword
    name: keyword.control.branch.sd
    match: (.+)

  BranchDeclarationName:
    tag: definition(heading)
    name: keyword.control.section.sd
    match: (.+)

  ########## Divert & Thread ##########

  Divert:
    begin: ({{WS}}*)([-][>][-][>]|[-][>])
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#TunnelMark" }
          - { include: "#DivertMark" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Tunnel" }
      - { include: "#DivertTarget" }
      - { include: "#ExtraWhitespace" }
    end: (?=$)

  Tunnel:
    begin: ({{WS}}*)([-][>])
    beginCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      2:
        patterns:
          - { include: "#DivertMark" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Tunnel" }
      - { include: "#DivertTarget" }
      - { include: "#ExtraWhitespace" }
    end: (?=$)

  Thread:
    begin: ^({{WS}}*)([<][-])
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#ThreadMark" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#DivertTarget" }
      - { include: "#ExtraWhitespace" }
    end: (?=$|[^\s{{IDENTIFIER_END_CHAR}}])

  DivertMark:
    tag: controlKeyword
    name: keyword.control.divert.mark.sd
    match: ([-][>])

  TunnelMark:
    tag: controlKeyword
    name: keyword.control.divert.mark.sd
    match: ([-][>][-][>])

  ThreadMark:
    tag: controlKeyword
    name: keyword.control.thread.mark.sd
    match: ([<][-])

  End:
    tag: keyword
    name: constant.language.end.sd
    match: \b(END)\b

  Done:
    tag: keyword
    name: constant.language.done.sd
    match: \b(DONE)\b

  DivertTarget:
    tag: heading
    name: keyword.control.divert.path.sd
    begin: ({{WS}}*)(?={{IDENTIFIER}}|[.^])
    beginCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#End" }
      - { include: "#Done" }
      - { include: "#LuauFunctionCall" }
      - { include: "#DivertPath" }
    end: (?=$)|(?!{{IDENTIFIER}}|[.^])

  DivertPath:
    tag: heading
    name: keyword.control.divert.path.sd
    begin: (?={{IDENTIFIER}}|[.^])
    patterns:
      - { include: "#Annotation" }
      - { include: "#DivertPart" }
    end: (?=$)|(?!{{IDENTIFIER}}|[.^])

  DivertPart:
    emit: true
    patterns:
      - { include: "#PunctuationAccessor" }
      - { include: "#DivertPartNumber" }
      - { include: "#DivertPartOperator" }
      - { include: "#DivertPartName" }

  DivertPartNumber:
    tag: heading
    name: keyword.control.divert.path.sd
    match: ([0-9]+)

  DivertPartOperator:
    tag: heading
    name: keyword.control.divert.path.sd
    match: ([.^])

  DivertPartName:
    tag: heading
    name: keyword.control.divert.path.sd
    match: ({{IDENTIFIER}})

  ########## Whitespace ##########

  Newline:
    tag: content
    name: punctuation.whitespace.newline.sd
    match: ({{NL}})

  Indent:
    tag: special(content)
    name: punctuation.whitespace.indent.sd
    match: ^({{WS}}+)

  TrailingWhitespace:
    tag: local(content)
    name: punctuation.whitespace.trailing.sd
    match: (?<!^)({{WS}}+)$

  ExtraWhitespace:
    tag: content
    name: punctuation.whitespace.extra.sd
    match: ({{WS}}+)

  Whitespace:
    tag: content
    name: punctuation.whitespace.sd
    match: ({{WS}}+)

  Separator:
    tag: definition(content)
    name: punctuation.whitespace.separator.sd
    match: ({{WS}}+)

  OptionalSeparator:
    tag: definition(content)
    name: punctuation.whitespace.separator.optional.sd
    match: ({{WS}}*)

  EndOfLine:
    patterns:
      - { include: "#Annotation" }
      - { include: "#TrailingWhitespace" }

  ########## Operators ##########

  ColonOperator:
    tag: logicOperator
    name: meta.template.expression.operator.colon.sd
    match: ([:])

  ColonSeparator:
    tag: definition(logicOperator)
    name: meta.template.expression.operator.colon.sd
    match: ([:])

  PunctuationStringDoubleQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.double.begin.sd
    match: (["])

  PunctuationStringDoubleQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.double.end.sd
    match: (["])

  PunctuationStringSingleQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.single.begin.sd
    match: (['])

  PunctuationStringSingleQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.single.end.sd
    match: (['])

  PunctuationStringBacktickQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.backtick.begin.sd
    match: ([`])

  PunctuationStringBacktickQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.backtick.end.sd
    match: ([`])

  PunctuationStringBracketQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.bracket.begin.sd
    match: (\[)

  PunctuationStringBracketQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.bracket.end.sd
    match: (\])

  PunctuationStringEqualQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.equal.begin.sd
    match: ([=]+)

  PunctuationStringEqualQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.equal.end.sd
    match: ([=]+)

  PunctuationParenOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: ([(])

  PunctuationParenClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: ([)])

  PunctuationBracketOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: (\[)

  PunctuationBracketClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: (\])

  PunctuationBraceOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: (\{)

  PunctuationBraceClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: (\})

  PunctuationAngleOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: ([<])

  PunctuationAngleClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: ([>])

  PunctuationDoubleAngleOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: ([<][<])

  PunctuationDoubleAngleClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: ([>][>])

  PunctuationAccessor:
    tag: separator
    name: meta.template.expression.accessor.sd
    match: ([.])

  ########## Color ##########

  Color:
    emit: true
    patterns:
      - { include: "#HEXColor" }
      - { include: "#RGBColor" }
      - { include: "#HSLColor" }

  HEXColor:
    tag: string
    name: string.color.hex.sd
    match: (#)([0-9a-fA-F]{3,})
    color: true

  RGBColor:
    tag: string
    name: string.color.rgb.sd
    match: (rgb)(a)?([(])(.*)([)])
    color: true

  HSLColor:
    tag: string
    name: string.color.hsl.sd
    match: (hsl)(a)?([(])(.*)([)])
    color: true

  ########## FrontMatter ##########

  FrontMatter:
    tag: meta
    name: meta.front-matter.sd
    begin: ^([-]{3,})($|{{WS}}*$)
    beginCaptures:
      1:
        tag: keyword
        name: keyword.other.front-matter.dashes.start.sd
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#FrontMatterField" }
      - { include: "#Newline" }
      - { include: "#Unknown" }
    end: ^([-]{3,})($|{{WS}}*$)?
    endCaptures:
      1:
        tag: keyword
        name: keyword.other.front-matter.dashes.end.sd
      2:
        patterns:
          - { include: "#ExtraWhitespace" }

  FrontMatterField:
    tag: meta
    name: meta.front-matter.field.sd
    begin: ^(?!{{WS}}+)([^{}:\r\n]+)({{WS}}*)($|[:])($|.*$(?:\r\n|\r|\n)?)
    beginCaptures:
      1:
        patterns:
          - { include: "#FrontMatterFieldKeyword" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#FrontMatterStringInline" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#FrontMatterStringBlock" }
      - { include: "#Newline" }
      - { include: "#Unknown" }
    end: (?=^(?!{{WS}}+)[^{}:\r\n]+{{WS}}*(?:$|[:])|[-]{3,})

  FrontMatterFieldKeyword:
    tag: keyword
    name: keyword.other.front-matter.field.sd
    match: (.+)

  FrontMatterStringInline:
    match: ({{WS}}*)($|.+$(?:\r\n|\r|\n)?)
    captures:
      1:
        patterns:
          - { include: "#Separator" }
      2:
        patterns:
          - { include: "#FrontMatterString" }

  FrontMatterStringBlock:
    match: ^({{WS}}+)(.*$(?:\r\n|\r|\n)?)
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#FrontMatterString" }

  FrontMatterString:
    tag: string
    name: string.front-matter.string.sd
    begin: (?=.*$)
    patterns:
      - { include: "#LuauComment" }
      - { include: "#InlineText" }
    end: ($(?:\r\n|\r|\n)?)
    endCaptures:
      1:
        patterns:
          - { include: "#Newline" }

  ########## Title ##########

  Title:
    patterns:
      - { include: "#BlockTitle" }
      - { include: "#InlineTitle" }

  BlockTitle:
    tag: monospace
    name: string.display.title.block.sd
    begin: ^({{WS}}*)(\^)([:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#TitleMark" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))

  InlineTitle:
    tag: monospace
    name: string.display.title.inline.sd
    begin: ({{WS}}*)(\^)([:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#TitleMark" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])

  TitleMark:
    tag: definition(punctuation)
    name: punctuation.title.mark.sd
    match: (.+)

  ########## Heading ##########

  Heading:
    patterns:
      - { include: "#BlockHeading" }
      - { include: "#InlineHeading" }

  BlockHeading:
    tag: regexp
    name: string.display.heading.block.sd
    begin: ^({{WS}}*)([$])([:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#HeadingMark" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))

  InlineHeading:
    tag: regexp
    name: string.display.heading.inline.sd
    begin: ({{WS}}*)([$])([:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#HeadingMark" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])

  HeadingMark:
    tag: definition(punctuation)
    name: punctuation.heading.mark.sd
    match: (.+)

  HeadingLocationTime:
    match: INT[.]?[\/]EXT[.]|INT[.]|EXT[.]{{WS}}*(.*?){{WS}}+[-]{{WS}}+(.*?){{WS}}*$

  ########## Transitional ##########

  Transitional:
    patterns:
      - { include: "#BlockTransitional" }
      - { include: "#InlineTransitional" }

  BlockTransitional:
    tag: labelName
    name: string.display.transitional.block.sd
    begin: ^({{WS}}*)([%])([:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#TransitionalMark" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))

  InlineTransitional:
    tag: labelName
    name: string.display.transitional.inline.sd
    begin: ({{WS}}*)([%])([:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#TransitionalMark" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])

  TransitionalMark:
    tag: definition(punctuation)
    name: punctuation.transitional.mark.sd
    match: (.+)

  ########## Write ##########

  Write:
    patterns:
      - { include: "#BlockWrite" }
      - { include: "#InlineWrite" }

  BlockWrite:
    tag: definition(string)
    name: string.display.write.block.sd
    begin: ^({{WS}}*)([@])({{WS}}*)((?:\\.|[^:\r\n])*)((?<!\\)[:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#WriteMark" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      4:
        patterns:
          - { include: "#WriteTarget" }
      5:
        patterns:
          - { include: "#ColonSeparator" }
      6:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))

  InlineWrite:
    tag: definition(string)
    name: string.display.write.inline.sd
    begin: ({{WS}}*)([@])({{WS}}*)((?:\\.|[^:\r\n])*)((?<!\\)[:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#WriteMark" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      4:
        patterns:
          - { include: "#WriteTarget" }
      5:
        patterns:
          - { include: "#ColonSeparator" }
      6:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)

  WriteMark:
    tag: keyword
    name: keyword.action.mark.sd
    match: (.+)

  WriteTarget:
    tag: propertyName
    name: variable.other.property.write.target.sd
    match: (.+)

  ########## Dialogue ##########

  Dialogue:
    patterns:
      - { include: "#BlockDialogue" }
      - { include: "#InlineDialogue" }

  BlockDialogue:
    tag: definition(string)
    name: string.display.dialogue.block.sd
    begin: ^({{WS}}*)((?=\S)(?:\\.|[^{}:\r\n])+)((?<!\\)[:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#Annotation" }
          - { include: "#DialogueCharacter" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))

  InlineDialogue:
    tag: definition(string)
    name: string.display.dialogue.inline.sd
    begin: ({{WS}}*)((?=\S)(?:\\.|[^{}:\r\n])+)((?<!\\)[:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#Annotation" }
          - { include: "#DialogueCharacter" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)

  DialogueMark:
    tag: definition(typeName)
    name: entity.name.type.dialogue.character.name.sd
    match: (.+)

  DialogueCharacter:
    match: ({{WS}}*)(.*?)({{WS}}*)({{WS}}[(][^()]*?[)])?($|{{WS}}*)({{WS}}\[.*?\])?({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#DialogueCharacterName" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#DialogueCharacterParenthetical" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        patterns:
          - { include: "#DialogueCharacterPosition" }
      7:
        patterns:
          - { include: "#EndOfLine" }

  DialogueCharacterName:
    tag: typeName
    name: entity.name.type.dialogue.character.name.sd
    match: (.+$)
    captures:
      1:
        patterns:
          - { include: "#DisplayText" }

  DialogueCharacterParenthetical:
    tag: escape
    name: constant.character.escape.dialogue.character.parenthetical.sd
    match: ({{WS}})([(])({{WS}}*)([^()]*?)({{WS}}*)([)])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: paren
        name: meta.brace.round.open.sd
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#DisplayText" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        tag: paren
        name: meta.brace.round.close.sd
      7:
        patterns:
          - { include: "#ExtraWhitespace" }

  DialogueCharacterPosition:
    tag: definition(escape)
    name: constant.character.escape.dialogue.character.position.sd
    match: ({{WS}})(\[)({{WS}}*)(.*?)({{WS}}*)(\])
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: bracket
        name: punctuation.definition.position.sd
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#DialogueCharacterPositionContent" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        tag: bracket
        name: punctuation.definition.position.sd

  DialogueCharacterPositionContent:
    match: (.+$)

  ########## Action ##########

  Action:
    patterns:
      - { include: "#BlockAction" }
      - { include: "#InlineAction" }
      - { include: "#ImplicitAction" }

  BlockAction:
    begin: ^({{WS}}*)([:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#ColonSeparator" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))

  InlineAction:
    begin: ({{WS}}*)(?:({{GLUE}})|([:])($|{{WS}}+))
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#Glue" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])

  ImplicitAction:
    begin: ({{WS}}*)(?!{{END}})(?=\S)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])

  ########## Parenthetical ##########

  ParentheticalLine:
    match: ({{WS}}*)((?:[=].*?[=]|[<].*?[>]|{{WS}}*)*)({{WS}}*)([(][^()]*?[)])({{WS}}*)((?:[=].*?[=]|[<].*?[>]|{{WS}}*)*)($|{{EOL}}|(?={{BREAK}})|{{CHAIN}}(?:{{WS}}))
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#TextCommand" }
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#ParentheticalLineContent" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        patterns:
          - { include: "#TextCommand" }
          - { include: "#ExtraWhitespace" }
      7:
        patterns:
          - { include: "#EndOfLine" }
          - { include: "#Chain" }

  ParentheticalLineContent:
    tag: escape
    name: constant.character.escape.sd
    match: ({{WS}}*)([(])({{WS}}*)([^()]*?)({{WS}}*)([)])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        tag: paren
        name: meta.brace.round.open.sd
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#DisplayText" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        tag: paren
        name: meta.brace.round.close.sd
      7:
        patterns:
          - { include: "#ExtraWhitespace" }

  ########## Text ##########

  BlockLineBreak:
    match: ({{WS}}*)(.*?)({{BREAK}})({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#AssetLine" }
          - { include: "#ParentheticalLine" }
          - { include: "#DisplayLine" }
      3:
        patterns:
          - { include: "#Break" }
      4:
        patterns:
          - { include: "#EndOfLine" }

  BlockLineContinue:
    begin: ({{WS}}*)(?=\S)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
    patterns:
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#DisplayLine" }
    end: ({{WS}}*)(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }

  BlockLineBlank:
    match: ^({{WS}}+$)
    captures:
      1:
        patterns:
          - { include: "#Indent" }

  LineChain:
    match: ({{WS}}*)(.*?)({{CHAIN}}(?:$|{{WS}}+))({{EOL}})(\r\n|\r|\n)?
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#DisplayLine" }
      3:
        patterns:
          - { include: "#Chain" }
      4:
        patterns:
          - { include: "#EndOfLine" }
      5:
        patterns:
          - { include: "#Newline" }

  LineBreak:
    match: ({{WS}}*)(.*?)({{BREAK}})({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#DisplayLine" }
      3:
        patterns:
          - { include: "#Break" }
      4:
        patterns:
          - { include: "#EndOfLine" }

  LineEnd:
    begin: ({{WS}}*)(?!{{EOL}})(?=\S)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
    patterns:
      - { include: "#DisplayLine" }
    end: (?={{EOL}})

  DisplayLine:
    patterns:
      - { include: "#Annotation" }
      - { include: "#Escape" }
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#ParentheticalLine" }
      - { include: "#Chain" }
      - { include: "#Glue" }
      - { include: "#TextChunk" }

  TextChunk:
    tag: special(string)
    name: string.display.text.chunk.sd
    begin: (?=.+)
    patterns:
      - { include: "#DisplayText" }
    end: (?=$|{{WS}}*{{CHAIN}}(?:$|{{WS}})|{{GLUE}}|{{EOL}})

  DisplayText:
    patterns:
      - { include: "#Annotation" }
      - { include: "#Escape" }
      - { include: "#ImageCommand" }
      - { include: "#AudioCommand" }
      - { include: "#InlineTextAndLogic" }

  ########## Commands ##########

  ImageLine:
    match: ^({{WS}}*)(?=\S)((?:\[\[(?:\\.|[^\]])*?\]\]|{{WS}}+)+)({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#ImageCommand" }
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#EndOfLine" }

  AudioLine:
    match: ^({{WS}}*)(?=\S)((?:[(][(](?:\\.|[^)])*?[)][)]|{{WS}}+)+)({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#AudioCommand" }
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#EndOfLine" }

  ImageAndAudioLine:
    match: ^({{WS}}*)(?=\S)((?:\[\[(?:\\.|[^\]])*?\]\]|[(][(](?:\\.|[^)])*?[)][)]|{{WS}}+)+)({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#ImageCommand" }
          - { include: "#AudioCommand" }
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#EndOfLine" }

  AssetLine:
    patterns:
      - { include: "#ImageLine" }
      - { include: "#AudioLine" }
      - { include: "#ImageAndAudioLine" }

  ImageCommand:
    tag: macroName
    name: meta.image.sd
    brackets: true
    begin: (\[\[)({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#ImageBeginMark" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#ImageCommandContent" }
    end: $|({{WS}}*)(\]\])({{WS}}*)
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#ImageEndMark" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  ImageCommandContent:
    match: ((?:\\.|[^\]])*?)(?=$|{{WS}}*\]\])
    captures:
      1:
        patterns:
          - { include: "#AssetCommandContent" }

  AudioCommand:
    tag: macroName
    name: meta.audio.sd
    brackets: true
    begin: ([(][(])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#AudioBeginMark" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#AudioCommandContent" }
    end: $|({{WS}}*)([)][)])({{WS}}*)
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#AudioEndMark" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  AudioCommandContent:
    match: ((?:\\.|[^)])*?)(?=$|{{WS}}*[)][)])
    captures:
      1:
        patterns:
          - { include: "#AssetCommandContent" }

  AssetCommandContent:
    match: (.*?)($|(?:{{IMAGE_CLAUSE_KEYWORDS}}|{{AUDIO_CLAUSE_KEYWORDS}})(?=$|{{WS}}).*)
    captures:
      1:
        patterns:
          - { include: "#Separator" }
          - { include: "#AssetCommandInstruction" }
      2:
        patterns:
          - { include: "#Annotation" }
          - { include: "#Separator" }
          - { include: "#AssetCommandClauseKeyword" }
          - { include: "#TimeValue" }
          - { include: "#NumberValue" }
          - { include: "#NameValue" }

  AssetCommandInstruction:
    match: (?:({{IMAGE_CONTROL_KEYWORDS}}|{{AUDIO_CONTROL_KEYWORDS}})({{WS}}*)($|\S+)({{WS}}*))?(.*)
    captures:
      1:
        patterns:
          - { include: "#AssetCommandControl" }
      2:
        patterns:
          - { include: "#Separator" }
      3:
        patterns:
          - { include: "#AssetCommandTarget" }
      4:
        patterns:
          - { include: "#Separator" }
      5:
        patterns:
          - { include: "#AssetCommandAddOperator" }
          - { include: "#AssetCommandName" }
          - { include: "#Separator" }
          - { include: "#IllegalChar" }

  ImageBeginMark:
    tag: keyword
    name: keyword.operator.expression.begin.image.sd
    match: (.+)

  ImageEndMark:
    tag: keyword
    name: keyword.operator.expression.end.image.sd
    match: (.+)

  AudioBeginMark:
    tag: keyword
    name: keyword.operator.expression.begin.audio.sd
    match: (.+)

  AudioEndMark:
    tag: keyword
    name: keyword.operator.expression.end.audio.sd
    match: (.+)

  AssetCommandControl:
    tag: controlKeyword
    name: keyword.control.asset.control.sd
    match: (.+)

  AssetCommandTarget:
    tag: typeName
    name: entity.name.type.asset.target.sd
    match: (.+)

  AssetCommandClauseKeyword:
    tag: keyword
    name: keyword.asset.clause.keyword.sd
    match: ({{IMAGE_CLAUSE_KEYWORDS}}|{{AUDIO_CLAUSE_KEYWORDS}})

  AssetCommandName:
    match: (.+?)(?=$|[+])
    captures:
      1:
        patterns:
          - { include: "#Separator" }
          - { include: "#LuauString" }
          - { include: "#AssetCommandKeywordNone" }
          - { include: "#AssetCommandFilteredFileName" }
          - { include: "#AssetCommandFileName" }
          - { include: "#AssetCommandFilter" }
          - { include: "#IllegalChar" }

  AssetCommandKeywordNone:
    tag: keyword
    name: keyword.asset.keyword.none.sd
    match: (none)

  AssetCommandFilteredFileName:
    tag: constant(variableName)
    name: variable.other.constant.asset.file.sd
    match: ({{IDENTIFIER}})((?:[~][^~\s]+)+)
    captures:
      1:
        patterns:
          - { include: "#AssetCommandFileName" }
      2:
        patterns:
          - { include: "#AssetCommandFilter" }

  AssetCommandFileName:
    tag: constant(variableName)
    name: variable.other.constant.asset.file.sd
    match: ({{IDENTIFIER}})

  AssetCommandAddOperator:
    tag: propertyName
    name: variable.other.property.add.sd
    match: ({{WS}}*[+]{{WS}}*)

  AssetCommandFilter:
    match: ([~])($|[^~\s]+)?
    captures:
      1:
        patterns:
          - { include: "#AssetCommandFilterOperator" }
      2:
        patterns:
          - { include: "#AssetCommandFilterName" }

  AssetCommandFilterOperator:
    tag: propertyName
    name: variable.other.property.filter.sd
    match: ([~])

  AssetCommandFilterName:
    tag: constant(variableName)
    name: variable.other.constant.asset.filter.sd
    match: ([^~\s]+)

  WhitespaceAssetCommandClause:
    tag: content
    name: punctuation.whitespace.sd
    match: ({{WS}}+)

  TimeValue:
    tag: number
    name: constant.numeric.time.sd
    match: ([-]?(?:\d*[.])?\d+)(ms|s)(?=$|{{WS}})
    captures:
      1:
        tag: number
        name: constant.numeric.time.amount.sd
      2:
        tag: number
        name: constant.numeric.time.unit.sd

  NumberValue:
    tag: number
    name: constant.numeric.number.sd
    match: ([-]?(?:\d*[.])?\d+)(?=$|{{WS}})

  NameValue:
    tag: constant(variableName)
    name: variable.other.constant.sd
    match: ({{IDENTIFIER}})(?=$|{{WS}})

  InvalidValue:
    tag: content
    name: markup.raw.text.sd
    match: (\S+)

  TextCommand:
    tag: macroName
    name: meta.text.sd
    match: ([<](?!{{WS}}))((?:\\.|[^>])*?)((?<![-])[>])
    captures:
      1:
        tag: keyword
        name: keyword.operator.expression.begin.tag.sd
      2:
        patterns:
          - { include: "#TextCommandContent" }
      3:
        tag: keyword
        name: keyword.operator.expression.end.tag.sd

  TextCommandContent:
    match: ({{WS}}*)([^ :]+)({{WS}}*)(?:([:])({{WS}}*)(.*))?
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#TextCommandControl" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#ColonOperator" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        patterns:
          - { include: "#TextCommandArguments" }

  TextCommandControl:
    captures:
      1:
        patterns:
          - { include: "#LuauNumber" }
          - { include: "#TextCommandControlKeyword" }

  TextCommandControlKeyword:
    tag: keyword
    name: keyword.style.control.keyword.sd

  TextCommandArguments:
    captures:
      1:
        patterns:
          - { include: "#TextCommandArgument" }

  TextCommandArgument:
    tag: meta
    name: meta.argument.sd
    begin: (?=.+$)
    patterns:
      - { include: "#Annotation" }
      - { include: "#LuauExpression" }
    end: (?=$)|([,])
    endCaptures:
      1:
        tag: separator
        name: meta.template.expression.comma.sd

  ControlKeyword:
    tag: controlKeyword
    name: keyword.control.sd
    match: (.+)

  ########## Text ##########

  InlineTextAndLogic:
    patterns:
      - { include: "#Escape" }
      - { include: "#Divert" }
      - { include: "#Thread" }
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#AudioCommand" }
      - { include: "#ImageCommand" }
      - { include: "#InlineText" }

  InlineText:
    patterns:
      - { include: "#Escape" }
      - { include: "#Raw" }
      - { include: "#Styling" }
      - { include: "#Emphasis" }
      - { include: "#PlainText" }

  Escape:
    match: (?:^(\\)({{WS}})|(?<!^)(\\)({{WS}})|(\\)(\S))
    captures:
      1:
        tag: definition(escape)
        name: constant.character.escape.sd
      2:
        tag: content
        name: markup.raw.text.sd
      3:
        tag: definition(escape)
        name: constant.character.escape.sd
      4:
        tag: content
        name: markup.raw.text.sd
      5:
        tag: definition(escape)
        name: constant.character.escape.sd
      6:
        tag: content
        name: markup.raw.text.sd

  Styling:
    patterns:
      - { include: "#Glue" }
      - { include: "#TextCommand" }
      - { include: "#Underline" }
      - { include: "#BoldItalic" }
      - { include: "#Bold" }
      - { include: "#Italic" }
      - { include: "#Centered" }

  StylingMark:
    captures:
      1:
        tag: definition(content)
        name: markup.raw.text.sd

  Raw:
    tag: content
    name: markup.raw.text.sd
    begin: ([`]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#PlainText" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  BoldItalic:
    tag: strong
    name: markup.other.bold.sd
    begin: ([*][*])(?=[*])
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#Italic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Bold:
    tag: strong
    name: markup.other.bold.sd
    begin: ([*][*])(?![*])
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Italic:
    tag: emphasis
    name: markup.other.italic.sd
    begin: ([*])(?![*])
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Underline:
    tag: link
    name: markup.other.underline.sd
    begin: ([_]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Centered:
    tag: monospace
    name: constant.character.escape.centered.sd
    begin: ([\^]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Emphasis:
    patterns:
      - { include: "#EmphasisTilde" }
      - { include: "#EmphasisColon" }

  EmphasisTilde:
    tag: quote
    name: markup.emphasis.tilde.sd
    begin: ([~][~]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  EmphasisColon:
    tag: quote
    name: markup.emphasis.colon.sd
    begin: ([:][:]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  PlainText:
    patterns:
      - { include: "#Newline" }
      - { include: "#Space" }
      - { include: "#Word" }
      - { include: "#EmDash" }
      - { include: "#Punctuation" }

  Space:
    tag: content
    name: markup.raw.space.sd
    match: ([ ])

  Word:
    tag: content
    name: markup.raw.text.sd
    match: ({{WORD}})

  EmDash:
    tag: content
    name: markup.raw.punctuation.sd
    match: ([-][-])

  Punctuation:
    tag: content
    name: markup.raw.punctuation.sd
    match: (.)

  Other:
    tag: content
    name: markup.raw.text.sd
    match: (.)

  ########## Errors ##########

  IllegalExpression:
    tag: invalid
    name: invalid.illegal.illegal-expression.sd
    match: (.+)

  IllegalChar:
    tag: invalid
    name: invalid.illegal.illegal-char.sd
    match: (.)

  Unknown:
    tag: invalid
    name: invalid.illegal.unknown-statement.sd
    match: (.+$)

  # LUAU

  LuauExpression:
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauIfExpression" }
      - { include: "#LuauAlternatorBlocks" }
      - { include: "#LuauImplicitStatement" }
      - { include: "#LuauAssignmentOperation" }
      - { include: "#LuauArithmeticOperation" }
      - { include: "#LuauCompareOperation" }
      - { include: "#LuauConcatOperation" }
      - { include: "#LuauLengthOperation" }
      - { include: "#LuauLogicalOperation" }
      - { include: "#LuauTypeCastOperation" }
      - { include: "#LuauParenthetical" }
      - { include: "#LuauAttribute" }
      - { include: "#LuauNumber" }
      - { include: "#LuauString" }
      - { include: "#LuauBoolean" }
      - { include: "#LuauNil" }
      - { include: "#LuauKeyword" }
      - { include: "#LuauStdLibGlobals" }
      - { include: "#LuauGenericsInstantiation" }
      - { include: "#LuauTypeofFunction" }
      - { include: "#LuauAccessPath" }
      - { include: "#LuauTable" }
      - { include: "#LuauTypeAnnotationOperation" }
      - { include: "#LuauSemicolonSeparator" }

  LuauImplicitStatement:
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauShebang" }
      - { include: "#LuauDefine" }
      - { include: "#LuauFunctionDefinition" }
      - { include: "#LuauVariableDefinition" }
      - { include: "#LuauFunctionTypeDeclaration" }
      - { include: "#LuauDataTypeDeclaration" }
      - { include: "#LuauUntilStatement" }
      - { include: "#LuauReturnStatement" }
      - { include: "#LuauGotoStatement" }
      - { include: "#LuauBreakStatement" }
      - { include: "#LuauContinueStatement" }
      - { include: "#LuauLabel" }

  # ----------------------------------------------------------------------------
  # Explicit Statement
  # ----------------------------------------------------------------------------

  LuauExplicitStatement:
    begin: ({{WS}}*)([&])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauExplicitStatementMark" }
      3:
        patterns:
          - { include: "#Separator" }
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|$

  LuauExplicitStatementMark:
    tag: keyword
    name: keyword.other.statement.explicit.luau.mark.sd
    match: (.+)

  # ----------------------------------------------------------------------------
  # Define (Syntactic Sugar for OOP Classes)
  # ----------------------------------------------------------------------------

  LuauDefine:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)(define)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauDefineKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauDefineNameAndInheritance" }
      - { include: "#LuauFunctionDefinition" }
      - { include: "#LuauPropertyDefinition" }
      - { include: "#LuauControlBlock" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauDefineNameAndInheritance:
    begin: (?<=define\b{{WS}}*)({{LUAU_IDENTIFIER}})
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauDefineName" }
    patterns:
      - { include: "#LuauInheritanceOperation" }
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|({{WS}}*)(with)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      2:
        patterns:
          - { include: "#LuauWithKeyword" }

  LuauInheritanceOperation:
    match: ({{WS}}*)(as)\b({{WS}}*)($|{{LUAU_IDENTIFIER}})($|{{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#LuauAsKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      4:
        patterns:
          - { include: "#LuauDefineParentName" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  LuauPropertyDefinition:
    begin: ({{WS}}*)({{LUAU_SCOPE_MODIFIERS}}|{{LUAU_ACCESS_MODIFIERS}})?(?={{LUAU_IDENTIFIER}}{{WS}}*{{LUAU_ASSIGNMENT_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauScopeModifier" }
          - { include: "#LuauAccessModifier" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauVariableAssignment" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|{{WS}}*(?!{{LUAU_COMMENT_START}}))

  LuauDefineKeyword:
    tag: controlKeyword
    name: keyword.control.define.luau
    match: (define)\b

  LuauAsKeyword:
    tag: controlKeyword
    name: keyword.control.as.luau
    match: (as)\b

  LuauWithKeyword:
    tag: controlKeyword
    name: keyword.control.as.luau
    match: (with)\b

  LuauDefineName:
    tag: definition(typeName)
    name: entity.name.type.define.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauDefineParentName:
    tag: typeName
    name: entity.name.type.define.parent.luau
    match: ({{LUAU_IDENTIFIER}})

  # ----------------------------------------------------------------------------
  # Function Definition
  # ----------------------------------------------------------------------------

  LuauFunctionDefinition:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)(?:({{LUAU_SCOPE_MODIFIERS}})\b({{WS}}*))?(function)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauScopeModifier" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      4:
        patterns:
          - { include: "#LuauFunctionKeyword" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauGenericsDeclaration" }
      - { include: "#LuauFunctionReturnType" }
      - { include: "#LuauFunctionParameters" }
      - { include: "#LuauControlBlock" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauFunctionParameters:
    tag: meta
    name: meta.parameter.luau
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauVariadicParameter" }
      - { include: "#LuauFunctionParameter" }
      - { include: "#LuauTypeAnnotationOperation" }
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([)])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }

  LuauVariadicType:
    match: ({{LUAU_IDENTIFIER}}[.][.][.])
    tag: special(typeName)
    name: variable.parameter.function.varargs.luau

  LuauVariadicParameter:
    match: ([.][.][.])
    tag: special(variableName)
    name: variable.parameter.function.varargs.luau

  LuauFunctionParameter:
    match: ({{LUAU_IDENTIFIER}})
    tag: function(variableName)
    name: variable.parameter.function.luau

  LuauFunctionReturnType:
    begin: (?<=[)]{{WS}}*)([:])(?![:])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauTypeOperator" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauFunctionName:
    tag: function(name)
    name: entity.name.function.luau
    match: ({{LUAU_IDENTIFIER}})

  # ----------------------------------------------------------------------------
  # Variable Definition
  # ----------------------------------------------------------------------------

  LuauVariableDefinition:
    begin: ({{WS}}*)({{LUAU_SCOPE_MODIFIERS}})\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#Indent" }
      2:
        patterns:
          - { include: "#LuauScopeModifier" }
      3:
        emit: true
        patterns:
          - { include: "OptionalSeparator" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauVariableAssignment" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|{{WS}}*(?!{{LUAU_COMMENT_START}}))

  LuauVariableAssignment:
    begin: ({{LUAU_IDENTIFIER}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauVariableName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeAnnotationOperation" }
      - { include: "#LuauAssignmentOperation" }
      - { include: "#LuauFunctionDefinition" }
