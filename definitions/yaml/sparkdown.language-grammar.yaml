fileTypes: ["sd"]
keyEquivalent: ^~S
indentUnit: "  "
name: Sparkdown
scopeName: text.source.sparkdown
uuid: E26C862D-2A5E-4F10-B0C3-D6BCB838CB7F
flags: mu

variables:
  IMAGE_CONTROL_KEYWORDS: ["show", "hide", "animate"]
  IMAGE_CLAUSE_KEYWORDS: ["over", "after", "with", "wait", "ease"]
  AUDIO_CONTROL_KEYWORDS: ["play", "stop", "fade", "queue", "await"]
  AUDIO_CLAUSE_KEYWORDS:
    ["over", "after", "to", "loop", "once", "mute", "unmute", "now"]

  FLOW_BEAT_KEYWORDS: ["scene", "branch"]
  FLOW_MODULE_KEYWORDS: ["include", "run"]

  LUAU_SCOPE_MODIFIERS: ["store", "local", "const"]
  LUAU_ACCESS_MODIFIERS: ["read", "write"]
  LUAU_END_KEYWORDS: ["end"]
  LUAU_CONDITIONAL_ALTERNATOR_KEYWORDS: ["match", "plural"]
  LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS: ["queue", "cycle", "chain"]
  LUAU_SEQUENTIAL_MODIFIER_KEYWORDS: ["shuffle"]
  LUAU_FLOW_BLOCK_KEYWORDS: ["do", "if", "for", "while", "repeat"]
  LUAU_IF_BLOCK_KEYWORDS: ["then", "elseif", "else"]
  LUAU_IF_BRANCH_END_KEYWORDS: ["end", "elseif", "else"]
  LUAU_LOOP_BLOCK_KEYWORDS: ["break", "continue"]
  LUAU_ITERATOR_KEYWORDS: ["in"]
  LUAU_REPEAT_BLOCK_KEYWORDS: ["until"]
  LUAU_JUMP_KEYWORDS: ["goto"]
  LUAU_RETURN_KEYWORDS: ["return"]
  LUAU_LOGICAL_KEYWORDS: ["and", "or", "not"]
  LUAU_MODULE_KEYWORDS: ["require", "export"]
  LUAU_GLOBAL_DECLARATION_KEYWORDS: ["define"]
  # `type` is intentionally NOT included here. It IS a declaration
  # keyword for `type X = ...` type aliases (handled by the
  # `LuauDataTypeDeclaration` rule with a `(?!{{WS}}*[(])` lookahead),
  # but it's ALSO a Luau stdlib function (`type(x)` returns the
  # type-name string). Including it in `LUAU_LOCAL_DECLARATION_KEYWORDS`
  # would let `LUAU_TERMINATOR_KEYWORDS` reject `type` from
  # `LuauAccessPath`, killing the function-call path in expressions.
  # The disambiguation lives in `LuauDataTypeDeclaration`'s lookahead,
  # not here.
  LUAU_LOCAL_DECLARATION_KEYWORDS: ["local", "const", "function"]
  LUAU_PRIMITIVE_TYPES:
    [
      "nil",
      "string",
      "number",
      "boolean",
      "thread",
      "vector",
      "buffer",
      "unknown",
      "never",
      "any",
    ]
  LUAU_STANDARD_LIB_GLOBALS: ["_G", "_VERSION"]
  LUAU_STANDARD_LIB_CONSTANTS: [
      "bit32",
      "coroutine",
      "debug",
      "math",
      "os",
      "string",
      "table",
      "task",
      "utf8",
      "buffer",
      "vector",
      # Sparkdown-specific runtime-state namespaces (not in standard
      # Luau). `count.*` exposes ink narrative-flow builtins under
      # Luau-style names — `count.turns()`, `count.visits(-> target)`,
      # etc. — replacing ink's `TURNS()`, `READ_COUNT(...)`. The prefix
      # makes it clear these return *counts* rather than the things
      # themselves. Because `count` is registered as a stdlib namespace
      # it's also reserved as an identifier — users can't define a
      # variable named `count`, and syntax highlighting makes the
      # reserved status visible at the source level. `system.*` is
      # reserved for runtime config (currently just `lang.current`).
      "system",
      "count",
      "lang",
      "plural",
    ]
  LUAU_STANDARD_LIB_FUNCTIONS:
    [
      "assert",
      "collectgarbage",
      "error",
      "gcinfo",
      "getfenv",
      "getmetatable",
      "ipairs",
      "loadstring",
      "newproxy",
      "next",
      "pairs",
      "pcall",
      "print",
      "rawequal",
      "rawset",
      "require",
      "select",
      "setfenv",
      "setmetatable",
      "tonumber",
      "tostring",
      "type",
      "typeof",
      "unpack",
      "xpcall",
    ]
  LUAU_META_METHODS:
    [
      "__add",
      "__call",
      "__concat",
      "__div",
      "__eq",
      "__index",
      "__le",
      "__len",
      "__lt",
      "__metatable",
      "__mod",
      "__mode",
      "__mul",
      "__newindex",
      "__pow",
      "__sub",
      "__tostring",
      "__unm",
      "__iter",
      "__idiv",
    ]

  IDENTIFIER_START_CHAR: '_\p{L}'
  IDENTIFIER_END_CHAR: '0-9_\p{L}-'
  IDENTIFIER_START: "[{{IDENTIFIER_START_CHAR}}]"
  IDENTIFIER_END: "[{{IDENTIFIER_END_CHAR}}]*"
  IDENTIFIER: (?:{{IDENTIFIER_START}}{{IDENTIFIER_END}}\b)

  TAG_START: (?:[#]+(?=$|{{WS}}))
  COMMENT_START: (?:[-][-])
  BREAK: (?:{{WS}}+[>]{{WS}}*)
  CHAIN: (?:[\\])
  GLUE: (?<=^|{{WS}})(?:[.][.])(?=$|{{WS}})

  # Newline
  NL: (?:\r\n|\r|\n)
  # Whitespace
  WS: (?:[^\S\n\r])
  # Word
  WORD: (?:[\p{L}\p{N}\p{Mn}]+)
  # End Of Line
  EOL: "(?:$|{{WS}}*$|{{WS}}*{{TAG_START}}.*$)"
  # End Of Keyword
  EOK: "(?:$|{{WS}}+|(?=[:]|{{TAG_START}}|{{COMMENT_START}}))"

  BEAT: (?:{{WS}}*{{FLOW_BEAT_KEYWORDS}})
  END: (?:{{WS}}*(?:end)\b)

  LUAU_TERMINATOR_KEYWORDS: (?:{{LUAU_END_KEYWORDS}}|{{LUAU_FLOW_BLOCK_KEYWORDS}}|{{LUAU_IF_BLOCK_KEYWORDS}}|{{LUAU_LOOP_BLOCK_KEYWORDS}}|{{LUAU_ITERATOR_KEYWORDS}}|{{LUAU_REPEAT_BLOCK_KEYWORDS}}|{{LUAU_JUMP_KEYWORDS}}|{{LUAU_RETURN_KEYWORDS}}|{{LUAU_LOGICAL_KEYWORDS}}|{{LUAU_GLOBAL_DECLARATION_KEYWORDS}}|{{LUAU_LOCAL_DECLARATION_KEYWORDS}}|{{LUAU_MODULE_KEYWORDS}})
  LUAU_COMMENT_START: (?:[-][-])
  LUAU_IDENTIFIER: (?:[a-zA-Z_][a-zA-Z0-9_]*\b)
  # Style/UI property names follow CSS/sparkle spelling — hyphens are
  # allowed (e.g. `bg-color`, `corner-top-left`, `c-tl`). This is
  # deliberately wider than LUAU_IDENTIFIER (which forbids hyphens) and
  # is only used inside `style` blocks, where a value is a raw CSS-like
  # token rather than a Luau expression.
  STYLE_PROPERTY_NAME: (?:[a-zA-Z_][a-zA-Z0-9_-]*)
  # Restored value/selector highlighting helpers (pre-Luau-port leaf rules).
  INTEGER: "[0-9]+"
  NUMBER: (?:[-]?(?:\d*[.])?\d+)
  QUOTED_STRING: (?:["](?:\\.|[^"\r\n])*["])
  STRICT_PROPERTY_IDENTIFIER: (?:{{INTEGER}}|{{IDENTIFIER}}|{{QUOTED_STRING}})
  BEFORE_KEYWORD: (?<![{{IDENTIFIER_END_CHAR}}])(?:(?<=\.\.\.)|(?<!\.))
  AFTER_KEYWORD: (?![{{IDENTIFIER_END_CHAR}}])(?:(?=\.\.\.)|(?!\.))
  COMPARISON_OPERATOR: (?:[~]|[|]|[\^]|[$]|[*])
  UNQUOTED_STRING_TERMINATOR: (?:$|[\s"'`<>=:(){}\[\]]|{{COMMENT_START}})
  UNQUOTED_STRING_VALUE: (?:.*?)(?={{UNQUOTED_STRING_TERMINATOR}})
  PROPERTY_NAME_TERMINATOR: (?:[:]|[=]|[\r\n])
  EOPL: "(?:$|{{WS}}*$|{{WS}}*[/][/].*$)"
  # Operators consumed by the restored struct-body per-line wrapper rules.
  ASSIGN_EQUAL_OPERATOR: (?:{{WS}}*[=]{{WS}}*)
  ARRAY_ITEM_OPERATOR: (?:[-](?:$|{{WS}}+))
  LUAU_FUNCTION_CALL_START: (?:<<|[({"']|\[\[)
  LUAU_ASSIGNMENT_OPERATORS: (?:\+=|-=|\/=|\/\/=|\*=|%=|\^=|\.\.=|=(?!=))
  LUAU_COMPARE_OPERATORS: (?:==|~=|<=?|>=?)
  LUAU_ARITHMETIC_OPERATORS: (?:\+|-|%|\*|\/\/|\/|\^)
  LUAU_CONCAT_OPERATOR: (?<![.])(?:[.][.])(?![.])
  LUAU_TYPECAST_OPERATOR: (?:[:][:])
  LUAU_LENGTH_OPERATOR: (?:[#])
  LUAU_ALTERNATOR_OPERATOR: (?:[|])
  LUAU_TYPE_ANNOTATION_OPERATOR: (?<![:])(?:[:])(?![:])
  LUAU_ACCESSOR_OPERATOR: (?:[.]|[:])
  LUAU_TYPE_BINARY_OPERATORS: (?:[?]|[&]|[|]|[-][>])
  LUAU_VALUE_BINARY_OPERATORS: (?:{{LUAU_LOGICAL_KEYWORDS}}|{{LUAU_ASSIGNMENT_OPERATORS}}|{{LUAU_COMPARE_OPERATORS}}|{{LUAU_ARITHMETIC_OPERATORS}}|{{LUAU_CONCAT_OPERATOR}}|{{LUAU_TYPECAST_OPERATOR}})
  LUAU_BINARY_OPERATORS: (?:{{LUAU_TYPE_BINARY_OPERATORS}}|{{LUAU_VALUE_BINARY_OPERATORS}}|{{LUAU_ALTERNATOR_OPERATOR}})
  # Used as the lookahead set in `_LUAU_BINARY_OPERATOR_AHEAD_`. Deliberately
  # excludes the bare `|` token — `|` is overloaded as both a type-union
  # operator (`Foo | Bar`) AND the alternator-arm separator. When a value
  # expression (parenthetical, string, number, table, etc.) is followed by
  # ` | <arm-name> = ...`, treating the pipe as a binary operator would
  # consume the trailing whitespace and prevent the surrounding alternator
  # block's `LuauAlternatorSeparator` from matching `<ws>|<ws>` itself.
  # Type unions written in expression context are an edge case that loses
  # the trailing-WS-as-OptionalSeparator optimization here — `|` in unions
  # still highlights via the type-context rules separately.
  LUAU_BINARY_OPERATOR_AHEAD_LOOKAHEAD: (?:{{LUAU_VALUE_BINARY_OPERATORS}}|[?]|[&]|[-][>])
  # NOTE: Intentional exception to the "no capture groups in variables" rule. The `({{WS}}*)` group is captured on purpose — host
  # rules use the captured trailing whitespace as their final
  # `OptionalSeparator`. This pattern is appended to the end of nearly every
  # Luau expression rule, so writing it as a variable (with the capture
  # baked in) is far more readable than re-typing
  # `(?:({{WS}}*)(?={{LUAU_BINARY_OPERATOR_AHEAD_LOOKAHEAD}})|(?=$|.))`
  # at every use site. The capture-index
  # math at each call site is local and stable; the maintenance win is
  # significant. If you reach for this pattern elsewhere, remember it adds
  # exactly one capture group to the host rule.
  _LUAU_BINARY_OPERATOR_AHEAD_: (?:({{WS}}*)(?={{LUAU_BINARY_OPERATOR_AHEAD_LOOKAHEAD}})|(?=$|.))

patterns:
  - { include: "#EndOfLine" }
  - { include: "#Newline" }

  - { include: "#FrontMatter" }
  - { include: "#Annotation" }

  - { include: "#Include" }
  - { include: "#Run" }

  - { include: "#Scene" }
  - { include: "#Branch" }

  # `external message(x)` — declaration of a host-bound callable. Only legal
  # at top level (no `&` prefix, not inside scenes/branches/functions). The
  # declaration registers a signature with the parsed-hierarchy `Story.externals`
  # map; the call site (`& message("hi")` or `{multiply(5,3)}`) goes through
  # the regular `FunctionCall` → `Divert` lowering, and `Divert.
  # GenerateRuntimeObject` flips `runtimeDivert.isExternal = true` when the
  # target name matches a registered external.
  - { include: "#LuauExternalDeclaration" }

  - { include: "#LuauExplicitStatement" }
  - { include: "#LuauDeclarations" }
  - { include: "#LuauSparkdownControlBlock" }
  - { include: "#LuauInterpolatedStringExpression" }
  - { include: "#LuauEndKeyword" }

  - { include: "#SparkdownStatement" }

  - { include: "#Whitespace" }

repository:
  ########## Sparkdown Statements ##########

  SparkdownStatement:
    patterns:
      - { include: "#Choice" }
      - { include: "#FlowStatements" }
      - { include: "#DisplayStatements" }

  FlowStatements:
    patterns:
      - { include: "#DoneStatement" }
      - { include: "#FinStatement" }
      - { include: "#Divert" }
      - { include: "#Thread" }
      - { include: "#LabelAnchor" }

  DisplayStatements:
    patterns:
      # `//` line comment for DISPLAY/prose contexts only. Luau scope uses
      # `--` for comments (and `//` for floor division); display uses `--`
      # for em-dashes, so `//` is the prose comment. DisplayStatements is
      # NOT included in Luau-code contexts, so this never shadows `//`
      # floor division there. First, so a `//` line isn't eaten as Action.
      - { include: "#SparkdownLineComment" }
      - { include: "#Title" }
      - { include: "#Heading" }
      - { include: "#Transitional" }
      - { include: "#Write" }
      - { include: "#Dialogue" }
      - { include: "#AssetLine" }
      - { include: "#Action" }

  # A whole-line `//` comment (after optional indent). Display-only — see
  # DisplayStatements. The captures tile the line so the parser advances.
  # `//` must be followed by whitespace or end-of-line (mirroring the `#`
  # tag convention `[#]+(?=$|{{WS}})`); this also keeps a protocol URL like
  # `//cdn…` — where a non-space follows `//` — from reading as a comment.
  SparkdownLineComment:
    tag: lineComment
    name: comment.line.double-slash.sd
    match: ^({{WS}}*)([/]{2})(?=$|{{WS}})([^\n]*)$
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        name: punctuation.definition.comment.sd
      3:
        name: comment.line.double-slash.content.sd

  # An end-of-line `//` comment that follows display text on the same line
  # (e.g. `Some dialogue. // a note`). `//` must be followed by whitespace or
  # end-of-line (the marker convention), so a URL (`https://…`) — where `//`
  # is followed by a host char — is never mistaken for a comment. Any
  # whitespace BEFORE `//` is consumed into the comment so no trailing space
  # is left on the visible text. Whole-line comments are handled earlier by
  # SparkdownLineComment; this only fires mid-line, reached from DisplayLine
  # after TextChunk yields at the `//` boundary.
  SparkdownInlineComment:
    tag: lineComment
    name: comment.line.double-slash.sd
    match: ({{WS}}*)([/]{2})(?=$|{{WS}})([^\r\n]*)
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        name: punctuation.definition.comment.sd
      3:
        name: comment.line.double-slash.content.sd

  ########## Annotation ##########

  # `Annotation` is the DISPLAY-context line decoration: screenplay
  # `[[tag]]` markup only. It must NOT include Luau comments. Display/prose
  # uses `--` for em-dashes and `---` for the front-matter fence, so a
  # Luau-comment rule here would (a) swallow the opening `---` of the title
  # page as a `---` doc comment and (b) turn every prose em-dash into a
  # line comment. Luau comments belong ONLY to actual Luau-code contexts
  # (`LuauExpression`, `LuauFunctionBody`, `LuauBlockBody`, define bodies,
  # …), which each include `#LuauComment` directly — never through here.
  Annotation:
    patterns:
      - { include: "#Tags" }

  ########## Tag ##########

  Tags:
    tag: docComment
    name: comment.line.sd entity.tag.sd
    begin: ({{WS}}*)(?={{TAG_START}})
    captures:
      1:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Tag" }
    end: (?=$)

  Tag:
    tag: docComment
    name: comment.line.sd entity.tag.sd
    match: ({{WS}}*)({{TAG_START}})(.*?)(?:(?={{TAG_START}})|$)
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: definition(docComment)
        name: punctuation.definition.comment.sd comment.line.sd entity.tag.begin.sd
      3:
        patterns:
          - { include: "#TagContent" }

  TagContent:
    tag: definition(docComment)
    name: punctuation.definition.comment.content.sd
    match: (.+?)(?=$|{{TAG_START}})

  ########## Include ##########

  Include:
    tag: meta
    name: meta.import.include.sd
    begin: ^({{WS}}*)(include)({{EOK}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#IncludeKeyword" }
      3:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#IncludeContent" }
    end: (?=$)

  IncludeKeyword:
    tag: controlKeyword
    name: keyword.control.definition.include.sd

  IncludeContent:
    tag: string
    name: string.include.sd
    match: (.+?)(?={{EOL}})

  ########## Run ##########

  # `run "path"` (extension implicit — always `.luau`). Top-level
  # statement only. Reads the named `.luau` file, wraps its body in
  # an anonymous function, and calls it immediately. dofile-style:
  # no return value, no module binding. Lets authors splice verbatim
  # Luau source into a sparkdown program by reference. Cycles error.
  Run:
    tag: meta
    name: meta.import.run.sd
    begin: ^({{WS}}*)(run)({{EOK}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#RunKeyword" }
      3:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#RunContent" }
    end: (?=$)

  RunKeyword:
    tag: controlKeyword
    name: keyword.control.definition.run.sd

  RunContent:
    tag: string
    name: string.run.luau.sd
    match: (.+?)(?={{EOL}})

  ########## Break ##########

  Break:
    tag: special(content)
    name: meta.break.sd
    match: ({{BREAK}})
    captures:
      1:
        tag: keyword
        name: keyword.other.break.sd

  ########## Chain ##########

  Chain:
    tag: special(meta)
    name: meta.chain.sd
    match: ({{WS}}*)({{CHAIN}})(?:({{WS}}+)$|({{WS}}*))
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: keyword
        name: keyword.other.chain.sd
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#RequiredWhitespace" }

  ########## Glue ##########

  Glue:
    tag: meta
    name: meta.glue.sd
    match: ({{WS}}*)({{GLUE}})
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: keyword
        name: keyword.other.glue.sd

  ########## Inline Glued Alternators ##########
  #
  # Inline display-text alternators are bracketed by `..` glue markers
  # within narrative text:
  #
  #   Here is some text .. queue|a|b|c .. and more text after.
  #
  # Required `..` delimiters give the grammar an unambiguous scope.
  # Inside the scope, arm bodies are parsed as display content (text +
  # nested `{interp}`), with `|` separating arms.
  #
  # Mirrors the structural shape of `LuauSparkdownSequentialAlternatorBlock`
  # (and the conditional variant) so the existing lowerer's dynamic
  # prefix derivation handles all three uniformly. The lowerer reads
  # `<prefix>_begin` for the keyword + modifier and `<prefix>_content`
  # for the arms.

  LuauSparkdownInlineGluedSequentialAlternatorBlock:
    begin: ({{WS}}*)({{GLUE}})({{WS}}+)(?:({{LUAU_SEQUENTIAL_MODIFIER_KEYWORDS}})({{WS}}+))?({{LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS}})({{WS}}*)(?!{{WS}}*[.])
    beginCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        patterns:
          - { include: "#Glue" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#LuauControlKeyword" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        patterns:
          - { include: "#LuauControlKeyword" }
      7:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauAlternatorSeparator" }
      - { include: "#LuauSparkdownInlineGluedAlternatorArm" }
    end: ({{WS}}+)(?={{GLUE}})
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }

  LuauSparkdownInlineGluedConditionalAlternatorBlock:
    begin: ({{WS}}*)({{GLUE}})({{WS}}+)({{LUAU_CONDITIONAL_ALTERNATOR_KEYWORDS}})({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        patterns:
          - { include: "#Glue" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#LuauControlKeyword" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauConditionalAlternatorCondition" }
      - { include: "#LuauAlternatorSeparator" }
      - { include: "#LuauSparkdownInlineGluedAlternatorArm" }
    end: ({{WS}}+)(?={{GLUE}})
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }

  # Arm body of an inline-glued alternator. Display content bounded by
  # the next `|` separator OR the closing `..` of the surrounding
  # alternator. Supports nested `{interp}` expressions, escape
  # sequences, plain text, and `# tag` annotations (`ArmTag` matches
  # bounded by `|` / closing-`..` instead of EOL).
  LuauSparkdownInlineGluedAlternatorArm:
    begin: (?=\S)(?![|])
    patterns:
      - { include: "#Escape" }
      # `ArmDivert` is matched before `InlineText` so `-> target` inside
      # an arm is recognized as a real divert rather than three characters
      # of display text. Critical for flat-weave-style alternators-with-
      # diverts (`{chain | -> A | B end}`) where the first arm transfers
      # control on each visit. Without this include, the arm body lowerer
      # would have nothing structural to dispatch through and the divert
      # would be silently stringified.
      - { include: "#ArmDivert" }
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#ArmTag" }
      - { include: "#InlineText" }
    end: (?=[|]|{{WS}}+{{GLUE}})

  # Arm body of a block-form alternator (`queue | a | b | c end` on one
  # line, or the multi-line `queue\n  | a\n  | b\nend` shape). Display
  # content bounded by the next `|` separator, the closing `end`
  # keyword, or end-of-line.
  LuauSparkdownAlternatorArm:
    begin: (?=\S)(?![|])
    patterns:
      - { include: "#Escape" }
      # See note on `LuauSparkdownInlineGluedAlternatorArm` above —
      # diverts inside arms need to be matched as structural nodes so
      # the lowerer can route them through `buildDivert`.
      - { include: "#ArmDivert" }
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#ArmTag" }
      - { include: "#InlineText" }
    end: (?=[|]|{{END}}(?:$|{{WS}})|$|{{NL}})

  # Context-bounded divert for alternator arms. The standard `Divert`
  # rule's `end: (?=$)` terminates at end-of-line, which inside an
  # alternator arm would swallow the `|` separator and `end` keyword
  # that bound the arm. `ArmDivert` mirrors the inkjs `ArmTag` pattern:
  # same captures as `Divert` (TunnelMark/DivertMark + target + tunnel
  # chain) but with an end pattern that stops at the alternator
  # boundaries. The lowerer dispatch sees the same `Divert` node name
  # via the `name:` field below, so `buildDivert` handles it uniformly.
  ArmDivert:
    name: meta.divert
    begin: ({{WS}}*)([-][>][-][>]|[-][>])
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#TunnelMark" }
          - { include: "#DivertMark" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Tunnel" }
      - { include: "#DivertTarget" }
      - { include: "#ExtraWhitespace" }
    end: (?=[|]|{{END}}(?:$|{{WS}})|$|{{NL}}|{{WS}}+{{GLUE}})

  # Context-bounded `# tag` annotation for alternator arms. The
  # standard `Tag` rule terminates at end-of-line, which inside an
  # alternator would swallow subsequent `|` separators / closing
  # `end` / closing `..`. `ArmTag` stops at the alternator boundary
  # instead, preserving per-arm scoping.
  ArmTag:
    tag: docComment
    name: comment.line.sd entity.tag.sd
    match: ({{WS}}*)({{TAG_START}})(.*?)(?=[|]|{{WS}}+{{GLUE}}|{{END}}(?:$|{{WS}})|$)
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: definition(docComment)
        name: punctuation.definition.comment.sd comment.line.sd entity.tag.begin.sd
      3:
        patterns:
          - { include: "#ArmTagContent" }

  ArmTagContent:
    tag: content
    name: punctuation.definition.comment.content.sd

  ########## Choice ##########

  Choice:
    name: entity.choice.sd
    # Begin pattern, captures by group:
    #   1: leading indent
    #   2: `*` / `+` mark (with optional repeated marks)
    #   3: optional `(label)`
    #   4: optional `if` keyword (gate)
    #   5: mandatory whitespace after `if`
    #   6: optional condition expression — single identifier
    #      `if has_key`, dotted path `if player.alive`, optional `not`
    #      prefix `if not has_key`, or parenthesized arbitrary
    #      expression `if (a and b > 0)`. Followed by mandatory
    #      whitespace before the choice text. Wrapped by the
    #      `ChoiceCondition` named rule so the lowerer can address
    #      it by name (§6.4) — `Choice_begin_c6` would otherwise be
    #      auto-generated and unstable.
    #   7: optional trailing newline
    begin: ({{WS}}*)((?:[*]{{EOK}})+|(?:[+]{{EOK}})+)([(][^()]*[)]{{WS}}*)?(?:(if)\b({{WS}}+)((?:not\b{{WS}}+)?(?:[(][^()]*[)]|{{LUAU_IDENTIFIER}}(?:[.]{{LUAU_IDENTIFIER}})*))(?={{WS}}|$))?(\r\n|\r|\n)?
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#ChoiceMark" }
      3:
        patterns:
          - { include: "#Label" }
      4:
        patterns:
          - { include: "#LuauIfKeyword" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      6:
        patterns:
          - { include: "#ChoiceCondition" }
      7:
        patterns:
          - { include: "#Newline" }

    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#ChoiceConditional" }
      - { include: "#ChoiceWithSuppressedText" }
      - { include: "#ChoiceWithNoSuppressedText" }
    end: (?=$)

  ChoiceCondition:
    emit: true
    patterns:
      - { include: "#LuauExpression" }

  ChoiceConditional:
    name: entity.choice.sd
    match: ^({{WS}}*)((?:[{][^{}]*[}]{{WS}}*)+)(\r\n|\r|\n)
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauInterpolatedStringExpression" }
      3:
        patterns:
          - { include: "#Newline" }

  ChoiceMark:
    tag: keyword
    name: keyword.operator.expression.list.sd

  ChoiceWithSuppressedText:
    match: (.*?)(\[)(.*?)(\])(.*?)(?:({{WS}}*)$|({{WS}}*)([-][>].*$))
    captures:
      1:
        patterns:
          - { include: "#ChoiceStartText" }
      2:
        tag: keyword
        name: punctuation.definition.template-expression.begin.choice.suppression.sd
      3:
        patterns:
          - { include: "#ChoiceOnlyText" }
      4:
        tag: keyword
        name: punctuation.definition.template-expression.end.choice.suppression.sd
      5:
        patterns:
          - { include: "#ChoiceInnerText" }
      6:
        patterns:
          - { include: "#ExtraWhitespace" }
      7:
        patterns:
          - { include: "#RequiredWhitespace" }
      8:
        patterns:
          - { include: "#Divert" }

  ChoiceWithNoSuppressedText:
    # `.*?` (not `.+?`) so a fallback `* -> target` choice — which has
    # NO text between the mark and the divert — leaves capture group 1
    # empty and routes the `-> target` into the divert capture instead
    # of greedily consuming it as choice text.
    match: (.*?)(?:({{WS}}*)$|({{WS}}*)([-][>].*$))
    captures:
      1:
        patterns:
          - { include: "#ChoicePlainText" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#RequiredWhitespace" }
      4:
        patterns:
          - { include: "#Divert" }

  # Named wrappers for the four choice-text captures — distinct per
  # capture so the lowerer can address each by name (§6.4) instead of
  # the auto-generated `_cN` capture-index strings. Inner highlighting
  # is delegated to `ChoiceTextContent` (text before/inside the
  # brackets) or `DisplayText` (text after the closing bracket).
  # `emit: true` is required so the wrapper node appears in the tree —
  # a pure-`patterns:` dispatcher would be invisible (§5.3).
  ChoiceStartText:
    emit: true
    patterns:
      - { include: "#ChoiceTextContent" }

  ChoiceOnlyText:
    emit: true
    patterns:
      - { include: "#ChoiceTextContent" }

  ChoiceInnerText:
    emit: true
    patterns:
      - { include: "#DisplayText" }

  ChoicePlainText:
    emit: true
    patterns:
      - { include: "#ChoiceTextContent" }

  ChoiceTextContent:
    tag: string
    name: string.choice.sd

    captures:
      1:
        patterns:
          - { include: "#Annotation" }
          - { include: "#LuauInterpolatedStringExpression" }
          - { include: "#DisplayText" }

  ########## Label Anchor ##########
  # `label NAME` declares a named divert target outside a weave —
  # typically inside an `if` block, knot, etc. (Weave gathers use
  # `then (label)` inside a `choose` block — see DIVERGENCES.md.)
  # The line's body content after the label is parsed as sibling
  # statements that the inkjs Weave assembly attaches as the anchor's
  # body, mirroring how the legacy `- (label)` form worked.

  LabelAnchor:
    match: ^({{WS}}*)(label)\b({{WS}}*)({{IDENTIFIER}})({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauLabelKeyword" }
      3:
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LabelDeclarationName" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }

  LuauLabelKeyword:
    tag: controlKeyword
    name: keyword.control.label.luau
    match: (label)\b

  ########## Label ##########

  Label:
    match: ([(])({{WS}}*)({{IDENTIFIER}})({{WS}}*)([)])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#LabelBeginMark" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#LabelDeclarationName" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
      5:
        patterns:
          - { include: "#LabelEndMark" }
      6:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LabelBeginMark:
    tag: keyword
    name: keyword.flow.label.sd

  LabelEndMark:
    tag: keyword
    name: keyword.flow.label.sd

  LabelDeclarationName:
    tag: definition(heading)
    name: keyword.control.section.sd

  ########## Scene ##########

  Scene:
    # Scenes are *boundary-only* Scoped rules — they cover the
    # declaration line and nothing more. The scene body lives at root
    # so an edit inside a large scene doesn't force a re-parse of the
    # whole scene. See GRAMMAR.md §16.3 (the canonical "don't wrap
    # potentially-large regions" example) and §16.4 (why
    # LuauFunctionDefinition gets to break this rule but Scene
    # doesn't). The terminating `end` keyword is matched separately
    # by `LuauEndKeyword` at the top-level patterns list; the lowerer
    # pairs declarations with their matching `end` to reconstruct
    # scope hierarchy.
    begin: ^({{WS}}*)(scene)({{EOK}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#SceneKeyword" }
      3:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#SceneWithParametersDeclaration" }
      - { include: "#SceneWithoutParametersDeclaration" }
      # A boundary rule MUST consume its entire declaration line so it
      # always closes at `end: $` rather than `ERROR_INCOMPLETE`. The tree
      # parser matches contiguously and cannot skip over un-tiled trailing
      # text the way vscode-textmate's per-line scanner does; if a stray
      # `:` / `//` / `#` were left un-consumed here the rule would close
      # incomplete, the tree would re-enter root matching MID-LINE, and an
      # `^`-anchored `begin` rule (e.g. `BlockAction`) would spuriously fire
      # where vscode never opens one. Tiling the rest of the line keeps both
      # engines in lock-step. See GRAMMAR.md §17.
      - { include: "#SparkdownLineComment" }
      - { include: "#Annotation" }
      - { include: "#Unknown" }
    end: $

  SceneWithParametersDeclaration:
    begin: ({{IDENTIFIER}})({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#SceneDeclarationName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauFunctionParameters" }
    end: (?=$|{{COMMENT_START}}|{{WS}}*(?![(]))

  SceneWithoutParametersDeclaration:
    match: ({{IDENTIFIER}})({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#SceneDeclarationName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }

  SceneKeyword:
    tag: controlKeyword
    name: keyword.control.scene.sd

  SceneDeclarationName:
    tag: definition(heading)
    name: keyword.control.section.sd

  ########## Branch ##########

  Branch:
    # Like `Scene`, branch is a boundary-only Scoped rule — declaration
    # line only, body at root, lowerer pairs with `end` keyword. See
    # GRAMMAR.md §16.3.
    begin: ^({{WS}}*)(branch)({{EOK}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#BranchKeyword" }
      3:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#SparkdownLineComment" }
      - { include: "#Annotation" }
      - { include: "#BranchWithParametersDeclaration" }
      - { include: "#BranchWithoutParametersDeclaration" }
      # Tile the rest of the line so the rule always closes at `end: $`
      # rather than `ERROR_INCOMPLETE` (see the matching note on `Scene`
      # and GRAMMAR.md §17).
      - { include: "#Unknown" }
    end: $

  BranchWithParametersDeclaration:
    begin: ({{IDENTIFIER}})({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#BranchDeclarationName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauFunctionParameters" }
    end: (?=$|{{COMMENT_START}}|{{WS}}*(?![(]))

  BranchWithoutParametersDeclaration:
    match: ({{IDENTIFIER}})({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#BranchDeclarationName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }

  BranchKeyword:
    tag: controlKeyword
    name: keyword.control.branch.sd

  BranchDeclarationName:
    tag: definition(heading)
    name: keyword.control.section.sd

  ########## Divert & Thread ##########

  Divert:
    begin: ({{WS}}*)([-][>][-][>]|[-][>])
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#TunnelMark" }
          - { include: "#DivertMark" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Tunnel" }
      - { include: "#DivertTarget" }
      - { include: "#ExtraWhitespace" }
    end: (?=$)

  Tunnel:
    begin: ({{WS}}*)([-][>])
    beginCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#DivertMark" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Tunnel" }
      - { include: "#DivertTarget" }
      - { include: "#ExtraWhitespace" }
    end: (?=$)

  Thread:
    begin: ^({{WS}}*)([<][-])
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#ThreadMark" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#DivertTarget" }
      - { include: "#ExtraWhitespace" }
    end: (?=$|[^\s{{IDENTIFIER_END_CHAR}}])

  DivertMark:
    tag: controlKeyword
    name: keyword.control.divert.mark.sd
    match: ([-][>])

  TunnelMark:
    tag: controlKeyword
    name: keyword.control.divert.mark.sd
    match: ([-][>][-][>])

  ThreadMark:
    tag: controlKeyword
    name: keyword.control.thread.mark.sd
    match: ([<][-])

  DoneStatement:
    match: ^({{WS}}*)(done)({{EOK}})
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#DoneKeyword" }
      3:
        patterns:
          - { include: "#OptionalWhitespace" }

  FinStatement:
    match: ^({{WS}}*)(fin)({{EOK}})
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#FinKeyword" }
      3:
        patterns:
          - { include: "#OptionalWhitespace" }

  DoneKeyword:
    tag: controlKeyword
    name: keyword.control.divert.done.sd

  FinKeyword:
    tag: controlKeyword
    name: keyword.control.divert.fin.sd

  DivertTarget:
    tag: heading
    name: keyword.control.divert.path.sd
    begin: ({{WS}}*)(?={{IDENTIFIER}}|[.^])
    beginCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#LuauFunctionCall" }
      - { include: "#DivertPath" }
    end: (?=$)|(?!{{IDENTIFIER}}|[.^])

  DivertPath:
    tag: heading
    name: keyword.control.divert.path.sd
    begin: (?={{IDENTIFIER}}|[.^])
    patterns:
      - { include: "#Annotation" }
      - { include: "#DivertPart" }
    end: (?=$)|(?!{{IDENTIFIER}}|[.^])

  DivertPart:
    emit: true
    patterns:
      - { include: "#PunctuationAccessor" }
      - { include: "#DivertPartNumber" }
      - { include: "#DivertPartOperator" }
      - { include: "#DivertPartName" }

  DivertPartNumber:
    tag: heading
    name: keyword.control.divert.path.sd
    match: ([0-9]+)

  DivertPartOperator:
    tag: heading
    name: keyword.control.divert.path.sd
    match: ([.^])

  DivertPartName:
    tag: heading
    name: keyword.control.divert.path.sd
    match: ({{IDENTIFIER}})

  ########## Whitespace ##########

  Newline:
    tag: content
    name: punctuation.whitespace.newline.sd
    match: ({{NL}})

  # Whitespace taxonomy (see GRAMMAR.md §12). The formatter dispatches
  # by *position* first — line-start runs are treated as indent and
  # line-end runs as trailing whitespace regardless of which capture
  # they sit under — and falls back to the node name for mid-line
  # runs:
  #   - Whitespace         — preserve as-is (dialogue body text,
  #                          glue/break pacing).
  #   - ExtraWhitespace    — collapse to nothing.
  #   - RequiredWhitespace — normalize to exactly one space; insert
  #                          one if the capture matched zero chars.
  #   - OptionalWhitespace — at line start the formatter treats it as
  #                          indent; mid-line, normalize to one space
  #                          (insert if zero-width); at end of line,
  #                          trim. Use this for leading-WS captures.
  #
  # `RequiredWhitespace` (regex `+`) and `OptionalWhitespace` (regex
  # `*`) are grammar-side documentation of the rule author's intent;
  # mid-line, the formatter treats them identically.
  #
  # There's no dedicated `Indent` / `TrailingWhitespace` rule — the
  # formatter detects those positions via line-start / line-end
  # checks and routes to the right edit type. Trailing whitespace
  # respects the LSP `trimTrailingWhitespace` option.
  ExtraWhitespace:
    tag: content
    name: punctuation.whitespace.extra.sd
    match: ({{WS}}+)

  Whitespace:
    tag: content
    name: punctuation.whitespace.sd
    match: ({{WS}}+)

  RequiredWhitespace:
    tag: definition(content)
    name: punctuation.whitespace.required.sd
    match: ({{WS}}+)

  OptionalWhitespace:
    tag: definition(content)
    name: punctuation.whitespace.optional.sd
    match: ({{WS}}*)

  # Restored just for the `EndOfLine` Switch — the formatter's
  # position-based line-end check would catch this, but we still
  # need a *parser*-level rule that only matches at line end so we
  # don't accidentally consume leading whitespace inside `EndOfLine`
  # at top-level. The formatter still routes the node through the
  # "trailing" path via name-based dispatch.
  TrailingWhitespace:
    tag: local(content)
    name: punctuation.whitespace.trailing.sd
    match: (?<!^)({{WS}}+)$

  EndOfLine:
    patterns:
      - { include: "#Annotation" }
      - { include: "#TrailingWhitespace" }

  ########## Operators ##########

  ColonOperator:
    tag: logicOperator
    name: meta.template.expression.operator.colon.sd
    match: ([:])

  ColonSeparator:
    tag: definition(logicOperator)
    name: meta.template.expression.operator.colon.sd
    match: ([:])

  PunctuationStringDoubleQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.double.begin.sd
    match: (["])

  PunctuationStringDoubleQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.double.end.sd
    match: (["])

  PunctuationStringSingleQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.single.begin.sd
    match: (['])

  PunctuationStringSingleQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.single.end.sd
    match: (['])

  PunctuationStringBacktickQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.backtick.begin.sd
    match: ([`])

  PunctuationStringBacktickQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.backtick.end.sd
    match: ([`])

  PunctuationStringBracketQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.bracket.begin.sd
    match: (\[)

  PunctuationStringBracketQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.bracket.end.sd
    match: (\])

  PunctuationStringEqualQuoteOpen:
    tag: definition(string)
    name: punctuation.definition.string.equal.begin.sd
    match: ([=]+)

  PunctuationStringEqualQuoteClose:
    tag: definition(string)
    name: punctuation.definition.string.equal.end.sd
    match: ([=]+)

  PunctuationParenOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: ([(])

  PunctuationParenClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: ([)])

  PunctuationBracketOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: (\[)

  PunctuationBracketClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: (\])

  PunctuationBraceOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: (\{)

  PunctuationBraceClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: (\})

  PunctuationAngleOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: ([<])

  PunctuationAngleClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: ([>])

  PunctuationDoubleAngleOpen:
    tag: keyword
    name: punctuation.definition.template-expression.begin.sd
    match: ([<][<])

  PunctuationDoubleAngleClose:
    tag: keyword
    name: punctuation.definition.template-expression.end.sd
    match: ([>][>])

  PunctuationAccessor:
    tag: separator
    name: meta.template.expression.accessor.sd
    match: ([.])

  ########## Color ##########

  Color:
    emit: true
    patterns:
      - { include: "#HEXColor" }
      - { include: "#RGBColor" }
      - { include: "#HSLColor" }

  HEXColor:
    tag: string
    name: string.color.hex.sd
    match: (#)([0-9a-fA-F]{3,})
    color: true

  RGBColor:
    tag: string
    name: string.color.rgb.sd
    match: (rgb)(a)?([(])(.*)([)])
    color: true

  HSLColor:
    tag: string
    name: string.color.hsl.sd
    match: (hsl)(a)?([(])(.*)([)])
    color: true

  ########## FrontMatter ##########

  FrontMatter:
    tag: meta
    name: meta.front-matter.sd
    begin: ^([-]{3,})($|{{WS}}*$)
    beginCaptures:
      1:
        tag: keyword
        name: keyword.other.front-matter.dashes.start.sd
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#FrontMatterField" }
      - { include: "#Newline" }
      - { include: "#Unknown" }
    end: ^([-]{3,})($|{{WS}}*$)?
    endCaptures:
      1:
        tag: keyword
        name: keyword.other.front-matter.dashes.end.sd
      2:
        patterns:
          - { include: "#ExtraWhitespace" }

  FrontMatterField:
    tag: meta
    name: meta.front-matter.field.sd
    begin: ^(?!{{WS}}+)([^{}:\r\n]+)({{WS}}*)($|[:])($|.*$(?:\r\n|\r|\n)?)
    beginCaptures:
      1:
        patterns:
          - { include: "#FrontMatterFieldKeyword" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#FrontMatterStringInline" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#FrontMatterStringBlock" }
      - { include: "#Newline" }
      - { include: "#Unknown" }
    end: (?=^(?!{{WS}}+)[^{}:\r\n]+{{WS}}*(?:$|[:])|[-]{3,})

  FrontMatterFieldKeyword:
    tag: keyword
    name: keyword.other.front-matter.field.sd

  FrontMatterStringInline:
    match: ({{WS}}*)($|.+$(?:\r\n|\r|\n)?)
    captures:
      1:
        patterns:
          - { include: "#RequiredWhitespace" }
      2:
        patterns:
          - { include: "#FrontMatterString" }

  FrontMatterStringBlock:
    match: ^({{WS}}+)(.*$(?:\r\n|\r|\n)?)
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#FrontMatterString" }

  FrontMatterString:
    tag: string
    name: string.front-matter.string.sd
    begin: (?=.*$)
    patterns:
      - { include: "#LuauComment" }
      - { include: "#InlineText" }
    end: ($(?:\r\n|\r|\n)?)
    endCaptures:
      1:
        patterns:
          - { include: "#Newline" }

  ########## Title ##########

  Title:
    patterns:
      - { include: "#BlockTitle" }
      - { include: "#InlineTitle" }

  BlockTitle:
    tag: monospace
    name: string.display.title.block.sd
    begin: ^({{WS}}*)(\^)([:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#TitleMark" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#SparkdownLineComment" }
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))
  InlineTitle:
    tag: monospace
    name: string.display.title.inline.sd
    begin: ({{WS}}*)(\^)([:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#TitleMark" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])
  TitleMark:
    tag: definition(punctuation)
    name: punctuation.title.mark.sd

  ########## Heading ##########

  Heading:
    patterns:
      - { include: "#BlockHeading" }
      - { include: "#InlineHeading" }

  BlockHeading:
    tag: regexp
    name: string.display.heading.block.sd
    begin: ^({{WS}}*)([$])([:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#HeadingMark" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#SparkdownLineComment" }
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))
  InlineHeading:
    tag: regexp
    name: string.display.heading.inline.sd
    begin: ({{WS}}*)([$])([:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#HeadingMark" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])
  HeadingMark:
    tag: definition(punctuation)
    name: punctuation.heading.mark.sd

  HeadingLocationTime:
    match: INT[.]?[\/]EXT[.]|INT[.]|EXT[.]{{WS}}*(.*?){{WS}}+[-]{{WS}}+(.*?){{WS}}*$

  ########## Transitional ##########

  Transitional:
    patterns:
      - { include: "#BlockTransitional" }
      - { include: "#InlineTransitional" }

  BlockTransitional:
    tag: labelName
    name: string.display.transitional.block.sd
    begin: ^({{WS}}*)([%])([:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#TransitionalMark" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#SparkdownLineComment" }
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))
  InlineTransitional:
    tag: labelName
    name: string.display.transitional.inline.sd
    begin: ({{WS}}*)([%])([:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#TransitionalMark" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])
  TransitionalMark:
    tag: definition(punctuation)
    name: punctuation.transitional.mark.sd

  ########## Write ##########

  Write:
    patterns:
      - { include: "#BlockWrite" }
      - { include: "#InlineWrite" }

  BlockWrite:
    tag: definition(string)
    name: string.display.write.block.sd
    begin: ^({{WS}}*)([@])({{WS}}*)((?:\\.|[^:\r\n])*)((?<!\\)[:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#WriteMark" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#WriteTarget" }
      5:
        patterns:
          - { include: "#ColonSeparator" }
      6:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#SparkdownLineComment" }
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))
  InlineWrite:
    tag: definition(string)
    name: string.display.write.inline.sd
    begin: ({{WS}}*)([@])({{WS}}*)((?:\\.|[^:\r\n])*)((?<!\\)[:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#WriteMark" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#WriteTarget" }
      5:
        patterns:
          - { include: "#ColonSeparator" }
      6:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)
  WriteMark:
    tag: keyword
    name: keyword.action.mark.sd

  WriteTarget:
    tag: propertyName
    name: variable.other.property.write.target.sd

  ########## Dialogue ##########

  Dialogue:
    patterns:
      - { include: "#BlockDialogue" }
      - { include: "#InlineDialogue" }

  BlockDialogue:
    tag: definition(string)
    name: string.display.dialogue.block.sd
    begin: ^({{WS}}*)((?=\S)(?:\\.|[^{}:\r\n])+)((?<!\\)[:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#Annotation" }
          - { include: "#DialogueCharacter" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#SparkdownLineComment" }
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    # End when the next line:
    #  - is shallower than (or equal-indent to) the speaker line —
    #    `\1` is the captured leading WS of the speaker. `\1{{WS}}`
    #    requires at least one MORE whitespace char, so any line at
    #    or below the speaker's indent ends the block.
    #  - starts a structural construct that cannot be dialogue body
    #    regardless of its indent: a choice marker (`+` / `*`),
    #    divert (`->`), branch / scene / function / define
    #    declaration, or a `&`-prefixed Luau statement.
    # Without the explicit structural terminators, perturbing a
    # sibling choice's leading whitespace (e.g. `  + foo` →
    # `   + foo`) would absorb it into the prior dialogue's body.
    # The choice-marker terminator is `[*+]{{EOK}}` (NOT a bare `[*+]`):
    # a choice bullet requires an end-of-keyword boundary after it (EOL,
    # whitespace, or `:`/tag/comment — same `{{EOK}}` the `Choice` mark uses).
    # A bare `[*+]` also matched leading `*`/`+` of body markup (e.g. an
    # italic line `*Ay*, thank the Lord`), kicking the dialogue text out as a
    # top-level ImplicitAction — leaving the box empty AND dropping the
    # block's pathLocations (so it was unpreviewable).
    end: (?=^(?!$|//|\1{{WS}}))|(?=^{{WS}}*(?:[*+]{{EOK}}|->|[&%$^]|scene\b|branch\b|function\b|define\b|const\b|store\b|local\b))
  InlineDialogue:
    tag: definition(string)
    name: string.display.dialogue.inline.sd
    begin: ({{WS}}*)((?=\S)(?:\\.|[^{}:\r\n])+)((?<!\\)[:])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#Annotation" }
          - { include: "#DialogueCharacter" }
      3:
        patterns:
          - { include: "#ColonSeparator" }
      4:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)
  DialogueMark:
    tag: definition(typeName)
    name: entity.name.type.dialogue.character.name.sd

  DialogueCharacter:
    match: ({{WS}}*)(.*?)({{WS}}*)({{WS}}[(][^()]*?[)])?($|{{WS}}*)({{WS}}\[.*?\])?({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#DialogueCharacterName" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#DialogueCharacterParenthetical" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        patterns:
          - { include: "#DialogueCharacterPosition" }
      7:
        patterns:
          - { include: "#EndOfLine" }

  DialogueCharacterName:
    tag: typeName
    name: entity.name.type.dialogue.character.name.sd
    match: (.+$)
    captures:
      1:
        patterns:
          - { include: "#DisplayText" }

  DialogueCharacterParenthetical:
    tag: escape
    name: constant.character.escape.dialogue.character.parenthetical.sd
    match: ({{WS}})([(])({{WS}}*)([^()]*?)({{WS}}*)([)])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: paren
        name: meta.brace.round.open.sd
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#DisplayText" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        tag: paren
        name: meta.brace.round.close.sd
      7:
        patterns:
          - { include: "#ExtraWhitespace" }

  DialogueCharacterPosition:
    tag: definition(escape)
    name: constant.character.escape.dialogue.character.position.sd
    match: ({{WS}})(\[)({{WS}}*)(.*?)({{WS}}*)(\])
    captures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        tag: bracket
        name: punctuation.definition.position.sd
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#DialogueCharacterPositionContent" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        tag: bracket
        name: punctuation.definition.position.sd

  DialogueCharacterPositionContent:
    match: (.+$)

  ########## Action ##########

  Action:
    patterns:
      - { include: "#BlockAction" }
      - { include: "#InlineAction" }
      - { include: "#ImplicitAction" }

  BlockAction:
    begin: ^({{WS}}*)([:])({{WS}}*)(?={{EOL}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#ColonSeparator" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#SparkdownLineComment" }
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#BlockLineBlank" }
      - { include: "#BlockLineBreak" }
      - { include: "#BlockLineContinue" }
    end: (?=^(?!$|//|\1{{WS}}))
  InlineAction:
    begin: ({{WS}}*)(?:({{GLUE}})|([:])($|{{WS}}+))
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#Glue" }
      3:
        patterns:
          - { include: "#ColonOperator" }
      4:
        patterns:
          - { include: "#RequiredWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])
  ImplicitAction:
    begin: ({{WS}}*)(?!{{END}})(?=\S)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#Annotation" }
      - { include: "#Newline" }
      - { include: "#LineBreak" }
      - { include: "#LineChain" }
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#LineEnd" }
      - { include: "#ExtraWhitespace" }
    end: (?=^{{WS}}*$)|(?=\r\n|\r|\n)|(?=[#])
  ########## Parenthetical ##########

  ParentheticalLine:
    match: ({{WS}}*)((?:[=].*?[=]|[<].*?[>]|{{WS}}*)*)({{WS}}*)([(][^()]*?[)])({{WS}}*)((?:[=].*?[=]|[<].*?[>]|{{WS}}*)*)($|{{EOL}}|(?={{BREAK}})|{{CHAIN}}(?:{{WS}}))
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#TextCommand" }
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#ParentheticalLineContent" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        patterns:
          - { include: "#TextCommand" }
          - { include: "#ExtraWhitespace" }
      7:
        patterns:
          - { include: "#EndOfLine" }
          - { include: "#Chain" }

  ParentheticalLineContent:
    tag: escape
    name: constant.character.escape.sd
    match: ({{WS}}*)([(])({{WS}}*)([^()]*?)({{WS}}*)([)])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        tag: paren
        name: meta.brace.round.open.sd
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#DisplayText" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        tag: paren
        name: meta.brace.round.close.sd
      7:
        patterns:
          - { include: "#ExtraWhitespace" }

  ########## Text ##########

  BlockLineBreak:
    match: ({{WS}}*)(.*?)({{BREAK}})({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#AssetLine" }
          - { include: "#ParentheticalLine" }
          - { include: "#DisplayLine" }
      3:
        patterns:
          - { include: "#Break" }
      4:
        patterns:
          - { include: "#EndOfLine" }

  BlockLineContinue:
    begin: ({{WS}}*)(?=\S)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#AssetLine" }
      - { include: "#ParentheticalLine" }
      - { include: "#DisplayLine" }
    end: ({{WS}}*)(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }

  BlockLineBlank:
    match: ^({{WS}}+$)
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }

  LineChain:
    match: ({{WS}}*)(.*?)({{CHAIN}}(?:$|{{WS}}+))({{EOL}})(\r\n|\r|\n)?
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#DisplayLine" }
      3:
        patterns:
          - { include: "#Chain" }
      4:
        patterns:
          - { include: "#EndOfLine" }
      5:
        patterns:
          - { include: "#Newline" }

  LineBreak:
    match: ({{WS}}*)(.*?)({{BREAK}})({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#DisplayLine" }
      3:
        patterns:
          - { include: "#Break" }
      4:
        patterns:
          - { include: "#EndOfLine" }

  LineEnd:
    begin: ({{WS}}*)(?!{{EOL}})(?=\S)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#DisplayLine" }
    end: (?={{EOL}})

  DisplayLine:
    patterns:
      - { include: "#Annotation" }
      - { include: "#Escape" }
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#ParentheticalLine" }
      - { include: "#Chain" }
      # Inline-glued alternators (`.. queue|a|b|c ..`) must come before
      # `Glue` so the alternator-opening `..` wins when followed by an
      # alternator keyword. If the `..` is plain glue, the alternator
      # begin pattern fails to match and the Glue rule takes over.
      - { include: "#LuauSparkdownInlineGluedSequentialAlternatorBlock" }
      - { include: "#LuauSparkdownInlineGluedConditionalAlternatorBlock" }
      # End-of-line `//` comment after text — must come before Glue/TextChunk
      # so the ` //…` tail is consumed as a comment rather than display text.
      - { include: "#SparkdownInlineComment" }
      - { include: "#Glue" }
      - { include: "#TextChunk" }

  TextChunk:
    tag: special(string)
    name: string.display.text.chunk.sd
    begin: (?=.+)
    patterns:
      - { include: "#DisplayText" }
    end: (?=$|{{WS}}*{{CHAIN}}(?:$|{{WS}})|{{GLUE}}|{{EOL}}|{{WS}}*[/]{2}(?=$|{{WS}}))

  DisplayText:
    patterns:
      - { include: "#Annotation" }
      - { include: "#Escape" }
      - { include: "#ImageCommand" }
      - { include: "#AudioCommand" }
      - { include: "#InlineTextAndLogic" }

  ########## Commands ##########

  ImageLine:
    match: ^({{WS}}*)(?=\S)((?:\[\[(?:\\.|[^\]])*?\]\]|{{WS}}+)+)({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#ImageCommand" }
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#EndOfLine" }

  AudioLine:
    match: ^({{WS}}*)(?=\S)((?:[(][(](?:\\.|[^)])*?[)][)]|{{WS}}+)+)({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#AudioCommand" }
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#EndOfLine" }

  ImageAndAudioLine:
    match: ^({{WS}}*)(?=\S)((?:\[\[(?:\\.|[^\]])*?\]\]|[(][(](?:\\.|[^)])*?[)][)]|{{WS}}+)+)({{EOL}})
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#ImageCommand" }
          - { include: "#AudioCommand" }
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#EndOfLine" }

  AssetLine:
    patterns:
      - { include: "#ImageLine" }
      - { include: "#AudioLine" }
      - { include: "#ImageAndAudioLine" }

  ImageCommand:
    tag: macroName
    name: meta.image.sd
    brackets: true
    begin: (\[\[)({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#ImageBeginMark" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#ImageCommandContent" }
    end: $|({{WS}}*)(\]\])({{WS}}*)
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#ImageEndMark" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  ImageCommandContent:
    match: ((?:\\.|[^\]])*?)(?=$|{{WS}}*\]\])
    captures:
      1:
        patterns:
          - { include: "#AssetCommandContent" }

  AudioCommand:
    tag: macroName
    name: meta.audio.sd
    brackets: true
    begin: ([(][(])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#AudioBeginMark" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#AudioCommandContent" }
    end: $|({{WS}}*)([)][)])({{WS}}*)
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#AudioEndMark" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  AudioCommandContent:
    match: ((?:\\.|[^)])*?)(?=$|{{WS}}*[)][)])
    captures:
      1:
        patterns:
          - { include: "#AssetCommandContent" }

  AssetCommandContent:
    match: (.*?)($|(?:{{IMAGE_CLAUSE_KEYWORDS}}|{{AUDIO_CLAUSE_KEYWORDS}})(?=$|{{WS}}).*)
    captures:
      1:
        patterns:
          - { include: "#RequiredWhitespace" }
          - { include: "#AssetCommandInstruction" }
      2:
        patterns:
          - { include: "#Annotation" }
          - { include: "#RequiredWhitespace" }
          - { include: "#AssetCommandClauseKeyword" }
          - { include: "#TimeValue" }
          - { include: "#NumberValue" }
          - { include: "#NameValue" }

  AssetCommandInstruction:
    match: (?:({{IMAGE_CONTROL_KEYWORDS}}|{{AUDIO_CONTROL_KEYWORDS}})({{WS}}*)($|\S+)({{WS}}*))?(.*)
    captures:
      1:
        patterns:
          - { include: "#AssetCommandControl" }
      2:
        patterns:
          - { include: "#RequiredWhitespace" }
      3:
        patterns:
          - { include: "#AssetCommandTarget" }
      4:
        patterns:
          - { include: "#RequiredWhitespace" }
      5:
        patterns:
          - { include: "#AssetCommandAddOperator" }
          - { include: "#AssetCommandName" }
          - { include: "#RequiredWhitespace" }
          - { include: "#IllegalChar" }

  ImageBeginMark:
    tag: keyword
    name: keyword.operator.expression.begin.image.sd

  ImageEndMark:
    tag: keyword
    name: keyword.operator.expression.end.image.sd

  AudioBeginMark:
    tag: keyword
    name: keyword.operator.expression.begin.audio.sd

  AudioEndMark:
    tag: keyword
    name: keyword.operator.expression.end.audio.sd

  AssetCommandControl:
    tag: controlKeyword
    name: keyword.control.asset.control.sd

  AssetCommandTarget:
    tag: typeName
    name: entity.name.type.asset.target.sd

  AssetCommandClauseKeyword:
    tag: keyword
    name: keyword.asset.clause.keyword.sd
    match: ({{IMAGE_CLAUSE_KEYWORDS}}|{{AUDIO_CLAUSE_KEYWORDS}})

  AssetCommandName:
    match: (.+?)(?=$|[+])
    captures:
      1:
        patterns:
          - { include: "#RequiredWhitespace" }
          - { include: "#LuauString" }
          - { include: "#AssetCommandKeywordNone" }
          - { include: "#AssetCommandFilteredFileName" }
          - { include: "#AssetCommandFileName" }
          - { include: "#AssetCommandFilter" }
          - { include: "#IllegalChar" }

  AssetCommandKeywordNone:
    tag: keyword
    name: keyword.asset.keyword.none.sd
    match: (none)

  AssetCommandFilteredFileName:
    tag: constant(variableName)
    name: variable.other.constant.asset.file.sd
    match: ({{IDENTIFIER}})((?:[~][^~\s]+)+)
    captures:
      1:
        patterns:
          - { include: "#AssetCommandFileName" }
      2:
        patterns:
          - { include: "#AssetCommandFilter" }

  AssetCommandFileName:
    tag: constant(variableName)
    name: variable.other.constant.asset.file.sd
    match: ({{IDENTIFIER}})

  AssetCommandAddOperator:
    tag: propertyName
    name: variable.other.property.add.sd
    match: ({{WS}}*[+]{{WS}}*)

  AssetCommandFilter:
    match: ([~])($|[^~\s]+)?
    captures:
      1:
        patterns:
          - { include: "#AssetCommandFilterOperator" }
      2:
        patterns:
          - { include: "#AssetCommandFilterName" }

  AssetCommandFilterOperator:
    tag: propertyName
    name: variable.other.property.filter.sd
    match: ([~])

  AssetCommandFilterName:
    tag: constant(variableName)
    name: variable.other.constant.asset.filter.sd
    match: ([^~\s]+)

  WhitespaceAssetCommandClause:
    tag: content
    name: punctuation.whitespace.sd
    match: ({{WS}}+)

  TimeValue:
    tag: number
    name: constant.numeric.time.sd
    match: ([-]?(?:\d*[.])?\d+)(ms|s)(?=$|{{WS}})
    captures:
      1:
        tag: number
        name: constant.numeric.time.amount.sd
      2:
        tag: number
        name: constant.numeric.time.unit.sd

  NumberValue:
    tag: number
    name: constant.numeric.number.sd
    match: ([-]?(?:\d*[.])?\d+)(?=$|{{WS}})

  NameValue:
    tag: constant(variableName)
    name: variable.other.constant.sd
    match: ({{IDENTIFIER}})(?=$|{{WS}})

  InvalidValue:
    tag: content
    name: markup.raw.text.sd
    match: (\S+)

  TextCommand:
    tag: macroName
    name: meta.text.sd
    match: ([<](?!{{WS}}))((?:\\.|[^>])*?)((?<![-])[>])
    captures:
      1:
        tag: keyword
        name: keyword.operator.expression.begin.tag.sd
      2:
        patterns:
          - { include: "#TextCommandContent" }
      3:
        tag: keyword
        name: keyword.operator.expression.end.tag.sd

  TextCommandContent:
    match: ({{WS}}*)([^ :]+)({{WS}}*)(?:([:])({{WS}}*)(.*))?
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#TextCommandControl" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#ColonOperator" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }
      6:
        patterns:
          - { include: "#TextCommandArguments" }

  TextCommandControl:
    captures:
      1:
        patterns:
          - { include: "#LuauNumber" }
          - { include: "#TextCommandControlKeyword" }

  TextCommandControlKeyword:
    tag: keyword
    name: keyword.style.control.keyword.sd

  TextCommandArguments:
    captures:
      1:
        patterns:
          - { include: "#TextCommandArgument" }

  TextCommandArgument:
    tag: meta
    name: meta.argument.sd
    begin: (?=.+$)
    patterns:
      - { include: "#Annotation" }
      - { include: "#LuauExpression" }
    end: (?=$)|([,])
    endCaptures:
      1:
        tag: separator
        name: meta.template.expression.comma.sd

  ControlKeyword:
    tag: controlKeyword
    name: keyword.control.sd

  ########## Text ##########

  InlineTextAndLogic:
    patterns:
      - { include: "#Escape" }
      - { include: "#Divert" }
      - { include: "#Thread" }
      - { include: "#LuauInterpolatedStringExpression" }
      # Inline-glued alternators (`.. queue|a|b|c ..`) must come before
      # `InlineText` / `Styling` so the alternator-opening `..` is
      # consumed by the alternator rule rather than by the regular
      # glue path (`Styling` includes `Glue`).
      - { include: "#LuauSparkdownInlineGluedSequentialAlternatorBlock" }
      - { include: "#LuauSparkdownInlineGluedConditionalAlternatorBlock" }
      - { include: "#AudioCommand" }
      - { include: "#ImageCommand" }
      - { include: "#InlineText" }

  InlineText:
    patterns:
      - { include: "#Escape" }
      - { include: "#Raw" }
      - { include: "#Styling" }
      - { include: "#Emphasis" }
      - { include: "#PlainText" }

  Escape:
    match: (?:^(\\)({{WS}})|(?<!^)(\\)({{WS}})|(\\)(\S))
    captures:
      1:
        tag: definition(escape)
        name: constant.character.escape.sd
      2:
        tag: content
        name: markup.raw.text.sd
      3:
        tag: definition(escape)
        name: constant.character.escape.sd
      4:
        tag: content
        name: markup.raw.text.sd
      5:
        tag: definition(escape)
        name: constant.character.escape.sd
      6:
        tag: content
        name: markup.raw.text.sd

  Styling:
    patterns:
      - { include: "#Glue" }
      - { include: "#TextCommand" }
      - { include: "#Underline" }
      - { include: "#BoldItalic" }
      - { include: "#Bold" }
      - { include: "#Italic" }
      - { include: "#Centered" }

  StylingMark:
    captures:
      1:
        tag: definition(content)
        name: markup.raw.text.sd

  Raw:
    tag: content
    name: markup.raw.text.sd
    begin: ([`]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#PlainText" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  BoldItalic:
    tag: strong
    name: markup.other.bold.sd
    begin: ([*][*])(?=[*])
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#Italic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Bold:
    tag: strong
    name: markup.other.bold.sd
    begin: ([*][*])(?![*])
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Italic:
    tag: emphasis
    name: markup.other.italic.sd
    begin: ([*])(?![*])
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Underline:
    tag: link
    name: markup.other.underline.sd
    begin: ([_]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Centered:
    tag: monospace
    name: constant.character.escape.centered.sd
    begin: ([\^]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  Emphasis:
    patterns:
      - { include: "#EmphasisTilde" }
      - { include: "#EmphasisColon" }

  EmphasisTilde:
    tag: quote
    name: markup.emphasis.tilde.sd
    begin: ([~][~]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  EmphasisColon:
    tag: quote
    name: markup.emphasis.colon.sd
    begin: ([:][:]+)
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }
    patterns:
      - { include: "#InlineTextAndLogic" }
    end: (\1)|(?={{EOL}})
    endCaptures:
      1:
        patterns:
          - { include: "#StylingMark" }

  PlainText:
    patterns:
      - { include: "#Newline" }
      - { include: "#Space" }
      - { include: "#Word" }
      - { include: "#EmDash" }
      - { include: "#Punctuation" }

  Space:
    tag: content
    name: markup.raw.space.sd
    match: ([ ])

  Word:
    tag: content
    name: markup.raw.text.sd
    match: ({{WORD}})

  EmDash:
    tag: content
    name: markup.raw.punctuation.sd
    match: ([-][-])

  Punctuation:
    tag: content
    name: markup.raw.punctuation.sd
    match: (.)

  Other:
    tag: content
    name: markup.raw.text.sd
    match: (.)

  ########## Errors ##########

  IllegalExpression:
    tag: invalid
    name: invalid.illegal.illegal-expression.sd

  IllegalChar:
    tag: invalid
    name: invalid.illegal.illegal-char.sd
    match: (.)

  Unknown:
    tag: invalid
    name: invalid.illegal.unknown-statement.sd
    match: (.+$)

  # LUAU

  LuauDivertTargetLiteral:
    # `-> name` (optionally `-> a.b.c`) as a first-class value: stores
    # a pointer to the target which can later be invoked with `-> x`
    # or `-> x(args)`, or compared with `==`. Mirrors inkjs's
    # `DivertTarget` (which extends `Expression`). Single-line match
    # to keep the boundary clean — the rule deliberately doesn't try
    # to swallow argument parentheses; `-> place(5)` as a literal
    # isn't a common ink shape, and stripping the arg call form here
    # would conflict with the `-> name(args)` divert syntax. The
    # trailing `(WS*)` is required so that, when this literal is used
    # mid-expression (e.g. `if -> X == -> Y then`), the LuauIfBlockCondition's
    # `(?=WS)` end-lookahead doesn't fire between the literal and the
    # following operator.
    match: ({{WS}}*)([-][>])({{WS}}*)({{IDENTIFIER}}(?:[.]{{IDENTIFIER}})*)({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#DivertMark" }
      3:
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#DivertPath" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }

  LuauExpression:
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTernaryExpression" }
      - { include: "#LuauAlternatorBlocks" }
      # Divert-target literal (`-> name`) is an inkjs-style first-class
      # value: e.g. `store x = -> place` stores a pointer to the `place`
      # scene that can later be re-invoked via `-> x`. Must come before
      # the arithmetic / compare operations so `->` isn't greedily split
      # into a `-` operator + `>` comparator.
      - { include: "#LuauDivertTargetLiteral" }
      - { include: "#LuauDeclarations" }
      - { include: "#LuauAssignmentOperation" }
      - { include: "#LuauArithmeticOperation" }
      - { include: "#LuauCompareOperation" }
      - { include: "#LuauConcatOperation" }
      - { include: "#LuauLengthOperation" }
      - { include: "#LuauLogicalOperation" }
      - { include: "#LuauTypeCastOperation" }
      - { include: "#LuauParenthetical" }
      - { include: "#LuauAttribute" }
      - { include: "#LuauNumber" }
      - { include: "#LuauString" }
      - { include: "#LuauBoolean" }
      - { include: "#LuauNil" }
      - { include: "#LuauKeyword" }
      # `LuauStdLibGlobals` is reached via `LuauVariable`'s capture
      # patterns when `_G` / `_VERSION` appear in expression context.
      # Including it standalone here too would short-circuit the
      # access-path lowerer (which needs to see them as identifiers
      # for the `STDLIB_CONSTANTS` short-circuit).
      - { include: "#LuauGenericsInstantiation" }
      # `LuauTypeofFunction` is intentionally NOT included in value
      # expressions: in value context, `type(x)` and `typeof(x)` are
      # Luau stdlib function calls returning the type-name string,
      # and route through `LuauFunctionCall` like any other call.
      # The type-context inclusion (in `LuauTypeName`'s pattern list)
      # handles the `local x: typeof(y) = ...` type-inference form
      # where `typeof(y)` is a type expression.
      # `new ClassName(...)` instance construction — must come BEFORE
      # `LuauAccessPath` so `new` isn't lexed as an ordinary
      # identifier path. The constructor's arg list parses as the
      # following sibling `LuauParenthetical` (the lowerer pairs them,
      # mirroring method-call arg pairing). A bare `new` variable
      # reference still works: the rule requires a following
      # identifier, so `print(new)` falls through to the access path.
      - { include: "#LuauNewExpression" }
      - { include: "#LuauAccessPath" }
      - { include: "#LuauTable" }
      # `LuauChainedFunctionCall` must come BEFORE
      # `LuauTypeAnnotationOperation`: after a `LuauParenthetical`, a
      # following `:method(args)` sequence must be tokenized as a method-
      # call chain link, not as a type annotation. Since both rules begin
      # with `:`, the order here decides which takes priority — chained
      # method calls win.
      - { include: "#LuauChainedFunctionCall" }
      # `LuauChainedPropertyAccess` extends a method-call chain with
      # trailing `.name` / `[expr]` links. Sits next to
      # `LuauChainedFunctionCall` so any mix of `:m(x).y[i]:n()` works.
      - { include: "#LuauChainedPropertyAccess" }
      - { include: "#LuauTypeAnnotationOperation" }
      # NB: `LuauSemicolonSeparator` is deliberately NOT included here.
      # `;` is a STATEMENT separator — it lives in `LuauBlockBody` (and
      # `LuauTable`, where it separates fields). When it was included
      # at expression level, statement rules whose patterns include
      # `LuauExpression` (e.g. `LuauVariableDefinition`) swallowed the
      # `;` and the following statement instead of closing — turning
      # `local x = {}; for i=1,n do ... end; return ...` into one
      # mangled definition (the for-loop degraded to a once-through
      # do-block).

  LuauDeclarations:
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauShebang" }
      - { include: "#LuauStyle" }
      - { include: "#LuauScreen" }
      - { include: "#LuauComponent" }
      - { include: "#LuauAnimation" }
      - { include: "#LuauTheme" }
      - { include: "#LuauDefine" }
      - { include: "#LuauFunctionDefinition" }
      - { include: "#LuauVariableDefinition" }
      - { include: "#LuauFunctionTypeDeclaration" }
      - { include: "#LuauDataTypeDeclaration" }
      - { include: "#LuauUntilStatement" }
      - { include: "#LuauReturnStatement" }
      - { include: "#LuauGotoStatement" }
      - { include: "#LuauBreakStatement" }
      - { include: "#LuauContinueStatement" }
      - { include: "#LuauLabel" }

  # ----------------------------------------------------------------------------
  # Explicit Statement
  # ----------------------------------------------------------------------------

  LuauExplicitStatement:
    begin: ({{WS}}*)([&])($|{{WS}}+)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauExplicitStatementMark" }
      3:
        patterns:
          - { include: "#RequiredWhitespace" }
    # `LuauCommaSeparator` is in the pattern list so multi-target /
    # multi-RHS reassignment statements (`& a, b = 10, 20`) can break
    # across commas at the statement level. The lowerer reconstructs
    # the target list from the siblings of the `LuauAssignmentOperation`.
    # Function-call commas live inside `LuauFunctionCallParameters` and
    # are scoped there — they don't reach this pattern.
    patterns:
      # Declarations need to come before LuauExpression so `& store x = 5`
      # parses as a `LuauVariableDefinition` rather than an expression where
      # `store` would degrade to a bare identifier reference. This makes
      # the explicit form (`& store x = 5`) interchangeable with the
      # implicit form (`store x = 5`).
      - { include: "#LuauDeclarations" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|$

  LuauExplicitStatementMark:
    tag: keyword
    name: keyword.other.statement.explicit.luau.mark.sd

  # ----------------------------------------------------------------------------
  # Implicit Assignment Statement
  #
  # `x = 5`, `obj.field = value`, `obj.a[k].b = …`, etc. — a bare reassignment
  # with no leading `&`. Without this rule competing for the match,
  # statement-bearing contexts that also accept Sparkdown display lines
  # (if/else bodies, scene bodies) would parse `x = 5` as ImplicitAction text.
  #
  # The lookahead approximates Lua's "suffixed expression then `=`" rule:
  # identifier, then any number of `.<ident>` segments or one-level `[…]`
  # brackets, then an assignment operator. Deeply nested bracket targets that
  # the lookahead can't recognize fall through to the lowerer's sibling-pair
  # detection in `lowerStatements`, so this rule is a disambiguator of
  # convenience — the lowerer is the real source of truth.
  # ----------------------------------------------------------------------------

  LuauReassignment:
    # The lookahead approximates Lua's "suffixed expression then `=`"
    # rule. An access path may include dot-accessors (`a.b`), bracket
    # indexers (`a[k]`), OR a multi-target comma list (`a, b`). The
    # `,{{WS}}*{{LUAU_IDENTIFIER}}` alternative captures the multi-
    # target case so `a, b = 10, 20` parses as a single reassignment.
    # `LuauCommaSeparator` is added to the inner patterns so commas
    # between targets AND between RHS expressions can be consumed.
    begin: ({{WS}}*)(?={{LUAU_IDENTIFIER}}(?:{{WS}}*(?:[.]{{WS}}*{{LUAU_IDENTIFIER}}|\[[^\]\n]*\]|\([^()\n]*\)|,{{WS}}*{{LUAU_IDENTIFIER}}))*{{WS}}*{{LUAU_ASSIGNMENT_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauAccessPath" }
      - { include: "#LuauAssignmentOperation" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
    # End at: next BEAT (scene/branch), end of line, an upcoming
    # statement-boundary keyword (`if`, `while`, `for`, `repeat`, `do`,
    # `function`, `end`, `return`, `local`, `break`, `continue`,
    # `elseif`, `else`, `then`, `until`), an upcoming bare
    # reassignment statement, OR an upcoming bare call statement on
    # the same line. Without the keyword lookaheads,
    # `b = b * 2 if a == 1 then break end` would let
    # LuauReassignment swallow the trailing `if`; without the
    # reassignment-start lookahead, two adjacent same-line reassignments
    # (e.g. `a = 1 a = 2` or `b = 2 a, b = b, a`, common inside
    # single-line function bodies like
    # `function() a = 1 a = 2 return a end` and basic.luau's swap
    # idiom) would parse as a SINGLE LuauReassignment node — and the
    # lowerer would silently drop everything after the first pair. The
    # reassignment-start lookahead mirrors the `begin` pattern's shape:
    # `IDENT (access-chain)* WS* ASSIGN_OP`, where access-chain covers
    # `.field`, `[...]`, and `,IDENT` (the multi-target form).
    #
    # The call-statement lookahead (`IDENT (access-chain)* WS* (`)
    # handles `mt = { ... } setmetatable(a, mt)` — without it the
    # trailing call is swallowed into the value expression and
    # silently dropped by the lowerer. `and`/`or`/`not` are excluded
    # from the leading identifier because a parenthesized operand
    # after a logical keyword (`a = b and (x)`) would otherwise match
    # the call shape and truncate the value mid-expression. This is
    # safe at value-START positions because every operator/separator
    # rule consumes its TRAILING whitespace, so a call that begins an
    # operand never has the `{{WS}}+` prefix this lookahead requires.
    #
    # `(?={{WS}}*[}])` closes the reassignment at a `}` boundary — needed
    # for an inline event-handler closure (`@input={ name = event.value }`,
    # see LuauSparkleHandlerClosure) whose LAST statement is a bare
    # reassignment: without it the reassignment runs out of patterns
    # before the closure's `}` and the scoped rule appends an
    # ERROR_INCOMPLETE node. Safe elsewhere — a reassignment is only ever
    # followed by `}` inside such a closure (function/if bodies close at
    # `end`/newline, never `}`; a table-literal VALUE consumes its own
    # braces before this end is checked, and reassignment statements never
    # appear inside a table).
    end: (?={{BEAT}})|(?={{WS}}*;)|(?={{WS}}*[}])|(?={{WS}}+\b(?:if|while|for|repeat|do|function|end|return|local|break|continue|elseif|else|then|until)\b)|(?={{WS}}+{{LUAU_IDENTIFIER}}(?:{{WS}}*(?:[.]{{WS}}*{{LUAU_IDENTIFIER}}|\[[^\]\n]*\]|\([^()\n]*\)|,{{WS}}*{{LUAU_IDENTIFIER}}))*{{WS}}*{{LUAU_ASSIGNMENT_OPERATORS}})|(?={{WS}}+(?!(?:and|or|not)\b){{LUAU_IDENTIFIER}}(?:{{WS}}*(?:[.:]{{WS}}*{{LUAU_IDENTIFIER}}|\[[^\]\n]*\]))*{{WS}}*[(])|$
  # ----------------------------------------------------------------------------
  # Define (Syntactic Sugar for OOP Classes)
  # ----------------------------------------------------------------------------

  LuauDefine:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)(define)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauDefineKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauDefineNameAndInheritance" }
      - { include: "#LuauFunctionDefinition" }
      - { include: "#LuauPropertyDefinition" }
      - { include: "#LuauMethodDefinition" }
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # ----------------------------------------------------------------------------
  # Method Definition (`name(args) ... end` shorthand inside `define`)
  #
  # Inside a `define` block, a line that looks like an identifier followed by
  # `(...)` and a body is a method definition — the `function` keyword is
  # implicit. This rule only appears inside `LuauDefine.patterns`, not at the
  # top level (where bare `name()` is a function-call expression statement).
  # The lookahead `(?={{WS}}*[(])` prevents this rule from swallowing property
  # names that don't have a parameter list.
  # ----------------------------------------------------------------------------

  LuauMethodDefinition:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)({{LUAU_IDENTIFIER}})({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauFunctionName" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauFunctionParameters" }
      - { include: "#LuauFunctionReturnType" }
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauDefineNameAndInheritance:
    begin: (?<=define\b{{WS}}*)({{LUAU_IDENTIFIER}})
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauDefineName" }
    patterns:
      - { include: "#LuauInheritanceOperation" }
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|({{WS}}*)(with)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauWithKeyword" }

  LuauInheritanceOperation:
    match: ({{WS}}*)(as)\b({{WS}}*)($|{{LUAU_IDENTIFIER}})($|{{WS}}*)
    captures:
      1:
        # The space before `as` is a SEPARATOR (normalize to one
        # space), not ExtraWhitespace (collapse). Without this, the
        # formatter eats the space producing `companionas`.
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauAsKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauDefineParentName" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauPropertyDefinition:
    # A define-body property: `<key> = <value>`. The key is either a plain
    # identifier (`name = …`) OR a Luau bracket-key (`["selector"] = …`,
    # `["$link"] = …`) so define bodies are table-faithful and can express
    # CSS-style selector keys / `$`-prefixed metadata keys (which aren't valid
    # identifiers). The bracket form reuses the table-constructor pieces
    # (LuauTableIndexDeclaration + LuauAssignmentOperation).
    begin: ({{WS}}*)({{LUAU_SCOPE_MODIFIERS}}|{{LUAU_ACCESS_MODIFIERS}})?({{WS}}*)(?=(?:{{LUAU_IDENTIFIER}}|\[[^\]\r\n]*\]){{WS}}*{{LUAU_ASSIGNMENT_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauScopeModifier" }
          - { include: "#LuauAccessModifier" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauBracketKeyAssignment" }
      - { include: "#LuauVariableAssignment" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|{{WS}}*(?!{{LUAU_COMMENT_START}}))

  # A bracket-keyed define-body property: `[<keyExpr>] = <value>`. The key is a
  # Luau expression in brackets (a string literal for selectors / `$`-keys, or
  # any computed key); the value is a normal assignment RHS. Used ONLY inside
  # LuauPropertyDefinition (define bodies) — general statements keep the strict
  # identifier-keyed LuauVariableAssignment.
  LuauBracketKeyAssignment:
    begin: (?=\[)
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTableIndexDeclaration" }
      - { include: "#LuauAssignmentOperation" }
    end: (?={{BEAT}})|(?=$|{{WS}}|,)

  # ----------------------------------------------------------------------------
  # Style (structured UI — sparkle style block, struct-registry only)
  #
  # `style NAME [as PARENT] with <prop = value> ... end`. A top-level
  # structural keyword (parallel to `scene` / `branch`), NOT a `define`.
  # Lowers purely to a compile-time `style` struct in
  # `program.context.style.<name>` — no runtime table, no global.
  # Property names use CSS/sparkle spelling (hyphens allowed); values are
  # captured raw to end-of-line and interpreted later by the engine's
  # sparkle-style-transformer. `as PARENT` records style inheritance.
  # ----------------------------------------------------------------------------

  LuauStyle:
    tag: meta
    name: meta.style.luau
    begin: ({{WS}}*)(style)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauStyleKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauStyleNameAndInheritance" }
      # The body is the colon/indent STRUCT body (props, nested `key:`
      # blocks, `> selector:` rules, `@breakpoint:` directives, bare
      # markers). Captured opaquely line-by-line — the lowerer reads the
      # raw text and parses the indentation structure itself. (See
      # lowerLuauStyle / lowerLuauUI.)
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # `animation NAME [as PARENT] with <struct body> end` — static presentation
  # config (keyframes/timing), style-family (NOT reactive). Same struct-body
  # grammar as `style`, so values use the unquoted CSS vocabulary. Lowered to a
  # compile-time struct (context.animation.<name>) that implicitly `$extends`
  # the `animation` type for its $default timing. See lowerLuauStructDefine.
  LuauAnimation:
    tag: meta
    name: meta.animation.luau
    # `(?![.(])` keeps `animation` an identifier/namespace when followed by `.`
    # or `(` — so `animation.fadein` refs and any `animation(...)` keep working
    # in expression position; only a true `animation NAME with …` block starts.
    begin: ({{WS}}*)(animation)\b(?![.(])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauAnimationKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauAnimationThemeNameAndInheritance" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # `theme NAME [as PARENT] with <struct body> end` — static token config,
  # style-family. Same shape as `animation`.
  LuauTheme:
    tag: meta
    name: meta.theme.luau
    # See LuauAnimation: `(?![.(])` keeps `theme.X` refs and the `theme(...)`
    # selector function working in expression position.
    begin: ({{WS}}*)(theme)\b(?![.(])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauThemeKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauAnimationThemeNameAndInheritance" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # One body line inside a structural-define block (`style`/`screen`/
  # `component`). Matched opaquely (indent + content) so the block spans
  # to its `end`; the lowerer parses the colon/indent struct from the raw
  # text. The leading indent is its own capture so the formatter can
  # PRESERVE it (these bodies are indentation-significant).
  LuauStructBodyLine:
    match: ^({{WS}}+)([^\n]*?)({{WS}}*)$
    captures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauStructBodyContent" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  # Opaque per-line body content (the lowerer reads this node's raw text by
  # range and rebuilds the indentation tree itself — see lowerStructBody). The
  # node MUST keep its `LuauStructBodyContent` name for the lowerer; the
  # `captures` only add syntax-highlighting children WITHIN it (property
  # `key = value`, nested `key:` / `> selector:` / `@breakpoint:` headers, and
  # bare element markers like `image` / `mask shadow_1`). Reuses the existing
  # `LuauStyleProperty*` tags so structural blocks highlight like the pre-Luau
  # colon-based rules did.
  LuauStructBodyContent:
    tag: content
    name: meta.struct.body.luau
    match: ([^\n]*)
    captures:
      1:
        patterns:
          # Whole-line comment. Struct bodies live inside Luau `with … end`
          # blocks, so `--` (and `---`, block) is the canonical marker; `//`
          # is also accepted for parity with pre-Luau-port struct bodies.
          # First so a comment line isn't swallowed by scalar/marker/fallback.
          - { include: "#LuauComment" }
          - { include: "#SparkdownLineComment" }
          - { include: "#LuauStructScalarProperty" }
          - { include: "#LuauStructArrayItem" }
          - { include: "#LuauStructObjectHeader" }
          - { include: "#LuauStructAdjacencyContent" }
          - { include: "#LuauStructBareMarker" }
          - { include: "#LuauStructBodyFallback" }

  # Name + optional `as PARENT`, ending at the `with` block opener.
  # Reuses LuauDefineName / LuauInheritanceOperation (→ LuauDefineParentName)
  # so the lowerer reads names through the same node names as `define`.
  LuauStyleNameAndInheritance:
    begin: (?<=style\b{{WS}}*)({{LUAU_IDENTIFIER}})
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauDefineName" }
    patterns:
      - { include: "#LuauInheritanceOperation" }
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|({{WS}}*)(with)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauWithKeyword" }

  # Name + optional `as PARENT` for `animation`/`theme` blocks (variable-length
  # lookbehind over both keywords). Mirrors LuauStyleNameAndInheritance /
  # LuauUINameAndInheritance so the lowerer reads the name/parent through the
  # same LuauDefineName / LuauDefineParentName node names as `define`.
  LuauAnimationThemeNameAndInheritance:
    begin: (?<=(?:animation|theme)\b{{WS}}*)({{LUAU_IDENTIFIER}})
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauDefineName" }
    patterns:
      - { include: "#LuauInheritanceOperation" }
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|({{WS}}*)(with)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauWithKeyword" }

  # A single `prop = value` line. The value is captured raw (everything
  # to end-of-line, trailing whitespace trimmed) — it is a CSS-like
  # token, not a Luau expression.
  LuauStylePropertyDefinition:
    match: ({{WS}}*)({{STYLE_PROPERTY_NAME}})({{WS}}*)(=)({{WS}}*)([^\n]*?)({{WS}}*)$
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauStylePropertyName" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauStyleAssignmentMark" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      6:
        patterns:
          - { include: "#LuauStylePropertyValue" }
      7:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauStyleKeyword:
    tag: controlKeyword
    name: keyword.control.style.luau
    match: (style)\b

  LuauAnimationKeyword:
    tag: controlKeyword
    name: keyword.control.animation.luau
    match: (animation)\b

  LuauThemeKeyword:
    tag: controlKeyword
    name: keyword.control.theme.luau
    match: (theme)\b

  LuauStylePropertyName:
    tag: attributeName
    name: entity.other.attribute-name.style.luau
    match: ({{STYLE_PROPERTY_NAME}})

  LuauStyleAssignmentMark:
    tag: separator
    name: keyword.operator.assignment.style.luau
    match: (=)

  LuauStylePropertyValue:
    tag: string
    name: string.unquoted.style.luau
    match: ([^\n]*)

  # ----------------------------------------------------------------------------
  # Restored struct-body leaf highlighting rules (value/selector/CSS tokens).
  # Pruned-resolved port of the pre-Luau colon-based grammar; only add
  # highlighting children -- LuauStructBodyContent stays the lowerer-read node.

  StylingValue:
    match: (.+)({{EOPL}})
    captures:
      1:
        patterns:
          - { include: "#LuauComment" }
          - { include: "#StylingValuePart" }
          - { include: "#StylingStringIdentifier" }
          - { include: "#UnquotedChar" }
      2:
        patterns:
          - { include: "#EndOfLine" }

  NumericFieldValue:
    tag: number
    name: constant.numeric.sd
    match: ([-]?(?:\d*[.])?\d+|Infinity|NaN)({{EOPL}})
    captures:
      1:
        patterns:
          - { include: "#NumericLiteral" }
      2:
        patterns:
          - { include: "#EndOfLine" }

  BooleanFieldValue:
    tag: bool
    name: constant.language.boolean.true.sd
    match: (true|false)({{EOPL}})
    captures:
      1:
        patterns:
          - { include: "#BooleanLiteral" }
      2:
        patterns:
          - { include: "#EndOfLine" }

  StringFieldValue:
    tag: string
    name: string.quoted.double.sd
    match: (["])((?:\\.|[^"])*)(["])({{EOPL}})
    captures:
      1:
        patterns:
          - { include: "#PunctuationStringOpen" }
      2:
        patterns:
          - { include: "#PlainStringContent" }
      3:
        patterns:
          - { include: "#PunctuationStringClose" }
      4:
        patterns:
          - { include: "#EndOfLine" }

  # A double-quoted sparkle content string that contains at least one `{expr}`
  # interpolation (reactive content, spec §6/D3). Listed BEFORE StringFieldValue
  # at every value site so PLAIN (non-interpolated) strings fall through to
  # StringFieldValue unchanged — its highlighting tree stays byte-identical.
  # Same `string`/`string.quoted.double.sd` scope so the color matches; each
  # `{expr}` reuses the existing LuauInterpolatedStringExpression node (so it
  # colors like backtick interpolation AND is the named node the reactive
  # lowerer reads to build bindings). `{{`/`}}` are literal braces (D3) and are
  # matched first so they never open an interpolation. The begin-lookahead
  # requires a lone `{` (skipping `{{`/`}}` pairs and escapes) so a string with
  # only literal braces is left to plain StringFieldValue.
  StringFieldValueInterpolated:
    tag: string
    name: string.quoted.double.sd
    begin: (["])(?=(?:[^"{}]|\{\{|\}\}|\\.)*\{(?!\{))
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringOpen" }
    patterns:
      - { include: "#SparkleLiteralBrace" }
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#StringEscape" }
      - { include: "#Color" }
      - { include: "#StringCharacter" }
    end: (["])({{EOPL}})
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringClose" }
      2:
        patterns:
          - { include: "#EndOfLine" }

  # Literal `{{` / `}}` inside an interpolated content string (D3). Same string
  # scope so it blends with surrounding content; the lowerer collapses each to a
  # single brace.
  SparkleLiteralBrace:
    tag: string
    name: string.quoted.double.sd
    match: (\{\{|\}\})

  UnquotedStringFieldValue:
    match: (.+)({{EOPL}})
    captures:
      1:
        patterns:
          - { include: "#UnquotedString" }
      2:
        patterns:
          - { include: "#EndOfLine" }

  ViewDeclarationScalarPropertyName:
    match: ({{STRICT_PROPERTY_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#DeclarationScalarPropertyIndex" }
          - { include: "#DeclarationScalarPropertyQuotedKey" }
          - { include: "#ComponentName" }

  StylingDeclarationScalarPropertyName:
    match: ({{STRICT_PROPERTY_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#DeclarationScalarPropertyIndex" }
          - { include: "#DeclarationScalarPropertyQuotedKey" }
          - { include: "#DeclarationScalarPropertyKey" }

  PlainDeclarationScalarPropertyName:
    match: ({{STRICT_PROPERTY_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#DeclarationScalarPropertyIndex" }
          - { include: "#DeclarationScalarPropertyQuotedKey" }
          - { include: "#DeclarationScalarPropertyKey" }

  DeclarationScalarPropertyIndex:
    tag: number
    name: constant.numeric.integer.sd
    match: ({{INTEGER}})

  ViewDeclarationObjectPropertyName:
    begin: (?=\S)(?!{{PROPERTY_NAME_TERMINATOR}})
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SelectorPropertyNamePart" }
      - { include: "#ComponentName" }
      - { include: "#IllegalChar" }
    end: (?=$|{{EOPL}}|{{WS}}*{{PROPERTY_NAME_TERMINATOR}})

  StylingDeclarationObjectPropertyName:
    begin: (?=\S)(?!{{PROPERTY_NAME_TERMINATOR}})
    patterns:
      - { include: "#LuauComment" }
      - { include: "#OperatorPrefixedPropertyName" }
      - { include: "#PropertyName" }
      - { include: "#InvalidSelectorPropertyName" }
    end: (?=$|{{EOPL}}|{{WS}}*{{PROPERTY_NAME_TERMINATOR}})

  PlainDeclarationObjectPropertyName:
    begin: (?=\S)(?!{{PROPERTY_NAME_TERMINATOR}})
    patterns:
      - { include: "#LuauComment" }
      - { include: "#OperatorPrefixedPropertyName" }
      - { include: "#PropertyName" }
      - { include: "#InvalidSelectorPropertyName" }
    end: (?=$|{{EOPL}}|{{WS}}*{{PROPERTY_NAME_TERMINATOR}})

  SelectorPropertyNamePart:
    patterns:
      - { include: "#ParenPropertyIdentifierString" }
      - { include: "#BracketPropertyIdentifierString" }
      - { include: "#BracePropertyIdentifierString" }
      - { include: "#UnitValue" }
      - { include: "#NumericLiteral" }
      - { include: "#BooleanLiteral" }
      - { include: "#StringLiteral" }
      - { include: "#SelectorOperator" }
      - { include: "#RecursiveSelectorFunction" }
      - { include: "#SimpleSelectorFunction" }
      - { include: "#StyleAttribute" }
      - { include: "#EventAttribute" }
      - { include: "#LabelAttribute" }
      - { include: "#Separator" }

  ComponentName:
    patterns:
      - { include: "#BuiltinComponentName" }
      - { include: "#CustomComponentName" }
      - { include: "#FunctionCallParameters" }

  BuiltinComponentName:
    tag: definitionKeyword
    name: keyword.other.component.builtin.name.sd
    match: \b(box|span|scroller|text|stroke|link|label|field|button|image|mask|input|slider|checkbox|dropdown|option|divider)(?!{{IDENTIFIER}})

  CustomComponentName:
    tag: className
    name: entity.name.type.class.view.sd
    match: ({{IDENTIFIER}})

  OperatorPrefixedPropertyName:
    begin: (?=\S)(?!{{IDENTIFIER}})(?!{{PROPERTY_NAME_TERMINATOR}})
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SelectorPropertyNamePart" }
      - { include: "#ComponentName" }
      - { include: "#IllegalChar" }
    end: (?=$|{{EOPL}}|{{WS}}*{{PROPERTY_NAME_TERMINATOR}})

  PropertyName:
    tag: propertyName
    name: variable.other.property.sd
    match: ({{IDENTIFIER}})(?![(])

  ParenPropertyIdentifierString:
    brackets: true
    begin: ([(])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SelectorPropertyNamePart" }
    end: $|({{WS}}*)([)])
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#PunctuationParenClose" }

  BracketPropertyIdentifierString:
    brackets: true
    begin: (\[)({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketOpen" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SelectorPropertyNamePart" }
    end: $|({{WS}}*)(\])
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#PunctuationBracketClose" }

  BracePropertyIdentifierString:
    brackets: true
    begin: (\{)({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceOpen" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SelectorPropertyNamePart" }
    end: $|({{WS}}*)(\})
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#PunctuationBraceClose" }

  ArrayItemOperator:
    match: ([-])($|{{WS}}+)
    captures:
      1:
        patterns:
          - { include: "#ArrayItemMark" }
      2:
        patterns:
          - { include: "#Separator" }

  ArrayItemMark:
    tag: keyword
    name: keyword.operator.expression.array.sd
    match: (.+)

  AssignEqualOperator:
    match: ({{WS}}*)([=])({{WS}}*)
    captures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }
      2:
        patterns:
          - { include: "#EqualOperator" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalSeparator" }

  UnitValue:
    match: ([-]?(?:\d*[.])?\d+)([%]|[a-zA-Z]+)
    captures:
      1:
        tag: number
        name: constant.numeric.amount.sd
      2:
        tag: number
        name: constant.numeric.unit.sd

  Ratio:
    match: ({{NUMBER}})({{WS}}*)([/])({{WS}}*)({{NUMBER}})
    captures:
      1:
        patterns:
          - { include: "#NumericLiteral" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
      3:
        patterns:
          - { include: "#CalcOperator" }
      4:
        patterns:
          - { include: "#ExtraWhitespace" }
      5:
        patterns:
          - { include: "#NumericLiteral" }

  CalcOperator:
    tag: keyword
    name: keyword.other.calc.operator.sd
    match: ([+]|[-]|[*]|[/])

  StylingFunction:
    begin: ({{IDENTIFIER}})({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#StylingFunctionName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#StylingFunctionParameters" }
    applyEndPatternLast: true
    end: (?=$|.)

  StylingFunctionName:
    # function(name) → functionName color (yellow), matching pre-Luau-port.
    # NOT function(variableName): that tag is mapped to the parameterName color
    # for Luau function parameters, which would recolor `calc(…)` etc.
    tag: function(name)
    name: entity.name.function.sd
    match: ({{IDENTIFIER}})

  StylingFunctionParameters:
    brackets: true
    begin: ([(])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#CalcOperator" }
      - { include: "#StylingValuePart" }
      - { include: "#ParameterStringIdentifier" }
      - { include: "#UnquotedChar" }
    end: $|({{WS}}*)([)])
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#PunctuationParenClose" }

  StylingValuePart:
    patterns:
      - { include: "#Separator" }
      - { include: "#Color" }
      - { include: "#Ratio" }
      - { include: "#UnitValue" }
      - { include: "#NumericLiteral" }
      - { include: "#PunctuationComma" }
      - { include: "#StylingFunction" }
      # `image.foo` / `font.foo` define-references: color the namespace as a
      # type and the member as a variable (matches pre-Luau-port styling
      # values). Must come before StylingStringIdentifier swallows it as a
      # plain unquoted string. StylingFunction above still wins for `calc(…)`.
      - { include: "#StylingAccessPath" }

  StylingStringIdentifier:
    tag: string
    name: string.unquoted.identifier.sd
    match: ({{IDENTIFIER}})

  UnquotedChar:
    tag: string
    name: string.unquoted.char.sd
    match: (.)

  # Access-path coloring for styling values (`image.foo`, `font.foo`,
  # `theme.colors.bg`). Ported from the pre-Luau-port grammar so define
  # references keep their typeName/variableName/propertyName coloring inside
  # struct-body values. Begin requires `IDENT.` so bare identifiers fall
  # through to StylingStringIdentifier instead.
  StylingAccessPath:
    begin: (?={{IDENTIFIER}}[.])
    patterns:
      - { include: "#LuauComment" }
      - { include: "#StylingAccessPart" }
    end: (?=$)|(?!{{IDENTIFIER}}|[.])

  StylingAccessPart:
    emit: true
    patterns:
      - { include: "#PropertyAccessor" }
      - { include: "#NamespaceAccessor" }
      - { include: "#VariableName" }
      - { include: "#PunctuationAccessor" }

  NamespaceAccessor:
    match: ({{IDENTIFIER}})([.])($|{{IDENTIFIER}})(?![(])
    captures:
      1:
        patterns:
          - { include: "#TypeName" }
      2:
        patterns:
          - { include: "#PunctuationAccessor" }
      3:
        patterns:
          - { include: "#VariableName" }

  PropertyAccessor:
    match: ([.])({{IDENTIFIER}})(?![(])
    captures:
      1:
        patterns:
          - { include: "#PunctuationAccessor" }
      2:
        patterns:
          - { include: "#PropertyName" }

  TypeName:
    tag: typeName
    name: support.type.sd
    match: ({{IDENTIFIER}})

  VariableName:
    # constant(variableName) → constantVariableName color (#4FC1FF cyan),
    # matching pre-Luau-port styling access-path members. The plain
    # `variableName` color was repurposed to #9CDCFE during the port (with
    # #4FC1FF moved to constantVariableName); this keeps UI refs cyan without
    # reverting the global var/const palette split.
    tag: constant(variableName)
    name: variable.other.constant.sd
    match: ({{IDENTIFIER}})(?![(])

  NumericLiteral:
    patterns:
      - { include: "#NumberLiteral" }
      - { include: "#NumericConstantLiteral" }

  BooleanLiteral:
    patterns:
      - { include: "#BooleanTrue" }
      - { include: "#BooleanFalse" }

  PunctuationStringOpen:
    match: (["])
    tag: string
    name: punctuation.definition.string.begin.sd

  PlainStringContent:
    match: ((?:\\.|[^"])*?)(?=$|")
    captures:
      1:
        patterns:
          - { include: "#StringEscape" }
          - { include: "#Color" }
          - { include: "#StringCharacter" }

  PunctuationStringClose:
    match: (["])
    tag: string
    name: punctuation.definition.string.end.sd

  UnquotedString:
    tag: string
    name: string.unquoted.sd
    match: (.+)

  DeclarationScalarPropertyQuotedKey:
    tag: string
    name: string.quoted.key.sd
    match: ({{QUOTED_STRING}})

  DeclarationScalarPropertyKey:
    tag: propertyName
    name: variable.other.property.define.sd
    match: ({{IDENTIFIER}})

  InvalidSelectorPropertyName:
    tag: invalid
    name: invalid.illegal.unknown-statement.sd
    begin: (?=\S)(?!{{PROPERTY_NAME_TERMINATOR}})
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SelectorPropertyNamePart" }
      - { include: "#ComponentName" }
      - { include: "#IllegalChar" }
    end: (?=$|{{EOPL}}|{{WS}}*{{PROPERTY_NAME_TERMINATOR}})

  SelectorOperator:
    tag: keyword
    name: keyword.other.selector.operator.sd
    match: ([>]|[+]|[~]|[*]|[&]|[\^])

  RecursiveSelectorFunction:
    begin: ([@])(has|not|is|where)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#EventAttributeOperator" }
      2:
        patterns:
          - { include: "#EventAttributeName" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#RecursiveSelectorFunctionParameters" }
    applyEndPatternLast: true
    end: (?=$|.)

  SimpleSelectorFunction:
    begin: ([@])({{IDENTIFIER}})?(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#EventAttributeOperator" }
      2:
        patterns:
          - { include: "#EventAttributeName" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SimpleSelectorFunctionParameters" }
    applyEndPatternLast: true
    end: (?=$|.)

  StyleAttribute:
    emit: true
    patterns:
      - { include: "#AssignedBracedStyleAttribute" }
      - { include: "#AssignedQuotedStyleAttribute" }
      - { include: "#AssignedUnquotedStyleAttribute" }
      - { include: "#UnassignedStyleAttribute" }

  EventAttribute:
    emit: true
    patterns:
      - { include: "#AssignedBracedEventAttribute" }
      - { include: "#AssignedQuotedEventAttribute" }
      - { include: "#AssignedUnquotedEventAttribute" }
      - { include: "#UnassignedEventAttribute" }

  LabelAttribute:
    emit: true
    patterns:
      - { include: "#StringLiteral" }

  Separator:
    tag: definition(content)
    name: markup.raw.whitespace.separator.sd
    match: ({{WS}}+)

  FunctionCallParameters:
    brackets: true
    begin: ([(])({{WS}}*)
    beginCaptures:
      1:
        tag: keyword
        name: punctuation.definition.template-expression.begin.sd
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#Separator" }
      - { include: "#PunctuationComma" }
      - { include: "#Parameter" }
    end: $|({{WS}}*)([)])
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        tag: keyword
        name: punctuation.definition.template-expression.end.sd

  OptionalSeparator:
    tag: definition(content)
    name: markup.raw.whitespace.separator.optional.sd
    match: ({{WS}}*)

  EqualOperator:
    tag: updateOperator
    name: keyword.operator.assignment.sd
    match: ([=])

  ParameterStringIdentifier:
    tag: string
    name: string.unquoted.identifier.sd
    match: ({{IDENTIFIER}})

  PunctuationComma:
    tag: operator
    name: keyword.operator.comma.sd
    match: ([,])

  NumberLiteral:
    tag: number
    name: constant.numeric.sd
    match: ([-]?(?:\d*[.])?\d+)

  NumericConstantLiteral:
    patterns:
      - { include: "#Infinity" }
      - { include: "#NaN" }

  BooleanTrue:
    tag: bool
    name: constant.language.boolean.true.sd
    match: "{{BEFORE_KEYWORD}}true{{AFTER_KEYWORD}}"

  BooleanFalse:
    tag: bool
    name: constant.language.boolean.false.sd
    match: "{{BEFORE_KEYWORD}}false{{AFTER_KEYWORD}}"

  StringEscape:
    match: (\\)(.)
    captures:
      1:
        tag: definition(escape)
        name: constant.character.escape.sd
      2:
        tag: content
        name: markup.raw.whitespace.sd

  StringCharacter:
    tag: content
    name: markup.raw.whitespace.sd
    match: (.)

  EventAttributeOperator:
    tag: function(name)
    name: entity.name.function.attribute.name.view.sd
    match: ([@])

  EventAttributeName:
    tag: function(name)
    name: entity.name.function.attribute.name.view.sd
    match: (.+)

  RecursiveSelectorFunctionParameters:
    brackets: true
    begin: ([(])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SelectorPropertyNamePart" }
      - { include: "#ComponentName" }
      - { include: "#IllegalChar" }
    end: $|({{WS}}*)([)])
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#PunctuationParenClose" }

  SimpleSelectorFunctionParameters:
    brackets: true
    begin: ([(])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#SelectorPropertyNamePart" }
      - { include: "#ParameterStringIdentifier" }
      - { include: "#IllegalChar" }
    end: $|({{WS}}*)([)])
    endCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#PunctuationParenClose" }

  AssignedBracedStyleAttribute:
    begin: ([#])({{IDENTIFIER}})?({{COMPARISON_OPERATOR}})?([=])([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#StyleAttributeOperator" }
      2:
        patterns:
          - { include: "#StyleAttributeName" }
      3:
        patterns:
          - { include: "#ComparisonOperator" }
      4:
        patterns:
          - { include: "#EqualOperator" }
      5:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauComment" }
    end: ([}])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }

  AssignedQuotedStyleAttribute:
    tag: string
    name: string.quoted.double.view.sd
    begin: ([#])({{IDENTIFIER}})?({{COMPARISON_OPERATOR}})?([=])(["])
    beginCaptures:
      1:
        patterns:
          - { include: "#StyleAttributeOperator" }
      2:
        patterns:
          - { include: "#StyleAttributeName" }
      3:
        patterns:
          - { include: "#ComparisonOperator" }
      4:
        patterns:
          - { include: "#EqualOperator" }
      5:
        patterns:
          - { include: "#PunctuationStringOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#StringContent" }
    end: $|(["])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringClose" }

  AssignedUnquotedStyleAttribute:
    begin: ([#])({{IDENTIFIER}})?({{COMPARISON_OPERATOR}})?([=])
    beginCaptures:
      1:
        patterns:
          - { include: "#StyleAttributeOperator" }
      2:
        patterns:
          - { include: "#StyleAttributeName" }
      3:
        patterns:
          - { include: "#ComparisonOperator" }
      4:
        patterns:
          - { include: "#EqualOperator" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#UnquotedStyleAttributeValue" }
    end: (?={{UNQUOTED_STRING_TERMINATOR}})

  UnassignedStyleAttribute:
    match: ([#])({{IDENTIFIER}})?
    captures:
      1:
        patterns:
          - { include: "#StyleAttributeOperator" }
      2:
        patterns:
          - { include: "#StyleAttributeName" }

  AssignedBracedEventAttribute:
    begin: ([@])({{IDENTIFIER}})?({{COMPARISON_OPERATOR}})?([=])([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#EventAttributeOperator" }
      2:
        patterns:
          - { include: "#EventAttributeName" }
      3:
        patterns:
          - { include: "#ComparisonOperator" }
      4:
        patterns:
          - { include: "#EqualOperator" }
      5:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauComment" }
    end: ([}])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }

  AssignedQuotedEventAttribute:
    tag: string
    name: string.quoted.double.view.sd
    begin: ([@])({{IDENTIFIER}})?({{COMPARISON_OPERATOR}})?([=])(["])
    beginCaptures:
      1:
        patterns:
          - { include: "#EventAttributeOperator" }
      2:
        patterns:
          - { include: "#EventAttributeName" }
      3:
        patterns:
          - { include: "#ComparisonOperator" }
      4:
        patterns:
          - { include: "#EqualOperator" }
      5:
        patterns:
          - { include: "#PunctuationStringOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#StringContent" }
    end: $|(["])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringClose" }

  AssignedUnquotedEventAttribute:
    begin: ([@])({{IDENTIFIER}})?({{COMPARISON_OPERATOR}})?([=])
    beginCaptures:
      1:
        patterns:
          - { include: "#EventAttributeOperator" }
      2:
        patterns:
          - { include: "#LuauComment" }
          - { include: "#EventAttributeName" }
      3:
        patterns:
          - { include: "#ComparisonOperator" }
      4:
        patterns:
          - { include: "#EqualOperator" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#UnquotedEventAttributeValue" }
    end: (?={{UNQUOTED_STRING_TERMINATOR}})

  UnassignedEventAttribute:
    match: ([@])({{IDENTIFIER}})?
    captures:
      1:
        patterns:
          - { include: "#EventAttributeOperator" }
      2:
        patterns:
          - { include: "#EventAttributeName" }

  StringLiteral:
    tag: string
    name: string.quoted.double.sd
    begin: (["])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#StringContent" }
    end: (["])|($)
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringClose" }

  Parameter:
    tag: meta
    name: meta.parameter.sd
    begin: (?=.+$)
    patterns:
      - { include: "#LuauComment" }
    end: $|(?={{WS}}*(?:[)]|[,]))

  Infinity:
    tag: atom
    name: constant.language.infinity.sd
    match: "{{BEFORE_KEYWORD}}Infinity{{AFTER_KEYWORD}}"

  NaN:
    tag: atom
    name: constant.language.nan.sd
    match: "{{BEFORE_KEYWORD}}NaN{{AFTER_KEYWORD}}"

  StyleAttributeOperator:
    # constant(variableName) → #4FC1FF cyan, matching pre-Luau-port (see VariableName).
    tag: constant(variableName)
    name: variable.other.constant.attribute.style.sd
    match: ([#])

  StyleAttributeName:
    tag: constant(variableName)
    name: variable.other.constant.attribute.style.sd
    match: (.+)

  ComparisonOperator:
    tag: updateOperator
    name: keyword.operator.comparison.sd
    match: ({{COMPARISON_OPERATOR}})

  StringContent:
    match: ((?:\\.|[^"])*?)(?=$|")
    captures:
      1:
        patterns:
          - { include: "#StringEscape" }
          - { include: "#LuauInterpolatedStringExpression" }
          - { include: "#StringCharacter" }

  UnquotedStyleAttributeValue:
    tag: string
    name: string.unquoted.attribute.value.sd
    match: ((?:(?!{{UNQUOTED_STRING_TERMINATOR}}).)+)

  UnquotedEventAttributeValue:
    match: ((?:(?!{{UNQUOTED_STRING_TERMINATOR}}).)+)
    captures:
      1:
        patterns:
          - { include: "#DivertTarget" }

  # ----------------------------------------------------------------------------
  # Restored per-line wrapper rules for struct-body highlighting. Referenced
  # from `LuauStructBodyContent`'s captures (the lowerer still reads that node's
  # raw text by range — these only add highlighting children within it).
  #
  # ENGINE EQUALITY (GRAMMAR.md §17): these rules are reached ONLY via
  # `LuauStructBodyContent`'s capture re-tokenization, which both engines run
  # over the body line's CONTENT (the leading indent is already consumed by
  # `LuauStructBodyLine` capture 1). vscode-textmate retokenizes a capture from
  # the capture's absolute mid-line offset, so a `^` anchor here would NEVER
  # match in vscode (its `^` is true-column-0 only) — vscode would stay flat at
  # `meta.struct.body.luau` while the tree (which retokenizes an isolated
  # substring, position 0) descended into these children, diverging at every
  # body character. Anchoring with `({{WS}}*)` at the start (instead of `^`)
  # makes BOTH engines descend identically: the capture content always begins at
  # the line's first non-indent char, so the `({{WS}}*)` matches zero-width and
  # the rest of the rule lines up the same in both engines. (Each rule consumes
  # to end-of-line, so exactly one fires per body line — no spurious mid-line
  # re-match.)
  LuauStructScalarProperty:
    match: ({{WS}}*)(\[[^\]\n]*\]|[$]?{{STRICT_PROPERTY_IDENTIFIER}})({{ASSIGN_EQUAL_OPERATOR}})(.*$)
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          # In screen/component bodies a builtin element name used as a key
          # (`image = "black"`) colors pink, matching pre-port. The builtin set
          # is fixed + word-bounded, so CSS property keys in style bodies
          # (`background_image`, `position`, …) fall through to the declaration
          # key below. Custom names stay declaration keys (not className) so
          # style-body props keep their propertyName color.
          - { include: "#BuiltinComponentName" }
          - { include: "#StylingDeclarationScalarPropertyName" }
      3:
        patterns:
          - { include: "#AssignEqualOperator" }
      4:
        patterns:
          - { include: "#NumericFieldValue" }
          - { include: "#BooleanFieldValue" }
          - { include: "#StringFieldValueInterpolated" }
          - { include: "#StringFieldValue" }
          - { include: "#StylingValue" }
          - { include: "#UnquotedStringFieldValue" }

  # `^` dropped for engine equality — see LuauStructScalarProperty.
  LuauStructArrayItem:
    match: ({{WS}}*)({{ARRAY_ITEM_OPERATOR}})(.*$)
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#ArrayItemOperator" }
      3:
        patterns:
          - { include: "#NumericFieldValue" }
          - { include: "#BooleanFieldValue" }
          - { include: "#StringFieldValueInterpolated" }
          - { include: "#StringFieldValue" }
          - { include: "#StylingValue" }
          - { include: "#UnquotedStringFieldValue" }

  # `^` dropped for engine equality — see LuauStructScalarProperty.
  LuauStructObjectHeader:
    match: ({{WS}}*)(.+?)({{WS}}*)([:])({{WS}}*)$
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      # Element attributes are tried FIRST so a container header can carry inline
      # props/events (`column #gap=16:`, `row @click=x:`). `#name=`/`@name=` don't
      # collide with style headers' `> selector` / `@breakpoint(…)` (no `=` after
      # the keyword), so those still fall through to SelectorPropertyNamePart.
      2:
        patterns:
          - { include: "#LuauElementAttribute" }
          - { include: "#SelectorPropertyNamePart" }
          - { include: "#ComponentName" }
          - { include: "#PropertyName" }
      4:
        patterns:
          - { include: "#LuauStructObjectColon" }

  LuauStructObjectColon:
    # tag logicOperator → CodeMirror operator color (#A0A0A0). The `name` scope
    # mirrors the pre-port `ColonOperator` so VSCode's
    # `meta.template.expression.operator` override (#A0A0A0) applies too.
    tag: logicOperator
    name: meta.template.expression.operator.colon.sd
    match: ([:])

  # Adjacency content (spec §4.2/D2): `<tag> "content {interp}"` — a builtin/
  # component tag followed by a quoted (interpolation-aware) display string,
  # e.g. `image "black"`, `text "HP: {hp}"`, `button "Use"`. Listed BEFORE
  # LuauStructBareMarker; cap 4 must START with a quote, so `mask shadow_1`
  # (trailing class names, no quote) still falls through to the bare marker, and
  # `image = "black"` (a scalar) is matched earlier. The lowerer reads the tag
  # (cap 2) + the content value (cap 4); the static context builder maps it to
  # `{ tag: content }`, identical to the `tag = "content"` scalar form.
  # `^` dropped for engine equality — see LuauStructScalarProperty.
  LuauStructAdjacencyContent:
    match: ({{WS}}*)({{STYLE_PROPERTY_NAME}})({{WS}}+)("(?:\\.|[^"])*")({{WS}}*)([^\n]*)$
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#ComponentName" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#StringFieldValueInterpolated" }
          - { include: "#StringFieldValue" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      # Trailing inline attributes after the content (`@event=handler`, …).
      6:
        patterns:
          - { include: "#LuauElementAttribute" }

  # Inline element attributes (spec §4.5): trailing `@event=handler` bindings on
  # an element line. `#prop=value` follows in a later increment. Each event's
  # handler is a Luau expression (a bare function name or a call); inline
  # closures `@e={ … }` come later.
  LuauElementAttribute:
    patterns:
      # Consume inter-attribute whitespace (non-zero-width, so it isn't flagged
      # by the zero-width-include guard and doesn't halt capture tokenization on
      # an unrecognized space between two attributes).
      - { include: "#RequiredWhitespace" }
      - { include: "#LuauEventAttribute" }
      - { include: "#LuauPropAttribute" }

  LuauEventAttribute:
    begin: ([@])({{LUAU_IDENTIFIER}})({{WS}}*)([=])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#EventAttributeOperator" }
      2:
        patterns:
          - { include: "#EventAttributeName" }
      4:
        patterns:
          - { include: "#EqualOperator" }
    patterns:
      - { include: "#LuauSparkleHandlerClosure" }
      - { include: "#LuauExpression" }
    end: (?=$|{{WS}}+[@#])

  # Inline event-handler closure (spec §4.5, L7): `@click={ score = 0; combo = 0 }`,
  # `@input={ name = event.value }`. In event-handler value position the braces
  # delimit a STATEMENT block (a closure body), NOT a Luau table — identical
  # source text (`{ a = b }`), different context. Per the grammar Golden Rule
  # this is its own rule (not a table reinterpreted downstream): it reuses
  # `#LuauBlockBody`, the SAME statement list a function body parses, so every
  # statement form works (assignment, property-target `a.b = x`, bare call,
  # `;`-separated statements). Tried before `#LuauExpression` in
  # `LuauEventAttribute` so the leading `{` isn't taken as a table; only
  # reachable from there, so tables elsewhere are unaffected.
  #
  # SINGLE-LINE only: `LuauEventAttribute.end` (`(?=$|…)`) is line-oriented, so
  # the closing `}` must be on the `=` line. A body split across lines would be
  # truncated at the newline; `lowerHandlerClosure` detects a missing `}` and
  # raises a diagnostic rather than silently dropping the rest.
  LuauSparkleHandlerClosure:
    brackets: true
    begin: ([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauBlockBody" }
    end: ([}])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }

  # Inline style/attribute prop (spec §4.2/§4.4): `#prop=value`, e.g.
  # `row #gap=16`, `#background-color={team_color}`, `image #src="a.png"`. The
  # value is `{expr}` (reactive — reuses LuauInterpolatedStringExpression so
  # `{…}` is interpolation, NOT a Luau table), a quoted string, or an unquoted
  # literal (number / keyword / `#hex`). Prop names allow hyphens. Value rules
  # carry no `{{EOPL}}` (the value is mid-line; more attrs may follow).
  LuauPropAttribute:
    begin: ([#])({{LUAU_IDENTIFIER}}(?:[-]{{LUAU_IDENTIFIER}})*)({{WS}}*)([=])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#StyleAttributeOperator" }
      2:
        patterns:
          - { include: "#StyleAttributeName" }
      4:
        patterns:
          - { include: "#EqualOperator" }
    patterns:
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#InlinePropQuotedValue" }
      - { include: "#InlinePropLiteralValue" }
    end: (?=$|{{WS}}+[@#])

  InlinePropQuotedValue:
    tag: string
    name: string.quoted.double.sd
    match: (["])((?:\\.|[^"])*)(["])
    captures:
      1:
        patterns:
          - { include: "#PunctuationStringOpen" }
      2:
        patterns:
          - { include: "#PlainStringContent" }
      3:
        patterns:
          - { include: "#PunctuationStringClose" }

  InlinePropLiteralValue:
    match: ([^\s]+)
    captures:
      1:
        patterns:
          - { include: "#Color" }
          - { include: "#NumericLiteral" }
          - { include: "#StringCharacter" }

  # Adjacency content string for inline element positions where a class or
  # attribute may follow on the same line (e.g. `button primary "Use" @click=x`).
  # Unlike StringFieldValue(Interpolated) these end at the closing quote rather
  # than requiring end-of-property-line, so a trailing attribute doesn't break
  # the match. Same scope/highlighting as StringFieldValue; the interpolated
  # variant (a real `{expr}` present) is tried first.
  LuauElementContentStringInterpolated:
    tag: string
    name: string.quoted.double.sd
    begin: (["])(?=(?:[^"{}]|\{\{|\}\}|\\.)*\{(?!\{))
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringOpen" }
    patterns:
      - { include: "#SparkleLiteralBrace" }
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#StringEscape" }
      - { include: "#Color" }
      - { include: "#StringCharacter" }
    end: (["])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringClose" }

  LuauElementContentStringPlain:
    tag: string
    name: string.quoted.double.sd
    match: (["])((?:\\.|[^"])*)(["])
    captures:
      1:
        patterns:
          - { include: "#PunctuationStringOpen" }
      2:
        patterns:
          - { include: "#PlainStringContent" }
      3:
        patterns:
          - { include: "#PunctuationStringClose" }

  # `^` dropped for engine equality — see LuauStructScalarProperty.
  LuauStructBareMarker:
    match: ({{WS}}*)({{STYLE_PROPERTY_NAME}})({{WS}}*)([^\n]*)$
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#ComponentName" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      # Trailing class names, content, AND inline attributes — order:
      # whitespace (consumed so inter-token spaces don't halt tokenization),
      # attributes (`#prop=`/`@event=`), quoted content (`text title "Inventory"`),
      # then bare component names (= classes). The element TAG vs class is decided
      # by the lowerer (the builtin/component token is the tag, position-independent).
      4:
        patterns:
          - { include: "#RequiredWhitespace" }
          - { include: "#LuauElementAttribute" }
          - { include: "#LuauElementContentStringInterpolated" }
          - { include: "#LuauElementContentStringPlain" }
          - { include: "#ComponentName" }

  # Full-line catch-all so any struct-body line NOT matched by a wrapper above
  # (e.g. `$recursive = true` / `["$default"] = …` / odd `$`-keys) still produces
  # a child that spans the WHOLE line. Without it the LuauStructBodyContent node
  # truncates to the last tokenized child and the lowerer (which reads the node's
  # raw text by range) sees a partial line. Must be LAST.
  # `^` dropped for engine equality — see LuauStructScalarProperty. (`.+` still
  # requires at least one non-newline char, so an empty line produces no node.)
  LuauStructBodyFallback:
    tag: content
    name: meta.struct.body.fallback.luau
    match: (.+)$

  # ----------------------------------------------------------------------------
  # Sparkle control flow (spec §4.6): `if/elseif/else`, `for`, `match` inside a
  # screen/component body. Luau-keyword delimited (`then`/`do`/`end`). These are
  # GRAMMAR BLOCKS (begin/end) — required so a nested `end` is consumed by its
  # own block and the screen's terminating `end` still balances. Their bodies are
  # the same sparkle element lines (LuauStructBodyLine) + nested control blocks,
  # so the lowerer reads if/for/match as IfNode/ForNode/MatchNode grammar
  # children. `if`-condition rules are reused from the Luau side (they end at
  # `then`); only the BODY differs (element lines, not Luau statements).
  LuauSparkleControlBlock:
    patterns:
      - { include: "#LuauSparkleIfBlock" }
      - { include: "#LuauSparkleForLoop" }
      - { include: "#LuauSparkleMatchBlock" }

  LuauSparkleIfBlock:
    begin: ({{WS}}*)(if)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauIfKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauIfBlockCondition" }
      - { include: "#LuauSparkleElseifBlock" }
      - { include: "#LuauSparkleElseBlock" }
      - { include: "#LuauSparkleControlBlock" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauSparkleElseifBlock:
    begin: ({{WS}}*)(elseif)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauElseifKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauElseifBlockCondition" }
      - { include: "#LuauSparkleControlBlock" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?={{WS}}*{{LUAU_IF_BRANCH_END_KEYWORDS}})

  LuauSparkleElseBlock:
    begin: ({{WS}}*)(else)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauElseKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauSparkleControlBlock" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?={{WS}}*(?:end)\b)

  # `for <bindings> in <expr> do <element lines> [else <empty fallback>] end`
  # (spec §4.6). Reuses the Luau `LuauForCondition` (bindings + `in` + iterable,
  # ends before `do`) and `LuauSparkleElseBlock` (the empty-iterable fallback).
  # `do` is consumed here (not via LuauDoBlock, whose body is Luau statements);
  # the body is sparkle element lines + nested control blocks.
  LuauSparkleForLoop:
    begin: ({{WS}}*)(for)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauForKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauForCondition" }
      - { include: "#LuauSparkleDoMark" }
      - { include: "#LuauSparkleElseBlock" }
      - { include: "#LuauSparkleControlBlock" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # The `do` keyword that opens a for-loop's body (consumed after the condition).
  LuauSparkleDoMark:
    match: ({{WS}}*)(do)\b({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauDoKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  # `match <expr> do  case <value> …  [else …]  end` (spec §4.6). Distinct from
  # the alternator `match | arm` (display context): this is a UI control block
  # with `case` arms whose bodies are sparkle element lines. `do` is consumed by
  # LuauSparkleDoMark; the empty/default arm reuses LuauSparkleElseBlock.
  LuauSparkleMatchBlock:
    begin: ({{WS}}*)(match)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauMatchKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauSparkleMatchCondition" }
      - { include: "#LuauSparkleDoMark" }
      - { include: "#LuauSparkleCaseClause" }
      - { include: "#LuauSparkleElseBlock" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # The matched expression, between `match` and `do` (may span lines).
  LuauSparkleMatchCondition:
    begin: (?<=match\b{{WS}}*)(?!{{BEAT}}|do\b)
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}}|{{END}})|(?={{WS}}*do\b)

  # A `case <value>` arm: the value expression is on the `case` line; the body is
  # the indented element lines below, until the next `case`/`else`/`end`.
  LuauSparkleCaseClause:
    begin: ({{WS}}*)(case)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauCaseKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauSparkleCaseValue" }
      - { include: "#LuauSparkleControlBlock" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?={{WS}}*(?:case|else|end)\b)

  # The case value expression (on the `case` line, ends at end-of-line).
  LuauSparkleCaseValue:
    begin: (?<=case\b{{WS}}*)(?!{{BEAT}}|$)
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
    end: (?=$)


  # ----------------------------------------------------------------------------
  # Screen / Component (structured UI element trees, struct-registry only)
  #
  # `screen NAME [as PARENT] with <element-tree> end` (and `component`).
  # Each element line is `<tag> [#attr=val ...] ["content"]`; children nest
  # by INDENTATION (no per-element `end`). Top-level structural keywords
  # (parallel to `scene`/`branch`), NOT `define`; `as` = inherits. Lowers to
  # a compile-time nested-object struct in
  # program.context.screen|component.<name>. Element lines parse FLAT (one
  # `LuauUIElement` per line); the lowerer reconstructs the tree from each
  # element's indentation column. See lowerLuauUI.
  # ----------------------------------------------------------------------------

  LuauScreen:
    tag: meta
    name: meta.screen.luau
    begin: ({{WS}}*)(screen)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauScreenKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauUINameAndInheritance" }
      - { include: "#LuauSparkleControlBlock" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauComponent:
    tag: meta
    name: meta.component.luau
    begin: ({{WS}}*)(component)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauComponentKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauUINameAndInheritance" }
      - { include: "#LuauSparkleControlBlock" }
      - { include: "#LuauStructBodyLine" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # Name + optional `as PARENT`, ending at `with`. Shared by screen and
  # component (variable-length lookbehind over both keywords). Reuses
  # LuauDefineName / LuauInheritanceOperation → LuauDefineParentName so the
  # lowerer reads names through the same node names as `define` / `style`.
  LuauUINameAndInheritance:
    begin: (?<=(?:screen|component)\b{{WS}}*)({{LUAU_IDENTIFIER}})
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauDefineName" }
    patterns:
      - { include: "#LuauInheritanceOperation" }
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|({{WS}}*)(with)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauWithKeyword" }

  # One element line: `<tag> [#attr=val ...] ["content"]`. Single-line
  # (ends at EOL); nesting is by indentation and reconstructed in the
  # lowerer using the tag's column. The leading whitespace is captured so
  # the indentation is measurable.
  LuauUIElement:
    tag: meta
    name: meta.ui.element.luau
    begin: ({{WS}}*)({{LUAU_IDENTIFIER}})\b
    beginCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauUIElementTag" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauUIAttribute" }
      - { include: "#LuauUIContent" }
      - { include: "#ExtraWhitespace" }
    end: (?=$)

  # `#name=value` (structural/style attr) or `@event=handler` (deferred to
  # a later phase). Value is a quoted string, a `{closure}`, or a bare
  # token. The optional value group is captured raw; the lowerer strips
  # surrounding quotes.
  LuauUIAttribute:
    match: ({{WS}}*)([#@])({{STYLE_PROPERTY_NAME}})(?:({{WS}}*)(=)({{WS}}*)("[^"\n]*"|\{[^}\n]*\}|[^\s"]+))?
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauUIAttributeSigil" }
      3:
        patterns:
          - { include: "#LuauUIAttributeName" }
      4:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      5:
        patterns:
          - { include: "#LuauUIAttributeEquals" }
      6:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      7:
        patterns:
          - { include: "#LuauUIAttributeValue" }

  # A bare quoted string on an element line = its text content. Every
  # character must sit inside a capture group (the parser requires capture
  # groups to tile the whole match), so the quotes get their own group.
  LuauUIContent:
    match: ({{WS}}*)(")([^"\n]*)(")
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauUIQuote" }
      3:
        patterns:
          - { include: "#LuauUIContentText" }
      4:
        patterns:
          - { include: "#LuauUIQuote" }

  LuauScreenKeyword:
    tag: controlKeyword
    name: keyword.control.screen.luau
    match: (screen)\b

  LuauComponentKeyword:
    tag: controlKeyword
    name: keyword.control.component.luau
    match: (component)\b

  LuauUIElementTag:
    tag: typeName
    name: entity.name.tag.ui.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauUIAttributeSigil:
    tag: separator
    name: punctuation.definition.attribute.ui.luau
    match: ([#@])

  LuauUIAttributeName:
    tag: attributeName
    name: entity.other.attribute-name.ui.luau
    match: ({{STYLE_PROPERTY_NAME}})

  LuauUIAttributeEquals:
    tag: separator
    name: keyword.operator.assignment.ui.luau
    match: (=)

  LuauUIAttributeValue:
    tag: string
    name: string.unquoted.ui.luau
    match: ([^\n]+)

  LuauUIContentText:
    tag: string
    name: string.quoted.ui.luau
    match: ([^"\n]*)

  LuauUIQuote:
    tag: string
    name: punctuation.definition.string.ui.luau
    match: (")

  # ----------------------------------------------------------------------------
  # New Expression (`new ClassName(...)` — instance construction for
  # `define`-declared classes)
  # ----------------------------------------------------------------------------

  LuauNewExpression:
    tag: meta
    name: meta.new.luau
    match: (new)\b({{WS}}*)({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#LuauNewKeyword" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      3:
        patterns:
          - { include: "#LuauNewClassName" }

  LuauNewKeyword:
    tag: controlKeyword
    name: keyword.control.new.luau
    match: (new)\b

  LuauNewClassName:
    tag: typeName
    name: entity.name.type.new.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauDefineKeyword:
    tag: controlKeyword
    name: keyword.control.define.luau
    match: (define)\b

  LuauAsKeyword:
    tag: controlKeyword
    name: keyword.control.as.luau
    match: (as)\b

  LuauWithKeyword:
    tag: controlKeyword
    name: keyword.control.as.luau
    match: (with)\b

  LuauDefineName:
    tag: definition(typeName)
    name: entity.name.type.define.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauDefineParentName:
    tag: typeName
    name: entity.name.type.define.parent.luau
    match: ({{LUAU_IDENTIFIER}})

  # ----------------------------------------------------------------------------
  # Function Definition
  # ----------------------------------------------------------------------------

  LuauFunctionDefinition:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)(?:({{LUAU_SCOPE_MODIFIERS}})\b({{WS}}*))?(function)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauScopeModifier" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauFunctionKeyword" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauGenericsDeclaration" }
      - { include: "#LuauFunctionReturnType" }
      - { include: "#LuauFunctionDeclarationName" }
      - { include: "#LuauFunctionParameters" }
      # `LuauFunctionBody` opens AFTER the close-paren of the param
      # list (or after a return-type annotation), so its `(?<=\w|\))`
      # lookbehind anchors on the last header char. Keeping body in
      # its own rule lets `bare-assignment-in-body` style content
      # (e.g. `& x = expr`) parse without polluting the function-
      # header context. `LuauBlockBody` then matches statements inside.
      - { include: "#LuauFunctionBody" }
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauFunctionBody:
    tag: meta
    name: meta.function.body.luau
    # Anchored: opens once the function header (params / return type)
    # is closed and at least one newline has passed. The lookbehind on
    # `\w` or `)` keeps this from firing inside `function f<T>` (where
    # the `>` is followed by params), and `\n` requires the body to
    # start on a new line.
    begin: (?<=\w|\)){{WS}}*\n
    patterns:
      - { include: "#LuauBlockBody" }
    # Don't consume `end` — the outer `LuauFunctionDefinition.end`
    # owns that. Stop at `end` / `scene` / `branch`.
    end: (?=(?:{{WS}}*\b(?:end|scene|branch)\b))

  LuauFunctionParameters:
    tag: meta
    name: meta.parameter.luau
    brackets: true
    # Anchored to HEADER position: a parameter list's `(` is preceded
    # (modulo inline whitespace) by one of:
    #   - a header keyword (`function` / `scene` / `branch` /
    #     `external`) plus an optional dotted/colon name path and an
    #     optional generics `<T>` run — covers `function (x)`,
    #     `function pack(first, ...)`, `function t.g(x)`,
    #     `function t:m(x)`, `function f<T>(x)`, `scene foo(x)`,
    #     `external host(x)`; or
    #   - line-start + identifier — define-block method headers
    #     (`NAME(params)` on its own line inside LuauMethodDefinition).
    # The earlier any-identifier lookbehind let BARE-CALL STATEMENTS
    # in one-line function bodies match as parameter lists:
    #   function pack(first, ...) ... table.insert(t, 1, first) ...
    # ate `(t, 1, first)` as a bogus second param list (one-line
    # bodies parse directly inside LuauFunctionDefinition_content
    # where this rule stays live, since LuauFunctionBody only opens
    # after a newline). `table.insert(` now fails the lookbehind —
    # no header keyword before it, and it's mid-line.
    begin: ((?<=\b(?:function|scene|branch|external)\b{{WS}}*(?:{{LUAU_IDENTIFIER}}(?:{{WS}}*[.:]{{WS}}*{{LUAU_IDENTIFIER}})*)?(?:<[^<>\n]*>)?{{WS}}*|^{{WS}}*{{LUAU_IDENTIFIER}}{{WS}}*)[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauVariadicParameter" }
      - { include: "#LuauFunctionParameter" }
      - { include: "#LuauTypeAnnotationOperation" }
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([)])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }

  LuauVariadicType:
    match: ({{LUAU_IDENTIFIER}}[.][.][.])
    tag: special(typeName)
    name: variable.parameter.function.varargs.luau

  LuauVariadicParameter:
    match: ([.][.][.])
    tag: special(variableName)
    name: variable.parameter.function.varargs.luau

  LuauFunctionParameter:
    match: ({{LUAU_IDENTIFIER}})
    tag: function(variableName)
    name: variable.parameter.function.luau

  LuauFunctionReturnType:
    begin: (?<=[)]{{WS}}*)([:])(?![:])({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauTypeOperator" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  LuauFunctionName:
    tag: function(name)
    name: entity.name.function.luau
    match: ({{LUAU_IDENTIFIER}})

  # ----------------------------------------------------------------------------
  # Variable Definition
  # ----------------------------------------------------------------------------

  LuauVariableDefinition:
    begin: ({{WS}}*)({{LUAU_SCOPE_MODIFIERS}})\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauScopeModifier" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # Multi-target multi-RHS shape (`local a, b = 10, 20`): each
    # `LuauVariableAssignment` terminates at `,` so the comma + any
    # subsequent expressions live at the `LuauVariableDefinition`
    # level. `LuauCommaSeparator` handles the comma between targets
    # AND the comma between RHS values; `LuauExpression` (added here
    # rather than only inside `LuauVariableAssignment`) captures
    # trailing RHS values after the assignment's `= <first-value>`
    # has terminated at the first comma. The lowerer reassembles the
    # multi-RHS list by walking the def's content children.
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauVariableAssignment" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|{{WS}}*(?!{{LUAU_COMMENT_START}}))

  LuauVariableAssignment:
    # The lookahead distinguishes a TARGET identifier from an
    # identifier appearing as part of a trailing RHS expression in
    # multi-RHS syntax (`local a, b = 10, g()` — `g` must NOT match
    # as a target since the next char after it is `(`, not `,`/`:`/
    # `=`). Target-shape identifiers are always followed by one of:
    #   `,` — continuing target list (`a, b = …`)
    #   `:` — type annotation (`a: number = …`)
    #   `=` — assignment operator
    #   end-of-statement (newline / EOF / `--` line comment) —
    #     bare declaration (`local x` with no initializer)
    # Anything else (`g(`, `g.h`, `g[k]`, etc.) means the identifier
    # is actually an expression — fall through to `LuauExpression`
    # at the outer `LuauVariableDefinition` level.
    begin: ({{LUAU_IDENTIFIER}})({{WS}}*)(?={{WS}}*(?:[,:=]|--|\n|\r|$))
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauVariableName" }
      2:
        # `Separator` (normalize to one space) rather than
        # `ExtraWhitespace` (collapse to nothing): the formatter would
        # otherwise eat the space between the variable name and the
        # following `=` / `+=` / `-=` operator, producing `x= 1`.
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauTypeAnnotationOperation" }
      - { include: "#LuauAssignmentOperation" }
      - { include: "#LuauFunctionDefinition" }
    # Terminate at `,` (in addition to WS / EOL / `BEAT`) so the
    # outer `LuauVariableDefinition` owns the comma between
    # multi-RHS values. Previously the VA's own `LuauCommaSeparator`
    # pattern consumed the comma and an `ERROR_INCOMPLETE` followed —
    # the trailing RHS values were silently dropped from the tree.
    end: (?={{BEAT}})|(?=$|{{WS}}|,)

  # ----------------------------------------------------------------------------
  # Control Blocks (For, While, Repeat, If, Elseif, Else, Do)
  # ----------------------------------------------------------------------------

  LuauSparkdownControlBlock:
    patterns:
      - { include: "#LuauSparkdownForLoop" }
      - { include: "#LuauSparkdownWhileLoop" }
      - { include: "#LuauSparkdownRepeatLoop" }
      - { include: "#LuauSparkdownDoBlock" }
      - { include: "#LuauSparkdownChooseBlock" }
      - { include: "#LuauSparkdownIfBlock" }
      - { include: "#LuauSparkdownElseifBlock" }
      - { include: "#LuauSparkdownElseBlock" }
      - { include: "#LuauSparkdownAlternatorBlocks" }
      - { include: "#LuauReassignment" }

  LuauControlBlock:
    patterns:
      - { include: "#LuauForLoop" }
      - { include: "#LuauWhileLoop" }
      - { include: "#LuauRepeatLoop" }
      - { include: "#LuauDoBlock" }
      - { include: "#LuauIfBlock" }
      - { include: "#LuauElseifBlock" }
      - { include: "#LuauElseBlock" }
      - { include: "#LuauAlternatorBlocks" }
      # `LuauDeclarations` covers declarations (`local x = …`,
      # `function …`, `return`, `break`, `continue`, `goto`, labels,
      # type declarations). `LuauExplicitStatement` covers the `& …`
      # discard-call / assignment statement form. Both are valid inside
      # pure-luau bodies (function definitions, `if`/`for`/`while`/`do`
      # blocks). Without them, a body like
      #   function f() if cond then & g() end end
      # cannot match `& g()` inside the `if` body, so the if-block
      # terminates early and the discard-call ends up at the function
      # level (outside the conditional) — silently broken bytecode.
      - { include: "#LuauDeclarations" }
      - { include: "#LuauExplicitStatement" }
      - { include: "#LuauReassignment" }

  # Shared body-content pattern set for every sparkdown-context block-shaped
  # rule (`LuauSparkdownIfBlock`, `LuauSparkdownForLoop`, etc.). Each of
  # those rules typically lists a block-specific prefix (a condition rule)
  # followed by `{ include: "#LuauSparkdownBlockBody" }`. This keeps the
  # set of accepted body constructs in ONE place — when a new statement
  # type lands, add it here once and every block picks it up automatically
  # (GRAMMAR.md §5.4: the audit-every-block discipline collapses to
  # audit-one-rule).
  #
  # `LuauCommaSeparator` is intentionally excluded — a display line could
  # legitimately start with a comma (`, she muttered`), and treating that
  # comma as a structural separator would mangle the display text.
  LuauSparkdownBlockBody:
    patterns:
      - { include: "#LuauExplicitStatement" }
      - { include: "#LuauDeclarations" }
      - { include: "#LuauSparkdownControlBlock" }
      - { include: "#SparkdownStatement" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }

  # Pure-Luau counterpart of `LuauSparkdownBlockBody`. Used inside every
  # Luau-only block rule (`LuauIfBlock`, `LuauForLoop`, `LuauFunctionDefinition`,
  # etc.). `LuauControlBlock` already transitively includes
  # `LuauDeclarations` / `LuauExplicitStatement` / etc., so the
  # body tail here is shorter than the Sparkdown variant.
  #
  # `LuauCommaSeparator` is included as a forgiveness measure — bare
  # commas at body level aren't valid Luau syntax (commas live inside
  # function-call args, declarations, table literals, etc.) but if an
  # author writes one we'd rather highlight it than emit an `UNRECOGNIZED`.
  LuauBlockBody:
    patterns:
      - { include: "#LuauControlBlock" }
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      # Statement separator (`local x = {}; for i=1,n do ... end`).
      # Owned by the statement context, NOT by `LuauExpression` — see
      # the note there. Statement rules close before the `;` (their
      # patterns no longer match it), this consumes it, and the next
      # statement parses fresh.
      - { include: "#LuauSemicolonSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }

  # ----------------------------------------------------------------------------
  # For Loop
  # ----------------------------------------------------------------------------

  LuauSparkdownForLoop:
    begin: ({{WS}}*)(for)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauForKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauForCondition" }
      - { include: "#LuauSparkdownBlockBody" }
    # `(?<=\bend)` — close right after the do-block's `end` so one-line
    # `for ... do BODY end return x` doesn't swallow trailing
    # statements (see LuauSparkdownWhileLoop).
    end: (?={{BEAT}})|(?<=\bend)|$

  LuauForLoop:
    begin: ({{WS}}*)(for)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauForKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauForCondition" }
      - { include: "#LuauBlockBody" }
    # See LuauSparkdownWhileLoop's end comment (one-line trailing
    # statements).
    end: (?={{BEAT}})|(?<=\bend)|$

  LuauForCondition:
    # See `LuauIfBlockCondition` for the multi-line trick: begin's
    # lookbehind is intra-line but the rule's patterns include
    # `Newline`/`RequiredWhitespace` so the condition can span
    # newlines until the `do` keyword closes it.
    begin: (?<=for\b{{WS}}*)(?!{{BEAT}}|do\b)
    patterns:
      - { include: "#LuauInKeyword" }
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#RequiredWhitespace" }
      - { include: "#Newline" }
    # End just before `do` (allowing a leading WS run, but NOT bare
    # whitespace alone) so multi-line for-in headers parse.
    end: (?={{BEAT}}|{{END}})|(?={{WS}}*do\b)

  # ----------------------------------------------------------------------------
  # While Loop
  # ----------------------------------------------------------------------------

  LuauSparkdownWhileLoop:
    begin: ({{WS}}*)(while)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauWhileKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauWhileCondition" }
      - { include: "#LuauSparkdownBlockBody" }
    # `(?<=\bend)` closes the loop immediately after its do-block's
    # `end` token, so a one-line `while c do BODY end return x` doesn't
    # swallow the trailing statements into the loop (the `$` alternative
    # only fires at end-of-line). The lookbehind can't false-trigger on
    # identifiers like `friend` — `\b` requires a word boundary before
    # the `e`.
    end: (?={{BEAT}})|(?<=\bend)|$

  LuauWhileLoop:
    begin: ({{WS}}*)(while)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauWhileKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauWhileCondition" }
      - { include: "#LuauBlockBody" }
    # See LuauSparkdownWhileLoop's end comment (one-line trailing
    # statements).
    end: (?={{BEAT}})|(?<=\bend)|$

  LuauWhileCondition:
    # See `LuauIfBlockCondition` for the multi-line trick.
    begin: (?<=while\b{{WS}}*)(?!{{BEAT}}|do\b)
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}}|{{END}})|(?={{WS}}*do\b)

  # ----------------------------------------------------------------------------
  # Repeat Loop
  # ----------------------------------------------------------------------------

  LuauSparkdownRepeatLoop:
    begin: ({{WS}}*)(repeat)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauRepeatKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauSparkdownBlockBody" }
    end: (?={{BEAT}})|(?={{WS}}*(?:until)\b)

  LuauRepeatLoop:
    begin: ({{WS}}*)(repeat)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauRepeatKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|(?={{WS}}*(?:until)\b)

  LuauUntilStatement:
    begin: ({{WS}}*)(until)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauUntilKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
    # Terminate the until-condition at an upcoming statement-boundary
    # keyword, bare reassignment, or bare call statement so a one-line
    # `repeat BODY until cond return x` doesn't swallow `return x`
    # into the condition expression. Mirrors LuauReassignment's end
    # lookaheads (see there for why `and`/`or`/`not` are excluded from
    # the call-statement alternative). (`until` itself is excluded —
    # it's this rule's own keyword; nested repeats close their own
    # until first.)
    end: (?={{BEAT}})|(?={{WS}}+\b(?:if|while|for|repeat|do|function|end|return|local|break|continue|elseif|else|then)\b)|(?={{WS}}+{{LUAU_IDENTIFIER}}(?:{{WS}}*(?:[.]{{WS}}*{{LUAU_IDENTIFIER}}|\[[^\]\n]*\]|\([^()\n]*\)|,{{WS}}*{{LUAU_IDENTIFIER}}))*{{WS}}*{{LUAU_ASSIGNMENT_OPERATORS}})|(?={{WS}}+(?!(?:and|or|not)\b){{LUAU_IDENTIFIER}}(?:{{WS}}*(?:[.:]{{WS}}*{{LUAU_IDENTIFIER}}|\[[^\]\n]*\]))*{{WS}}*[(])|$

  # ----------------------------------------------------------------------------
  # Do Block
  # ----------------------------------------------------------------------------

  LuauSparkdownDoBlock:
    begin: ({{WS}}*)(do)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauDoKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauSparkdownBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauDoBlock:
    begin: ({{WS}}*)(do)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauDoKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # ----------------------------------------------------------------------------
  # If Block
  # ----------------------------------------------------------------------------

  LuauSparkdownIfBlock:
    begin: ({{WS}}*)(if)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauIfKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauIfBlockCondition" }
      - { include: "#LuauSparkdownBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauIfBlock:
    begin: ({{WS}}*)(if)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauIfKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauIfBlockCondition" }
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauIfBlockCondition:
    # Begin fires immediately after `if` regardless of whether the
    # condition starts on the same line or on a continuation line.
    # The trick (cf. `LuauLogicalOperator`'s patterns array): the
    # `begin` lookbehind is intra-line, but the rule's `patterns`
    # array includes both `Newline` and `ExtraWhitespace`, so once
    # the scope is open, the condition can span newlines until the
    # `then` keyword closes it. Critically, `then` is excluded from
    # `LuauKeyword` so the inner `LuauExpression` can't snatch it
    # before this rule's end pattern fires.
    begin: (?<=if\b{{WS}}*)(?!{{BEAT}}|then\b)
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ({{WS}}*)((?:then)\b)|(?={{BEAT}}|{{END}})
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauThenKeyword" }

  LuauTernaryExpressionCondition:
    begin: (?<=if\b{{WS}}*)(?!{{BEAT}}|$|{{WS}})
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?=$|{{WS}})

  # ----------------------------------------------------------------------------
  # Elseif Block
  # ----------------------------------------------------------------------------

  LuauSparkdownElseifBlock:
    begin: ({{WS}}*)(elseif)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauElseifKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauElseifBlockCondition" }
      - { include: "#LuauSparkdownBlockBody" }
    end: (?={{BEAT}})|(?={{WS}}*{{LUAU_IF_BRANCH_END_KEYWORDS}})

  LuauElseifBlock:
    begin: ({{WS}}*)(elseif)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauElseifKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauElseifBlockCondition" }
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|(?={{WS}}*{{LUAU_IF_BRANCH_END_KEYWORDS}})

  LuauElseifBlockCondition:
    # See `LuauIfBlockCondition` for the multi-line trick.
    begin: (?<=elseif\b{{WS}}*)(?!{{BEAT}}|then\b)
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ({{WS}}*)((?:then)\b)|(?={{BEAT}}|{{END}})
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauThenKeyword" }

  # ----------------------------------------------------------------------------
  # Else Block
  # ----------------------------------------------------------------------------

  LuauSparkdownElseBlock:
    begin: ({{WS}}*)(else)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauElseKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauSparkdownBlockBody" }
    end: (?={{BEAT}})|(?={{WS}}*(?:end)\b)

  LuauElseBlock:
    begin: ({{WS}}*)(else)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauElseKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|(?={{WS}}*(?:end)\b)

  # ----------------------------------------------------------------------------
  # Choose Block (Sparkdown weave / branching narrative)
  #
  # `choose ... [then [(label)] ... ] end` is sparkdown's block-based
  # weave syntax. Replaces ink's mark-counting (`* * *`) + dash-prefix
  # gathers (`- text`) — depth comes from block nesting, not from
  # counting marks.
  #
  #   choose
  #     * "Hi."
  #     * "Hey."
  #   then
  #     She nods.
  #   choose                    -- closes previous, starts next
  #     * "Coffee?"
  #     * "Tea?"
  #   then (coffee) She picks coffee.    -- labeled, inline body
  #   end
  #
  # Inside a `choose` block:
  #   - `*` (once-only) and `+` (sticky) choices live at the block's
  #     depth — no mark-counting needed.
  #   - `if cond then ... end` blocks can wrap choices for conditional
  #     gating (e.g. `if has_key then * Unlock end` inside `choose`).
  #   - `then` introduces the gather body. Optional `(label)` names
  #     the gather as a divert target.
  #   - Another `choose` keyword chains a new block, closing the
  #     previous block implicitly (mirrors `elseif` in if-blocks).
  #   - `end` closes the chain.
  # ----------------------------------------------------------------------------

  LuauSparkdownChooseBlock:
    begin: ({{WS}}*)(choose)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauChooseKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # Order matters: the `then` clause must be checked before
    # `SparkdownStatement` / `LuauDeclarations`, otherwise a bare
    # `then` line gets swallowed as display text. Similarly `Choice`
    # comes first so `*`-prefixed lines don't get re-routed elsewhere.
    # Free-form lines like `      foo` (a plain action under a choice)
    # have to match SOMETHING inside the block — without these patterns
    # textmate's parser can't advance through them and the begin/end
    # rule effectively stops contributing children.
    patterns:
      - { include: "#Choice" }
      - { include: "#LuauSparkdownChooseThenClause" }
      - { include: "#LuauSparkdownControlBlock" }
      - { include: "#LuauExplicitStatement" }
      - { include: "#LuauDeclarations" }
      - { include: "#FlowStatements" }
      # `#`/`##` section tags and `[[...]]` annotations are scene content
      # the body can contain. Without #Annotation the parser can't advance
      # through a standalone tag line (e.g. `## FinalImage`) and spins on
      # empty matches ("possible infinite loop"). Before DisplayStatements
      # so a tag line isn't swallowed as Action text.
      - { include: "#Annotation" }
      - { include: "#DisplayStatements" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    # Same shape as every other sparkdown block: ends on `end`. Nested
    # `choose` blocks inside a choice's body are matched by the
    # `LuauSparkdownControlBlock` pattern (which routes back to
    # `LuauSparkdownChooseBlock`) and consume their own `end` before
    # the outer block sees it. No chaining: sequential weaves write
    # `choose ... then ... end` twice — clean and unambiguous.
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauSparkdownChooseThenClause:
    begin: ({{WS}}*)(then)\b({{WS}}*)([(][^()]*[)]{{WS}}*)?
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauThenKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#Label" }
    patterns:
      - { include: "#LuauExplicitStatement" }
      - { include: "#LuauDeclarations" }
      - { include: "#LuauSparkdownControlBlock" }
      - { include: "#FlowStatements" }
      # See LuauSparkdownChooseBlock: `#`/`##` section tags must be
      # matched here too, or a standalone tag line in the then-body spins
      # on empty matches.
      - { include: "#Annotation" }
      - { include: "#DisplayStatements" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    # The then-clause body ends when the enclosing `choose` block
    # sees its `end`. Nested blocks inside the then-body consume
    # their own end keywords, so the lookahead only fires on the
    # outer choose's terminator.
    end: (?={{BEAT}})|(?={{WS}}*end\b)

  LuauChooseKeyword:
    tag: controlKeyword
    name: keyword.control.choose.luau
    match: (choose)\b

  # ----------------------------------------------------------------------------
  # If-Then-Else Expression
  # ----------------------------------------------------------------------------

  # Luau's `if cond then a else b` ternary EXPRESSION (no `end`).
  # Distinguishing from block-form `if ... end` is tricky because
  # both use `if cond then ...`. The lookahead requires that, before
  # any `=` (assignment statement marker), one of:
  #   - `else` / `elseif` appears (true ternary form), or
  #   - `}` appears (sparkdown's inline-conditional in interpolation
  #     `{if cond then expr}`, may omit `else`).
  # Block form `if cond then a = 1 else a = 2 end` is excluded
  # because `=` appears between `if` and `else`. Without this
  # discrimination, an inline statement-position `if cond then stmt
  # end` parses as a ternary, eats the `end`, and cascades the parse
  # out of the enclosing function-body context.
  LuauTernaryExpression:
    begin: ({{WS}}*)(if)\b({{WS}}*)(?=(?:[^\n=]|==|~=|<=|>=)*(?:\belse(?:if)?\b|\}))
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauIfKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauTernaryExpressionCondition" }
      - { include: "#LuauThenExpression" }
      - { include: "#LuauElseExpression" }
      - { include: "#LuauExpression" }
      # `then`/`else`/`elseif` fallback — `LuauKeyword` no longer matches
      # them (so other rules' end-patterns can fire), but the inline-
      # ternary form still needs them tokenised when they appear free-
      # standing inside this expression.
      - { include: "#LuauTernaryKeyword" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    # End on a BEAT (next scene/branch), at end-of-line (statement
    # position: `local x = if c then 1 else 2` must close before the
    # newline or the open scope swallows the next line and the
    # enclosing statement force-closes with ERROR_INCOMPLETE), or on
    # the natural closing delimiter of any expression-host context —
    # interpolation `}`, call/paren `)`, index `]`, an arg separator
    # `,` or `;`. Without the bracket alternatives, the rule would
    # only close via parent force-close (an
    # `[ScopedRule:LuauTernaryExpression] Incomplete scope` warning at
    # parse time). The `$` alternative makes the ternary single-line;
    # the clause rules (`LuauThenExpression` / `LuauElseExpression`)
    # already end at `$` themselves, so a line break mid-ternary was
    # never parseable anyway.
    end: (?={{BEAT}}|$|[)}\],;])

  LuauThenExpression:
    begin: (?=(?:then)\b)
    patterns:
      - { include: "#LuauThenOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    # End at the next ternary clause keyword, at a BEAT, at a closing
    # bracket / arg separator, or at the first WS after the `then`
    # body finishes (the single-line single-token case). The `else`
    # / `elseif` alternatives are needed because in inline ternary
    # the surrounding `LuauTernaryExpression` no longer ends at
    # `(?=then)`, so this rule has to relinquish the cursor at the
    # next clause boundary on its own.
    end: (?={{BEAT}}|else\b|elseif\b|$|{{WS}}|[)}\],;])

  LuauThenOperator:
    begin: ((?:then)\b)({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauThenKeyword" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauElseExpression:
    begin: (?=(?:else)\b)
    patterns:
      - { include: "#LuauElseOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    # Mirror `LuauThenExpression`'s end. We need explicit
    # closing-delimiter alternatives because inline ternary lives
    # inside `{…}` / `(…)` / `[…]` and the bare `(?=$|{{WS}})` would
    # otherwise leave the scope to be force-closed by the outer
    # interpolation / paren / index rule.
    end: (?={{BEAT}}|elseif\b|$|{{WS}}|[)}\],;])

  LuauElseOperator:
    begin: ((?:else)\b)({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauElseKeyword" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  # ----------------------------------------------------------------------------
  # Alternator Blocks
  # ----------------------------------------------------------------------------

  LuauSparkdownAlternatorBlocks:
    patterns:
      - { include: "#LuauSparkdownSingleLineConditionalAlternatorBlock" }
      - { include: "#LuauSparkdownSingleLineSequentialAlternatorBlock" }
      - { include: "#LuauSparkdownConditionalAlternatorBlock" }
      - { include: "#LuauSparkdownSequentialAlternatorBlock" }

  LuauAlternatorBlocks:
    patterns:
      - { include: "#LuauConditionalAlternatorBlock" }
      - { include: "#LuauSequentialAlternatorBlock" }

  LuauAlternatorSeparator:
    match: ({{WS}}*)([|])({{WS}}*)(?:({{LUAU_IDENTIFIER}})({{WS}}*)([=])({{WS}}*))?
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        tag: operator
        name: keyword.operator.alternator.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauAlternatorAssignmentName" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      6:
        patterns:
          - { include: "#LuauAlternatorAssignmentOperator" }
      7:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauAlternatorAssignmentName:
    tag: variableName
    name: variable.other.readwrite.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauAlternatorAssignmentOperator:
    tag: updateOperator
    name: keyword.operator.equal.luau
    match: ([=])

  # ----------------------------------------------------------------------------
  # Conditional Alternator Block
  # ----------------------------------------------------------------------------

  LuauSparkdownConditionalAlternatorBlock:
    begin: ({{WS}}*)({{LUAU_CONDITIONAL_ALTERNATOR_KEYWORDS}})({{WS}}*)(?!{{WS}}*[.])
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauControlKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#Newline" }
    patterns:
      - { include: "#LuauConditionalAlternatorCondition" }
      - { include: "#LuauAlternatorSeparator" }
      - { include: "#LuauSparkdownBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauConditionalAlternatorBlock:
    begin: ({{WS}}*)({{LUAU_CONDITIONAL_ALTERNATOR_KEYWORDS}})({{WS}}*)(?!{{WS}}*[.])
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauControlKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauConditionalAlternatorCondition" }
      - { include: "#LuauAlternatorSeparator" }
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b|(?=[,;)\]}])
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauConditionalAlternatorCondition:
    begin: (?<=(?:{{LUAU_CONDITIONAL_ALTERNATOR_KEYWORDS}}){{WS}}*)(?!{{BEAT}}|$|{{WS}})
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}|])

  # ----------------------------------------------------------------------------
  # Sequential Alternator Block
  # ----------------------------------------------------------------------------

  LuauSparkdownSequentialAlternatorBlock:
    # The leading lookahead does double duty: it gates the rule on a
    # sequential keyword AND folds in the "not an access path" check.
    # Putting `(?!{{WS}}*[.])` inside the leading lookahead (after the
    # keyword + `\b`) ties the `.` exclusion to the keyword position,
    # so backtracking through the trailing optional captures can't
    # produce a zero-width match. A trailing `(?!{{WS}}*[.])` is
    # reachable via backtracking that consumes nothing — see GRAMMAR.md
    # §3.2 (zero-width Scoped rule → infinite loop).
    begin: ({{WS}}*)(?=(?:{{LUAU_SEQUENTIAL_MODIFIER_KEYWORDS}}|{{LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS}})\b(?!{{WS}}*[.]))(?:({{LUAU_SEQUENTIAL_MODIFIER_KEYWORDS}})({{WS}}*))?({{LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS}})?({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauControlKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauControlKeyword" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauAlternatorSeparator" }
      - { include: "#LuauSparkdownBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauSparkdownSingleLineSequentialAlternatorBlock:
    begin: ({{WS}}*)(?=(?:{{LUAU_SEQUENTIAL_MODIFIER_KEYWORDS}}|{{LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS}}))(?:({{LUAU_SEQUENTIAL_MODIFIER_KEYWORDS}})({{WS}}*))?({{LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS}})?({{WS}}*)(?=[|])
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauControlKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauControlKeyword" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauAlternatorSeparator" }
      - { include: "#LuauSparkdownAlternatorArm" }
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauSparkdownSingleLineConditionalAlternatorBlock:
    begin: ({{WS}}*)({{LUAU_CONDITIONAL_ALTERNATOR_KEYWORDS}})({{WS}}*)(?=[(][^()]*[)]{{WS}}*[|])
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauControlKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauConditionalAlternatorCondition" }
      - { include: "#LuauAlternatorSeparator" }
      - { include: "#LuauSparkdownAlternatorArm" }
      - { include: "#ExtraWhitespace" }
    end: $|(?={{BEAT}})|({{WS}}*)(end)\b
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  LuauSequentialAlternatorBlock:
    # See `LuauSparkdownSequentialAlternatorBlock` for the leading-
    # lookahead structure — same shape, same zero-width-match concern.
    begin: ({{WS}}*)(?=(?:{{LUAU_SEQUENTIAL_MODIFIER_KEYWORDS}}|{{LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS}})\b(?!{{WS}}*[.]))(?:({{LUAU_SEQUENTIAL_MODIFIER_KEYWORDS}})({{WS}}*))?({{LUAU_SEQUENTIAL_ALTERNATOR_KEYWORDS}})?({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauControlKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauControlKeyword" }
      5:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauAlternatorSeparator" }
      - { include: "#LuauBlockBody" }
    end: (?={{BEAT}})|({{WS}}*)(end)\b|(?=[,;)\]}])
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauEndKeyword" }

  # ----------------------------------------------------------------------------
  # Flow Statements
  # ----------------------------------------------------------------------------

  LuauBreakStatement:
    match: ({{WS}}*)(break)\b
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauBreakKeyword" }

  LuauContinueStatement:
    match: ({{WS}}*)(continue)\b
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauContinueKeyword" }

  LuauGotoStatement:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)(goto)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauControlKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauLabelName" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|{{WS}}*(?!{{LUAU_COMMENT_START}}))

  LuauReturnStatement:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)(return)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauControlKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
    # `;` alternative: `return f(x); end`-style one-liners close the
    # return statement before the separator (`;` no longer parses
    # inside `LuauExpression`).
    end: (?={{BEAT}})|(?=$|{{WS}}|;)
  # `external message(x)` — single-line declaration of a host-bound callable.
  # Captures the `external` keyword, the function name (via the regular
  # `LuauFunctionDeclarationName`), and a paren-delimited parameter list
  # (via the regular `LuauFunctionParameters`). No body — the declaration
  # ends at the closing `)` (in practice at the trailing line break, since
  # the parameters rule consumes the paren pair). Only legal at top level
  # (included from the file-scope pattern list, not from `LuauDeclarations`).
  LuauExternalDeclaration:
    tag: meta
    name: meta.function.external.sd
    begin: ({{WS}}*)(external)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauExternalKeyword" }
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauFunctionDeclarationName" }
      - { include: "#LuauFunctionParameters" }
      - { include: "#ExtraWhitespace" }
    end: (?=$|{{WS}}*$)

  LuauExternalKeyword:
    tag: modifier
    name: storage.modifier.external.sd
    match: (external)\b

  # ----------------------------------------------------------------------------
  # Modifiers & Keywords
  # ----------------------------------------------------------------------------

  LuauAccessModifier:
    tag: modifier
    name: storage.modifier.access.luau
    match: ({{LUAU_ACCESS_MODIFIERS}})

  LuauScopeModifier:
    tag: modifier
    name: storage.modifier.scope.luau
    match: ({{LUAU_SCOPE_MODIFIERS}})

  LuauControlKeyword:
    tag: controlKeyword
    name: keyword.control.luau

  # Scope-ending keywords are pulled OUT of `LuauKeyword` so general
  # expression contexts don't greedily match them as keyword tokens
  # before the surrounding scope's end-pattern fires. `end` is already
  # excluded for the same reason. Each scope-ender is matched by the
  # rule that owns its scope:
  #   • `then`              → `LuauIfBlockCondition` end / `LuauThenExpression`
  #   • `else` / `elseif`   → `LuauElseBlock` / `LuauElseifBlock` / `LuauElseExpression`
  #   • `do`                → `LuauForCondition` / `LuauWhileCondition` end / `LuauDoBlock` begin
  #   • `until`             → `LuauRepeatLoop` end
  # Inline ternary additionally re-includes the if-style scope-enders
  # via `LuauTernaryKeyword` so `then`/`else`/`elseif` still highlight
  # when they appear free-standing inside a `LuauTernaryExpression`.
  LuauTernaryKeyword:
    patterns:
      - { include: "#LuauThenKeyword" }
      - { include: "#LuauElseifKeyword" }
      - { include: "#LuauElseKeyword" }

  LuauKeyword:
    patterns:
      - { include: "#LuauBreakKeyword" }
      - { include: "#LuauContinueKeyword" }
      - { include: "#LuauReturnKeyword" }
      - { include: "#LuauInKeyword" }
      - { include: "#LuauLocalKeyword" }
      - { include: "#LuauConstKeyword" }
      - { include: "#LuauUnitKeywords" }
      - { include: "#LuauIfKeyword" }
      - { include: "#LuauForKeyword" }
      - { include: "#LuauWhileKeyword" }
      - { include: "#LuauRepeatKeyword" }
      - { include: "#LuauLocalKeyword" }
      - { include: "#LuauConstKeyword" }
      - { include: "#LuauFunctionKeyword" }

  LuauEndKeyword:
    tag: controlKeyword
    name: keyword.control.end.luau
    match: (end)\b

  LuauDoKeyword:
    tag: controlKeyword
    name: keyword.control.do.luau
    match: (do)\b

  LuauThenKeyword:
    tag: controlKeyword
    name: keyword.control.then.luau
    match: (then)\b

  LuauIfKeyword:
    tag: controlKeyword
    name: keyword.control.if.luau
    match: (if)\b

  LuauElseifKeyword:
    tag: controlKeyword
    name: keyword.control.elseif.luau
    match: (elseif)\b

  LuauElseKeyword:
    tag: controlKeyword
    name: keyword.control.else.luau
    match: (else)\b

  LuauForKeyword:
    tag: controlKeyword
    name: keyword.control.for.luau
    match: (for)\b

  LuauMatchKeyword:
    tag: controlKeyword
    name: keyword.control.match.luau
    match: (match)\b

  LuauCaseKeyword:
    tag: controlKeyword
    name: keyword.control.case.luau
    match: (case)\b

  LuauWhileKeyword:
    tag: controlKeyword
    name: keyword.control.while.luau
    match: (while)\b

  LuauRepeatKeyword:
    tag: controlKeyword
    name: keyword.control.repeat.luau
    match: (repeat)\b

  LuauUntilKeyword:
    tag: controlKeyword
    name: keyword.control.until.luau
    match: (until)\b

  LuauBreakKeyword:
    tag: controlKeyword
    name: keyword.control.break.luau
    match: (break)\b

  LuauContinueKeyword:
    tag: controlKeyword
    name: keyword.control.continue.luau
    match: (continue)\b

  LuauReturnKeyword:
    tag: controlKeyword
    name: keyword.control.return.luau
    match: (return)\b

  LuauInKeyword:
    tag: controlKeyword
    name: keyword.control.end.luau
    match: (in)\b

  LuauLocalKeyword:
    tag: modifier
    name: storage.modifier.local.luau
    match: (local)\b

  LuauConstKeyword:
    tag: modifier
    name: storage.modifier.const.luau
    match: (const)\b

  LuauFunctionKeyword:
    tag: controlKeyword
    name: keyword.control.luau
    match: (function)\b

  LuauSelfKeyword:
    tag: self
    name: variable.language.self.luau
    match: (self)\b

  LuauUnitKeywords:
    tag: variableName
    name: variable.other.readwrite.unit.luau
    match: (?<!\.)[.][.][.](?!\.)

  # ----------------------------------------------------------------------------
  # Identifiers
  # ----------------------------------------------------------------------------

  LuauAccessPath:
    begin: (?=(?!{{LUAU_TERMINATOR_KEYWORDS}}){{LUAU_IDENTIFIER}})
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauAccessPart" }
    end: (?={{BEAT}})|(?=$|{{WS}}*(?:{{LUAU_BINARY_OPERATORS}}|{{LUAU_TERMINATOR_KEYWORDS}})|(?!{{WS}}*(?:{{LUAU_IDENTIFIER}}|{{LUAU_ACCESSOR_OPERATOR}}|\[))){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauAccessPart:
    emit: true
    patterns:
      - { include: "#LuauFunctionAccessor" }
      - { include: "#LuauPropertyAccessor" }
      - { include: "#LuauPropertyIndexer" }
      - { include: "#LuauFunctionDeclarationName" }
      - { include: "#LuauFunctionCall" }
      - { include: "#LuauVariable" }

  LuauFunctionAccessor:
    match: ({{WS}}*)({{LUAU_ACCESSOR_OPERATOR}})({{WS}}*)({{LUAU_IDENTIFIER}})({{WS}}*)(?={{LUAU_FUNCTION_CALL_START}})
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#LuauAccessorOperator" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#LuauStdLibMethods" }
          - { include: "#LuauFunctionName" }
      5:
        patterns:
          - { include: "#ExtraWhitespace" }

  # The lookbehind matches either `function ` (regular definition) or
  # `external ` (host-binding declaration) — same identifier-capture shape,
  # different surrounding keyword. Adding `external` here means the
  # `LuauExternalDeclaration` rule can reuse this declaration-name pattern
  # without a parallel `LuauExternalDeclarationName` rule.
  LuauFunctionDeclarationName:
    match: (?<=(?:function|external)\b{{WS}}*)({{LUAU_IDENTIFIER}})\b({{WS}}*)(?!{{LUAU_ACCESSOR_OPERATOR}})
    captures:
      1:
        patterns:
          - { include: "#LuauFunctionName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }

  # Chained method-call rule. After a value-expression element ends in
  # a `LuauParenthetical` (function-call result), one or more
  # `:method(args)` sequences may follow. The grammar's `LuauAccessPath`
  # can't pick them up because it requires beginning with an identifier,
  # not `:`. Without this rule, the `:` after `)` would be consumed by
  # `LuauTypeAnnotationOperation` and misparsed as a type annotation —
  # see the order comment in `LuauExpression` for why this rule must
  # come first.
  #
  # The begin pattern is a positive lookahead for `:identifier(`. The
  # body matches one or more `LuauFunctionAccessor` + `LuauParenthetical`
  # pairs (handled by the patterns iterating until they no longer match).
  # The end pattern triggers when the next position is no longer the
  # start of another chained call.
  LuauChainedFunctionCall:
    begin: ({{WS}}*)(?=[:]{{LUAU_IDENTIFIER}}{{WS}}*{{LUAU_FUNCTION_CALL_START}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauFunctionAccessor" }
      - { include: "#LuauParenthetical" }
    end: (?!{{WS}}*[:]{{LUAU_IDENTIFIER}}{{WS}}*{{LUAU_FUNCTION_CALL_START}})

  # Trailing property / indexer access after a `LuauAccessPath +
  # LuauParenthetical` pair (i.e. after a method call's sibling
  # parenthetical). Without this, `a:m(x).y` parses as `LuauAccessPath
  # [a, :m] + LuauParenthetical [(x)]` and the trailing `.y` falls
  # through to narrative text — which knocks the parser out of the
  # enclosing function/block context entirely. With it, the chain
  # continues via `LuauPropertyAccessor` / `LuauPropertyIndexer` links
  # so the access path is properly contained.
  #
  # The begin uses a lookbehind for `)` to scope this rule to
  # positions immediately following a parenthetical (the call-args
  # sibling of a method call). Without the lookbehind, the bare `[`
  # lookahead would steal `[key]` entries inside table literals
  # (`{ ["k"] = v }` etc.). The patterns consume any mix of dot /
  # indexer chain links; the end fires once no more follow.
  LuauChainedPropertyAccess:
    begin: (?<=\))({{WS}}*)(?=[.]{{LUAU_IDENTIFIER}}|\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauPropertyAccessor" }
      - { include: "#LuauPropertyIndexer" }
    end: (?!{{WS}}*(?:[.]{{LUAU_IDENTIFIER}}|\[))

  LuauFunctionCall:
    begin: ({{LUAU_IDENTIFIER}})({{WS}}*)(?={{LUAU_FUNCTION_CALL_START}})
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauStdLibFunctions" }
          - { include: "#LuauFunctionName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauFunctionCallParameters" }
      # Lua/Luau sugar: `f"..."`, `f'...'`, `f[[...]]`, `f{...}` are
      # function calls with a single string/table argument (equivalent
      # to `f("...")` / `f({...})`). Without these inclusions, the
      # function-call begin matches via `LUAU_FUNCTION_CALL_START` but
      # the body can't consume the argument, leaving the parser stuck
      # and desyncing the enclosing scope's `end`-matching.
      - { include: "#LuauString" }
      - { include: "#LuauTable" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|.)

  LuauFunctionCallParameters:
    tag: meta
    name: meta.parameter.luau
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([)])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }

  LuauVariable:
    match: (?!end)\b({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#LuauSelfKeyword" }
          - { include: "#LuauStdLibConstants" }
          # `LuauStdLibGlobals` tags `_G` / `_VERSION` so they get
          # the `constant.language.luau` highlight even when used in
          # access-path context (e.g. as standalone `_VERSION` or
          # the receiver of a `_G.foo` access).
          - { include: "#LuauStdLibGlobals" }
          - { include: "#LuauVariableName" }

  LuauPropertyAccessor:
    match: ({{WS}}*)({{LUAU_ACCESSOR_OPERATOR}})({{WS}}*)({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#LuauAccessorOperator" }
      3:
        patterns:
          - { include: "#ExtraWhitespace" }
      4:
        patterns:
          - { include: "#LuauStdLibMethods" }
          - { include: "#LuauPropertyName" }

  LuauPropertyIndexer:
    brackets: true
    begin: ({{WS}}*)(\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#PunctuationBracketOpen" }
    patterns:
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (\])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketClose" }

  LuauParameterName:
    tag: function(variableName)
    name: variable.other.property.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauPropertyName:
    tag: propertyName
    name: variable.other.property.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauVariableName:
    tag: variableName
    name: variable.other.readwrite.luau
    match: ({{LUAU_IDENTIFIER}})

  LuauAccessorOperator:
    tag: separator
    name: meta.template.expression.accessor.sd
    match: ({{LUAU_ACCESSOR_OPERATOR}})

  # ----------------------------------------------------------------------------
  # Standard Library
  # ----------------------------------------------------------------------------

  LuauStdLibGlobals:
    tag: atom
    name: constant.language.luau
    match: ({{LUAU_STANDARD_LIB_GLOBALS}})\b

  LuauStdLibFunctions:
    tag: standard(function(name))
    name: support.function.luau
    match: ({{LUAU_STANDARD_LIB_FUNCTIONS}})

  LuauStdLibConstants:
    tag: standard(variableName)
    name: support.type.standard.sd
    match: ({{LUAU_STANDARD_LIB_CONSTANTS}})

  LuauStdLibMethods:
    tag: standard(function(name))
    name: support.function.luau
    match: ({{LUAU_META_METHODS}})

  # ----------------------------------------------------------------------------
  # Shebang
  # ----------------------------------------------------------------------------

  LuauShebang:
    match: ([#][!])(.*)$
    captures:
      1:
        patterns:
          - { include: "#LuauShebangPunctuation" }
      2:
        patterns:
          - { include: "#LuauShebangContent" }

  LuauShebangPunctuation:
    tag: punctuation
    name: punctuation.definition.comment.luau

  LuauShebangContent:
    tag: lineComment
    name: comment.line.shebang.luau

  # ----------------------------------------------------------------------------
  # Comments
  # ----------------------------------------------------------------------------

  LuauComment:
    patterns:
      - { include: "#LuauBlockComment" }
      - { include: "#LuauDocLineComment" }
      - { include: "#LuauLineComment" }

  LuauBlockComment:
    tag: blockComment
    name: comment.block.luau
    begin: ({{WS}}*)(--\[)([=]*)(\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        patterns:
          - { include: "#LuauCommentMark" }
      3:
        patterns:
          - { include: "#LuauCommentMark" }
      4:
        patterns:
          - { include: "#LuauCommentMark" }
    patterns:
      - { include: "#LuauDocCommentTags" }
      - { include: "#LuauBlockCommentContent" }
      - { include: "#Newline" }
    end: (\])(\3)(\])({{WS}}*)
    endCaptures:
      1:
        patterns:
          - { include: "#LuauCommentMark" }
      2:
        patterns:
          - { include: "#LuauCommentMark" }
      3:
        patterns:
          - { include: "#LuauCommentMark" }
      4:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauBlockCommentContent:
    tag: definition(blockComment)
    name: punctuation.definition.comment.content.sd
    match: (.)

  LuauCommentMark:
    tag: comment
    name: comment.luau

  LuauCodeBlockTag:
    tag: comment
    name: comment.luau

  LuauDocLineComment:
    tag: docComment
    name: comment.line.double-dash.documentation.luau
    begin: ({{WS}}*)(---)
    beginCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        patterns:
          - { include: "#LuauCommentMark" }
    patterns:
      - { include: "#LuauDocCommentTags" }
      - { include: "#LuauLineCommentContent" }
    end: (?={{BEAT}})|$

  LuauLineComment:
    tag: lineComment
    name: comment.line.double-dash.luau
    begin: ({{WS}}*)(--)
    beginCaptures:
      1:
        patterns:
          - { include: "#Whitespace" }
      2:
        patterns:
          - { include: "#LuauCommentMark" }
    patterns:
      - { include: "#LuauLineCommentContent" }
    end: (?={{BEAT}})|$

  LuauLineCommentContent:
    tag: definition(lineComment)
    name: punctuation.definition.comment.content.sd
    match: (.+?)(?=$)

  LuauDocCommentTags:
    patterns:
      - { include: "#LuauDocTagModifier" }
      - { include: "#LuauDocParamModifier" }

  LuauDocTagModifier:
    tag: annotation
    name: storage.type.class.luadoc.luau
    match: '@\w+'

  LuauDocParamModifier:
    match: ((?<=[\s*!/])[\\@]param)({{WS}}+)(\b\w+\b)
    captures:
      1:
        patterns:
          - { include: "#LuauDocTagAnnotation" }
      2:
        patterns:
          - { include: "#Whitespace" }
      3:
        patterns:
          - { include: "#LuauDocParamName" }

  LuauDocTagAnnotation:
    tag: annotation
    name: storage.type.class.luadoc.luau

  LuauDocParamName:
    tag: variableName
    name: variable.parameter.luau

  # ----------------------------------------------------------------------------
  # Literal Values
  # ----------------------------------------------------------------------------

  LuauLiteral:
    patterns:
      - { include: "#LuauString" }
      - { include: "#LuauNumber" }
      - { include: "#LuauBoolean" }
      - { include: "#LuauNil" }

  # ----------------------------------------------------------------------------
  # Number Values
  # ----------------------------------------------------------------------------

  # Note: `nan` and `inf` are ORDINARY IDENTIFIERS, not literals —
  # matching Luau, where `local nan = tonumber("nan")` declares a
  # plain variable (basic.luau line 201). They were briefly grammar
  # literals (LuauNaN / LuauInfinity), which hijacked any variable
  # named `nan`/`inf` into a constant node the lowerer didn't even
  # handle. Authors write `0/0` and `math.huge` (or `1/0`) for the
  # values.
  LuauNumber:
    patterns:
      - { include: "#LuauNumericHex" }
      - { include: "#LuauNumericBinary" }
      - { include: "#LuauNumericDecimal" }

  LuauNumericHex:
    match: (0_*[xX]_*[\da-fA-F_]*(?:[eE][\+\-]?_*\d[\d_]*(?:\.[\d_]*)?)?){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    captures:
      1:
        tag: number
        name: constant.numeric.hex.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauNumericBinary:
    match: (0_*[bB][01_]+(?:[eE][\+\-]?_*\d[\d_]*(?:\.[\d_]*)?)?){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    captures:
      1:
        tag: number
        name: constant.numeric.binary.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauNumericDecimal:
    match: ((?:\d[\d_]*(?:\.[\d_]*)?|\.\d[\d_]*)(?:[eE][\+\-]?_*\d[\d_]*(?:\.[\d_]*)?)?){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    captures:
      1:
        tag: number
        name: constant.numeric.decimal.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  # ----------------------------------------------------------------------------
  # String Values
  # ----------------------------------------------------------------------------

  LuauString:
    patterns:
      - { include: "#LuauDoubleQuotedString" }
      - { include: "#LuauSingleQuotedString" }
      - { include: "#LuauMultilineString" }
      - { include: "#LuauInterpolatedString" }

  LuauDoubleQuotedString:
    tag: definition(string)
    name: string.quoted.double.luau
    begin: (["])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringDoubleQuoteOpen" }
    patterns:
      - { include: "#LuauStringEscape" }
      - { include: "#Color" }
      - { include: "#PlainText" }
    end: (["]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringDoubleQuoteClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauSingleQuotedString:
    tag: definition(string)
    name: string.quoted.single.luau
    begin: (['])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringSingleQuoteOpen" }
    patterns:
      - { include: "#LuauStringEscape" }
      - { include: "#Color" }
      - { include: "#PlainText" }
    end: ([']){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringSingleQuoteClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauMultilineString:
    tag: definition(string)
    name: string.other.multiline.luau
    begin: (\[)([=]*)(\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringBracketQuoteOpen" }
      2:
        patterns:
          - { include: "#PunctuationStringEqualQuoteOpen" }
      3:
        patterns:
          - { include: "#PunctuationStringBracketQuoteOpen" }
    patterns:
      - { include: "#LuauStringEscape" }
      - { include: "#Color" }
      - { include: "#PlainText" }
      - { include: "#Newline" }
    end: (\])(\2)(\]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringBracketQuoteClose" }
      2:
        patterns:
          - { include: "#PunctuationStringEqualQuoteClose" }
      3:
        patterns:
          - { include: "#PunctuationStringBracketQuoteClose" }
      4:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauInterpolatedString:
    tag: definition(string)
    name: string.interpolated.luau
    begin: ([`])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringBacktickQuoteOpen" }
    patterns:
      - { include: "#LuauInterpolatedStringExpression" }
      - { include: "#LuauStringEscape" }
      - { include: "#Color" }
      - { include: "#PlainText" }
    end: ([`]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationStringBacktickQuoteClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauInterpolatedStringExpression:
    tag: meta
    name: meta.template.expression.luau
    contentName: meta.embedded.line.luau
    brackets: true
    begin: ([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([}])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }

  LuauStringEscape:
    patterns:
      - { include: "#LuauEscapeStandard" }
      - { include: "#LuauEscapeDecimal" }
      - { include: "#LuauEscapeHex" }
      - { include: "#LuauEscapeUnicode" }
      - { include: "#LuauEscapeLine" }
      - { include: "#LuauEscapeAny" }

  LuauEscapeStandard:
    tag: escape
    name: constant.character.escape.luau
    match: \\[abfnrtvz'"\{\\]

  LuauEscapeDecimal:
    tag: escape
    name: constant.character.escape.luau
    match: \\\d{1,3}

  LuauEscapeHex:
    tag: escape
    name: constant.character.escape.luau
    match: \\x[0-9a-fA-F]{2}

  LuauEscapeUnicode:
    tag: escape
    name: constant.character.escape.luau
    match: \\u\{[0-9a-fA-F]*\}

  LuauEscapeLine:
    tag: escape
    name: constant.character.escape.luau
    match: \\$

  LuauEscapeAny:
    tag: escape
    name: constant.character.escape.luau
    match: \\.

  # ----------------------------------------------------------------------------
  # Constant Values
  # ----------------------------------------------------------------------------

  LuauBoolean:
    match: (true|false)\b{{_LUAU_BINARY_OPERATOR_AHEAD_}}
    captures:
      1:
        tag: bool
        name: constant.language.boolean.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauNil:
    match: (nil(?!:))\b{{_LUAU_BINARY_OPERATOR_AHEAD_}}
    captures:
      1:
        tag: "null"
        name: constant.language.nil.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  # ----------------------------------------------------------------------------
  # Table Value
  # ----------------------------------------------------------------------------

  LuauTable:
    brackets: true
    begin: ([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauSemicolonSeparator" }
      - { include: "#LuauTableIndexDeclaration" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([}]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauTableIndexDeclaration:
    brackets: true
    begin: (\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketOpen" }
    patterns:
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (\])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketClose" }

  # ----------------------------------------------------------------------------
  # Parenthetical Value
  # ----------------------------------------------------------------------------

  LuauParenthetical:
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([)]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  # ----------------------------------------------------------------------------
  # Operations
  # ----------------------------------------------------------------------------

  LuauAssignmentOperation:
    begin: ({{WS}}*)(?={{LUAU_ASSIGNMENT_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauAssignmentOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}])
  LuauAssignmentOperator:
    begin: ({{WS}}*)({{LUAU_ASSIGNMENT_OPERATORS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: updateOperator
        name: keyword.operator.assignment.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    # The assignment operator does NOT span the line break. An empty
    # RHS (`name =` with nothing after `=` on the same line) leaves the
    # value empty and closes at end-of-line, so the next line's `end`
    # is seen fresh by the enclosing `define` block. Previously this
    # rule included `#Newline` to allow a bare `x =\n  rhs`
    # continuation; that let an empty RHS consume the line break and
    # park the cursor before `end`, which was then mis-read as the
    # property VALUE (`name = "end"`), so the `define` never closed
    # (ERROR_INCOMPLETE). No authored content uses bare `=`-then-
    # newline continuation — multi-line table/closure values always
    # open their `{`/`(` on the `=` line (e.g. `const X = {` … `}`),
    # which still parses because the operator never needs to cross a
    # newline there. Unlike the parallel binary-operator rules
    # (arithmetic/compare/concat/logical), an assignment operator can
    # only ever appear at statement start, so it never needs to absorb
    # a continuation that began on a previous line. See GRAMMAR.md
    # §11.5 corollary 2 ("`(?=$|{{WS}})` is a single-line bound").
    patterns:
      - { include: "#ExtraWhitespace" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}])|(?!{{WS}})

  LuauArithmeticOperation:
    begin: ({{WS}}*)(?={{LUAU_ARITHMETIC_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauArithmeticOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}])

  LuauArithmeticOperator:
    begin: ({{WS}}*)({{LUAU_ARITHMETIC_OPERATORS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: arithmeticOperator
        name: keyword.operator.arithmetic.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauCompareOperation:
    begin: ({{WS}}*)(?={{LUAU_COMPARE_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauCompareOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}])

  LuauCompareOperator:
    begin: ({{WS}}*)({{LUAU_COMPARE_OPERATORS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: compareOperator
        name: keyword.operator.comparison.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauConcatOperation:
    begin: ({{WS}}*)(?={{LUAU_CONCAT_OPERATOR}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauConcatOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}])

  LuauConcatOperator:
    begin: ({{WS}}*)({{LUAU_CONCAT_OPERATOR}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: special(operator)
        name: keyword.operator.concat.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauLengthOperation:
    begin: ({{WS}}*)(?={{LUAU_LENGTH_OPERATOR}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauLengthOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}])

  LuauLengthOperator:
    begin: ({{WS}}*)({{LUAU_LENGTH_OPERATOR}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: special(operator)
        name: keyword.operator.length.luau
      3:
        # `#` is a prefix operator — no space between it and its
        # operand (`#myTable`, not `# myTable`). ExtraWhitespace
        # collapses any captured spaces to nothing.
        emit: true
        patterns:
          - { include: "#ExtraWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauLogicalOperation:
    begin: ({{WS}}*)(?={{LUAU_LOGICAL_KEYWORDS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauLogicalOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}])

  LuauLogicalOperator:
    begin: ({{WS}}*)({{LUAU_LOGICAL_KEYWORDS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: special(logicOperator)
        name: keyword.operator.logical.luau keyword.operator.wordlike.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})
  LuauTypeCastOperation:
    begin: ({{WS}}*)(?={{LUAU_TYPECAST_OPERATOR}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeCastOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauExpression" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}])

  LuauTypeCastOperator:
    begin: ({{WS}}*)({{LUAU_TYPECAST_OPERATOR}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: typeOperator
        name: keyword.operator.typecast.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  # ----------------------------------------------------------------------------
  # Syntax Punctuation
  # ----------------------------------------------------------------------------

  LuauCommaSeparator:
    match: ({{WS}}*)([,])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        tag: operator
        name: keyword.operator.comma.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauSemicolonSeparator:
    match: ({{WS}}*)([;])({{WS}}*)
    captures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        tag: operator
        name: keyword.operator.semicolon.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  # ----------------------------------------------------------------------------
  # Types and Generics
  # ----------------------------------------------------------------------------
  LuauGenericsDeclaration:
    begin: ([<])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationAngleOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauTypeAssignmentOperator" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([>])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationAngleClose" }

  LuauGenericsInstantiation:
    begin: ([<][<])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationDoubleAngleOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#Newline" }
      - { include: "#ExtraWhitespace" }
      - { include: "#LuauTypeLiteral" }
    end: ([>][>])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationDoubleAngleClose" }

  LuauFunctionTypeDeclaration:
    tag: meta
    name: meta.function.luau
    begin: ({{WS}}*)(?:(export)\b({{WS}}*))?(type)\b({{WS}}*)(function)\b({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauExportModifier" }
      3:
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauTypeKeyword" }
      5:
        patterns:
          - { include: "#OptionalWhitespace" }
      6:
        patterns:
          - { include: "#LuauFunctionKeyword" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauGenericsDeclaration" }
      - { include: "#LuauTypeFunctionParameters" }
      - { include: "#LuauTypeName" }
    end: (?={{BEAT}})|(?<=[\)\-{}\[\]"'])

  LuauDataTypeDeclaration:
    # Positive lookahead `(?={{WS}}+{{LUAU_IDENTIFIER}})` requires
    # `type` to be followed by whitespace + an identifier (the type
    # alias being defined — `type Foo = number`). Without this,
    # bare `type` in expression position (`type(type)`,
    # `local f = type`) is misparsed as the start of a type
    # declaration, leaving the actual stdlib reference unresolved.
    # Negative lookahead `(?!{{WS}}*{{LUAU_FUNCTION_CALL_START}})`
    # is now redundant — kept for safety in case of grammar
    # interaction with surrounding rules.
    begin: ({{WS}}*)(?:(export)\b({{WS}}*))?(type)\b(?={{WS}}+{{LUAU_IDENTIFIER}})(?!{{WS}}*{{LUAU_FUNCTION_CALL_START}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauExportModifier" }
      3:
        patterns:
          - { include: "#OptionalWhitespace" }
      4:
        patterns:
          - { include: "#LuauTypeKeyword" }
      5:
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauTypeAssignment" }
    end: (?={{BEAT}})|(?={{WS}}*(?:$|(?!{{LUAU_COMMENT_START}}|{{LUAU_IDENTIFIER}}|[=])))

  LuauTypeAssignment:
    begin: ([=])({{WS}}*)
    beginCaptures:
      1:
        tag: updateOperator
        name: keyword.operator.assignment.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    patterns:
      - { include: "#LuauTypeLiteral" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}>=])

  LuauTypeAssignmentOperator:
    match: ([=])({{WS}}*)
    captures:
      1:
        tag: updateOperator
        name: keyword.operator.assignment.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauExportModifier:
    tag: modifier
    name: storage.modifier.visibility.luau

  LuauTypeKeyword:
    tag: definitionKeyword
    name: storage.type.luau

  LuauTypeName:
    match: ({{LUAU_IDENTIFIER}}){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    captures:
      1:
        tag: typeName
        name: entity.name.type.luau
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauTypeLiteral:
    begin: (?={{LUAU_IDENTIFIER}}|[?]|[&]|[|]|[{]|[(]|[<]|["]|[']|[`]|[-][>])
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeBinaryOperation" }
      - { include: "#LuauTypeTableStruct" }
      - { include: "#LuauString" }
      - { include: "#LuauBoolean" }
      - { include: "#LuauPrimitiveType" }
      - { include: "#LuauDivertTargetType" }
      - { include: "#LuauTypeFunctionParameters" }
      - { include: "#LuauTypeGenerics" }
      - { include: "#LuauTypeofFunction" }
      - { include: "#LuauVariadicType" }
      - { include: "#LuauTypeName" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}>=])

  # `->` as a type annotation marks the parameter as carrying a
  # divert-target value (sparkdown's analogue of ink's typed-divert
  # parameter `function f(-> target)`). The runtime ignores type
  # annotations and accepts any value as a divert-target if used as
  # one (validated by `tunnel-onwards-variable-target` in
  # `Diverts.test.ts`); this marker is purely declarative — it signals
  # author intent and gives the typechecker something to validate
  # against in the future. Example: `function cut_to(escape: ->) ... end`.
  LuauDivertTargetType:
    tag: standard(typeName)
    name: support.type.divert-target.sd
    match: ([-][>])

  LuauTypeBinaryOperation:
    begin: ({{WS}}*)(?={{LUAU_TYPE_BINARY_OPERATORS}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeBinaryOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}>=])

  LuauTypeBinaryOperator:
    begin: ({{WS}}*)({{LUAU_TYPE_BINARY_OPERATORS}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: typeOperator
        name: keyword.operator.type.luau
      3:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauTypeAnnotationOperation:
    begin: ({{WS}}*)(?={{LUAU_TYPE_ANNOTATION_OPERATOR}})
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeAnnotationOperator" }
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
    end: (?={{BEAT}})|(?=$|{{WS}}|[,;)\]}>=])

  LuauTypeAnnotationOperator:
    begin: ({{WS}}*)({{LUAU_TYPE_ANNOTATION_OPERATOR}})({{WS}}*)
    beginCaptures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        tag: typeOperator
        name: keyword.operator.type.luau
      3:
        # Prettier-style: one space after `:` in type annotations
        # (`c: companion`). OptionalWhitespace's zero-width match
        # still emits an empty node (see textmate-grammar-tree's
        # MatchRule), so the formatter's mid-line "separator"
        # dispatch fires and inserts the space.
        patterns:
          - { include: "#OptionalWhitespace" }
    # `ExtraWhitespace` (not `OptionalWhitespace`) here on purpose:
    # this rule's `patterns:` list is iterated by the parser inside
    # an open scope, and `OptionalWhitespace` (`{{WS}}*`) can match
    # zero chars — that wedges the loop with no progress and trips
    # the `Too many consecutive empty matches` warning. See GRAMMAR.md
    # §12 ("Switch rules can't include OptionalWhitespace") — same
    # constraint applies to a scoped rule's own patterns list.
    patterns:
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (?={{BEAT}})|(?!$|{{WS}})

  LuauPrimitiveType:
    match: ({{LUAU_PRIMITIVE_TYPES}}){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    captures:
      1:
        tag: standard(typeName)
        name: support.type.primitive.luau
      2:
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauTypeofFunction:
    begin: (typeof|type)\b({{WS}}*)(?=[(])
    beginCaptures:
      1:
        patterns:
          - { include: "#LuauTypeofFunctionName" }
      2:
        patterns:
          - { include: "#ExtraWhitespace" }
    patterns:
      - { include: "#LuauTypeofFunctionParameters" }
    applyEndPatternLast: true
    end: (?={{BEAT}})|(?=$|.)

  LuauTypeofFunctionParameters:
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauExpression" }
      - { include: "#ExtraWhitespace" }
    end: ([)]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauTypeofFunctionName:
    tag: function(typeName)
    name: support.function.luau

  LuauTypeGenerics:
    brackets: true
    begin: ([<])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationAngleOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauVariadicType" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauTypeAssignmentOperator" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([>]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationAngleClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauTypeTableStruct:
    brackets: true
    begin: ([{])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeTableIndexer" }
      - { include: "#LuauTypeTableProperty" }
      - { include: "#LuauTypeAnnotationOperation" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#LuauSemicolonSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([}]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBraceClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauTypeTableIndexer:
    brackets: true
    begin: (\[)
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: (\])
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationBracketClose" }

  LuauTypeTableProperty:
    match: (?:({{LUAU_ACCESS_MODIFIERS}})\b({{WS}}*))?({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#LuauAccessModifier" }
      2:
        patterns:
          - { include: "#Whitespace" }
      3:
        patterns:
          - { include: "#LuauTypePropertyName" }

  LuauTypePropertyName:
    tag: propertyName
    name: variable.property.luau

  LuauTypeFunctionParameters:
    brackets: true
    begin: ([(])
    beginCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenOpen" }
    patterns:
      - { include: "#LuauComment" }
      - { include: "#LuauTypeNamedFunctionParameter" }
      - { include: "#LuauTypeLiteral" }
      - { include: "#LuauCommaSeparator" }
      - { include: "#ExtraWhitespace" }
      - { include: "#Newline" }
    end: ([)]){{_LUAU_BINARY_OPERATOR_AHEAD_}}
    endCaptures:
      1:
        patterns:
          - { include: "#PunctuationParenClose" }
      2:
        emit: true
        patterns:
          - { include: "#OptionalWhitespace" }

  LuauTypeNamedFunctionParameter:
    begin: ({{WS}}*)({{LUAU_IDENTIFIER}})({{WS}}*)(?=[:])
    beginCaptures:
      1:
        patterns:
          - { include: "#ExtraWhitespace" }
      2:
        patterns:
          - { include: "#LuauParameterName" }
    patterns:
      - { include: "#LuauTypeAnnotationOperation" }
    applyEndPatternLast: true
    end: (?=$|.)

  LuauTypeOperator:
    tag: typeOperator
    name: keyword.operator.type.luau

  # ----------------------------------------------------------------------------
  # Labels
  # ----------------------------------------------------------------------------

  LuauLabel:
    match: ({{WS}}*)([:][:])({{LUAU_IDENTIFIER}})([:][:])
    captures:
      1:
        patterns:
          - { include: "#OptionalWhitespace" }
      2:
        patterns:
          - { include: "#LuauLabelOperator" }
      3:
        patterns:
          - { include: "#LuauLabelName" }
      4:
        patterns:
          - { include: "#LuauLabelOperator" }

  LuauLabelOperator:
    tag: operator
    name: keyword.operator.label.luau

  LuauLabelName:
    tag: labelName
    name: storage.type.attribute.luau
    match: ({{LUAU_IDENTIFIER}})

  # ----------------------------------------------------------------------------
  # Attributes
  # ----------------------------------------------------------------------------

  LuauAttribute:
    match: (@)({{LUAU_IDENTIFIER}})
    captures:
      1:
        patterns:
          - { include: "#LuauAttributeOperator" }
      2:
        patterns:
          - { include: "#LuauAttributeName" }

  LuauAttributeOperator:
    tag: operator
    name: keyword.operator.attribute.luau

  LuauAttributeName:
    tag: attributeName
    name: storage.type.attribute.luau
